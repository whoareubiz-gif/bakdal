<style>

html{height:100%;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;background:#E8E5E0;height:100%;overflow:hidden;display:flex;justify-content:center;}
#app{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;background:#f8f7f4;}
.hdr{background:#1D9E75;padding:7px 13px 7px;flex-shrink:0;}

.hdr-date{color:rgba(255,255,255,.82);font-size:10px;}
.hdr-clock{color:rgba(255,255,255,.6);font-size:10px;font-variant-numeric:tabular-nums;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#aaa;flex-shrink:0;transition:background .3s;}
.sync-dot.ok{background:#7FFFB0;}
.sync-dot.err{background:#FF7070;}
.sync-dot.busy{background:#FFD580;animation:blink .6s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stat-row{display:flex;gap:4px;}
.sc{flex:1;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:4px 2px;text-align:center;cursor:pointer;user-select:none;}

.tab span{font-size:17px;}
.tab.active{color:#1D9E75;font-weight:700;border-bottom-color:#1D9E75;}

.slide-track{display:flex;width:400%;height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1);}

.split-col{padding:7px 6px 60px;}
.split-col.lcol{border-right:.5px solid #E0DFDB;}

.split-hdr.m{background:#E6F1FB;color:#185FA5;}

.gt.m{background:#E6F1FB;color:#185FA5;}.gt.f{background:#FBEAF0;color:#993556;}

.chip.g{background:#E1F5EE;color:#0F6E56;}.chip.r{background:#FAECE7;color:#993C1D;}
.btn-att{background:#1D9E75;color:#fff;border:none;padding:4px 7px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;}

/* ════════════════════════════════════════
   🔥 Firebase 설정
   아래 firebaseConfig 를 본인 프로젝트로 교체하세요
   (무료 Spark 플랜, 보안규칙 read/write: true)
════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyD_anBSKfX8UsExUOQoDilhMJtDe8eoVks",
  authDomain: "bakdal-d30e6.firebaseapp.com",

};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const REF = db.ref('tennis/' + new Date().toISOString().slice(0,10)); // 날짜별 분리

let syncPushTimer = null;
const DEVICE_ID = Date.now()+'-'+Math.random().toString(36).slice(2,8); // 기기별 고유 ID
let lastSentToken = ''; // 내가 마지막으로 보낸 토큰

function setSyncDot(st){
  const d=document.getElementById('sync-dot');
  if(d){d.className='sync-dot'+(st?' '+st:'');}
}

/* Firebase 객체/배열 정규화
   Firebase는 JS 배열을 {"0":{...},"1":{...}} 객체로 저장함
   → 받아올 때 반드시 Array로 복원해야 filter/find/map 동작함 */
function toArr(v){
  if(!v) return [];
  if(Array.isArray(v)) return v;
  return Object.values(v);
}
function normalizeS(raw){
  if(!raw) return;
  const s = raw.state;
  if(s){
    s.attendees  = toArr(s.attendees).map(a=>({
      ...a,
      court:      a.court      ?? null,
      nextCourt1: a.nextCourt1 ?? null,
      nextCourt2: a.nextCourt2 ?? null,
      hasCourt:   a.hasCourt   ?? false,
    }));
    s.leftMembers = toArr(s.leftMembers);
    S = s;
  }
  if(raw.CC){
    const c = raw.CC;
    CC = {
      1:!!(c['1']||c[1]), 2:!!(c['2']||c[2]),
      3:!!(c['3']||c[3]), 4:!!(c['4']||c[4]),
      5:!!(c['5']||c[5]), 6:!!(c['6']||c[6]),
    };
  }
}

/* 서버로 push (debounce 1초) */
function syncPush(){
  if(syncPushTimer) clearTimeout(syncPushTimer);
  setSyncDot('busy');
  syncPushTimer = setTimeout(()=>{
    const token = DEVICE_ID+'-'+Date.now();
    lastSentToken = token;
    REF.set({state:S, CC, seq:token, updatedAt:Date.now()})
      .then(()=>setSyncDot('ok'))
      .catch(()=>setSyncDot('err'));
  }, 1000);
}

/* 서버에서 실시간 listen */
function syncListen(){
  REF.on('value', snap=>{
    const raw = snap.val();
    if(!raw){ setSyncDot('err'); return; }
    setSyncDot('ok');
    const incomingToken = raw.seq ?? '';
    if(incomingToken && incomingToken === lastSentToken) return;
    normalizeS(raw);
    renderAll();
  });
}

const DELETED_MEMBERS_KEY='tennis_deleted_members'; // 삭제된 원본회원 id 목록
function applyMemberEdits(){
  // 1. 이름 수정 적용
  try{
    const edits=JSON.parse(localStorage.getItem(MEMBER_EDITS_KEY)||'{}');
    Object.keys(edits).forEach(idStr=>{

      const m=MEMBERS.find(x=>x.id===id);

    });
  }catch(e){}

  try{
    const deleted=JSON.parse(localStorage.getItem(DELETED_MEMBERS_KEY)||'[]');
    deleted.forEach(id=>{
      const idx=MEMBERS.findIndex(x=>x.id===id);
      if(idx>=0) MEMBERS.splice(idx,1);

      let changed=false;
      ids.forEach(id=>{
        const idx=MEMBERS.findIndex(x=>x.id===id);
        if(idx>=0){ MEMBERS.splice(idx,1); changed=true; }

      let changed=false;
      Object.keys(fbEdits).forEach(idStr=>{

        const m=MEMBERS.find(x=>x.id===id);
        if(m && m.name!==fbEdits[idStr]){ m.name=fbEdits[idStr]; changed=true; }
      });

      }

}
function syncExtraMembersFromFirebase(){
  try{
    firebase.database().ref('tennis_extra_members').on('value',snap=>{
      const fbExtra=snap.val()||{};
      const fbList=Object.values(fbExtra);
      const fbIds=new Set(fbList.map(m=>m.id));
      let changed=false;

      // 1. Firebase에 있는데 로컬에 없으면 추가
      fbList.forEach(m=>{
        if(!MEMBERS.find(x=>x.id===m.id)){ MEMBERS.push(m); changed=true; }
      });

      // 2. 로컬에 추가회원(id>=1000)으로 있는데 Firebase에는 없으면 → 삭제된 것이므로 제거
      const localExtraIds=MEMBERS.filter(x=>x.id>=1000).map(x=>x.id);
      localExtraIds.forEach(id=>{
        if(!fbIds.has(id)){
          const idx=MEMBERS.findIndex(x=>x.id===id);
          if(idx>=0){ MEMBERS.splice(idx,1); changed=true; }
        }
      });

      if(changed){
        localStorage.setItem(EXTRA_MEMBERS_KEY, JSON.stringify(MEMBERS.filter(x=>x.id>=1000)));
        renderAll();
      }
    });
  }catch(e){}
}

function editMemberName(id, newName){
  newName=(newName||'').trim();
  if(!newName){ toast('이름을 입력해주세요'); return false; }
  const m=MEMBERS.find(x=>x.id===id);
  if(!m){ toast('회원을 찾을 수 없습니다'); return false; }
  const oldName=m.name;
  m.name=newName;
  // 오늘 출석/퇴소 데이터에도 이름 동기화
  S.attendees.forEach(a=>{ if(a.id===id) a.name=newName; });
  S.leftMembers.forEach(a=>{ if(a.id===id) a.name=newName; });
  save();

  if(id>=1000){
    // 추가 회원: extra 목록 자체를 업데이트
    try{
      const extra=JSON.parse(localStorage.getItem(EXTRA_MEMBERS_KEY)||'[]');
      const idx=extra.findIndex(x=>x.id===id);
      if(idx>=0){ extra[idx].name=newName; localStorage.setItem(EXTRA_MEMBERS_KEY, JSON.stringify(extra)); }
    }catch(e){}
    try{ firebase.database().ref('tennis_extra_members/'+id).update({name:newName}); }catch(e){}
  } else {
    // 원본 회원(하드코딩된 MEMBERS): 수정 내역을 별도 저장해야 새로고침 후에도 유지됨
    try{
      const edits=JSON.parse(localStorage.getItem(MEMBER_EDITS_KEY)||'{}');
      edits[id]=newName;
      localStorage.setItem(MEMBER_EDITS_KEY, JSON.stringify(edits));
    }catch(e){}
    try{ firebase.database().ref('tennis_member_edits/'+id).set(newName); }catch(e){}
  }

  toast(`✅ "${oldName}" → "${newName}" 으로 수정 완료`);
  renderAll();
  renderMemberSearchResults();
  return true;
}

/* ── 회원 삭제 (해당 회원의 모든 데이터 삭제) ── */
function deleteMember(id){
  const m=MEMBERS.find(x=>x.id===id);
  if(!m){ toast('회원을 찾을 수 없습니다'); return; }
  openModal(`⚠️ "${m.name}" 회원을 완전히 삭제하시겠습니까?\n(오늘 출석/퇴소 기록 + 통계 이력 + 회원정보 모두 삭제, 복구 불가)`,()=>{
    // 1. MEMBERS 배열에서 제거
    const idx=MEMBERS.findIndex(x=>x.id===id);
    if(idx>=0) MEMBERS.splice(idx,1);
    // 1b. 임원 목록에서도 제거
    if(OFFICER_IDS.includes(id)){ OFFICER_IDS=OFFICER_IDS.filter(x=>x!==id); saveOfficerIds(); }
    // 2. 오늘 출석/퇴소 데이터에서 제거
    S.attendees=S.attendees.filter(a=>a.id!==id);
    S.leftMembers=S.leftMembers.filter(a=>a.id!==id);
    save();
    // 3. localStorage 통계 이력에서 해당 회원 제거
    try{
      const st=JSON.parse(localStorage.getItem(STKEY)||'[]');
      st.forEach(entry=>{
        if(entry.attendees) entry.attendees=entry.attendees.filter(a=>a.id!==id);
        if(entry.leftMembers) entry.leftMembers=entry.leftMembers.filter(a=>a.id!==id);
      });
      localStorage.setItem(STKEY, JSON.stringify(st));
      // Firebase 통계에서도 제거
      st.forEach(entry=>{
        try{ firebase.database().ref('tennis_stats/'+entry.date).set(entry); }catch(e){}
      });
    }catch(e){}
    // 4. 코트 히스토리(같이한 인원 기록)에서 해당 회원 제거
    try{
      const ch=JSON.parse(localStorage.getItem('tennis_court_hist')||'[]');
      const filtered=ch.map(entry=>({
        ...entry,
        members:entry.members.filter(mm=>mm.id!==id)
      })).filter(entry=>entry.members.length>=2);
      localStorage.setItem('tennis_court_hist', JSON.stringify(filtered));
    }catch(e){}
    if(id>=1000){
      // 5a. 추가 회원: extra 목록에서 제거
      try{
        const extra=JSON.parse(localStorage.getItem(EXTRA_MEMBERS_KEY)||'[]');
        localStorage.setItem(EXTRA_MEMBERS_KEY, JSON.stringify(extra.filter(x=>x.id!==id)));
      }catch(e){}
      try{ firebase.database().ref('tennis_extra_members/'+id).remove(); }catch(e){}
    } else {
      // 5b. 원본 회원: 삭제 목록에 영구 기록 (새로고침해도 다시 안 살아남)
      try{
        const deleted=JSON.parse(localStorage.getItem(DELETED_MEMBERS_KEY)||'[]');
        if(!deleted.includes(id)) deleted.push(id);
        localStorage.setItem(DELETED_MEMBERS_KEY, JSON.stringify(deleted));
      }catch(e){}
      try{ firebase.database().ref('tennis_deleted_members/'+id).set(true); }catch(e){}
      // 이름 수정 내역이 남아있다면 같이 제거
      try{
        const edits=JSON.parse(localStorage.getItem(MEMBER_EDITS_KEY)||'{}');
        if(edits[id]){ delete edits[id]; localStorage.setItem(MEMBER_EDITS_KEY, JSON.stringify(edits)); }
      }catch(e){}
      try{ firebase.database().ref('tennis_member_edits/'+id).remove(); }catch(e){}
    }
    toast(`🗑 "${m.name}" 회원 및 모든 데이터 삭제 완료`);
    renderAll();
    renderMemberSearchResults();
  });
}

function doLogin(){
  unlockSpeechSynthesis(); // 사용자가 직접 누른 버튼이므로 이 시점에 음성엔진 활성화
  const nameInput=document.getElementById('login-name-input');
  const errEl=document.getElementById('login-error');
  const name=(nameInput.value||'').trim();
  errEl.textContent='';
  if(!name){ errEl.textContent='이름을 입력해주세요.'; return; }

  const matches=MEMBERS.filter(x=>x.name===name);
  if(!matches.length){
    errEl.textContent=`"${name}" 회원이 아닙니다. 이름을 다시 확인해주세요.`;
    return;
  }
  // 동명이인(게스트1/2/3/4 남·여 등)이 있으면 성별을 선택하게 함
  let member=matches[0];
  if(matches.length>1){
    const genderSel=document.getElementById('login-gender-select');
    const chosenGender=genderSel ? genderSel.value : null;
    if(!chosenGender){
      showLoginGenderPicker(matches);
      return;
    }
    member = matches.find(x=>x.gender===chosenGender) || matches[0];
  }

  try{ sessionStorage.setItem(LOGIN_KEY, JSON.stringify(member)); }catch(e){}

  // 관리자 계정(998): 출석 처리 자체를 하지 않고 곧바로 관리 모드로 진입
  const ADMIN_ACCOUNT_ID=998;
  if(member.id===ADMIN_ACCOUNT_ID){
    appMode='admin';
    try{ sessionStorage.setItem('tennis_app_mode','admin'); }catch(e){}
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    updateModeToggleBtn();
    applyModeVisibility();
    renderAll();
    goTab(2); // 코트 현황 탭으로 시작 (가장 많이 쓰는 화면)
    toast('⚙️ 관리자 모드로 진입했습니다');
    return;
  }

  // 기본은 항상 member 모드로 시작 (임원이어도 본인이 직접 전환해야 관리모드 진입)
  appMode='member';
  try{ sessionStorage.setItem('tennis_app_mode','member'); }catch(e){}

  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';

  updateModeToggleBtn();
  applyModeVisibility();

  if(!S.attendees.find(x=>x.id===member.id || x.name===member.name)){
    markAttend(member.id);
  } else {
    toast(`${member.name} 님, 이미 출석하셨습니다`);
    goTab(2);
  }

  if(member.id===999) toggleBoardMode(true); // 모니터링 계정만: 자동 보드모드
}

function checkExistingLogin(){
  try{
    const saved=sessionStorage.getItem(LOGIN_KEY);
    if(saved){
      const member=JSON.parse(saved);
      if(MEMBERS.find(x=>x.id===member.id && x.name===member.name)){
        const savedMode = sessionStorage.getItem('tennis_app_mode') || 'member';
        // 임원 권한이 그 사이 회수됐을 수 있으므로, admin 모드 복원 전 재검증
        appMode = (savedMode==='admin' && isOfficer(member.id)) ? 'admin' : 'member';
        try{ sessionStorage.setItem('tennis_app_mode', appMode); }catch(e){}
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').style.display='flex';
        updateModeToggleBtn();
        applyModeVisibility();

        if(member.id===999) toggleBoardMode(true); // 모니터링 계정만: 새로고침 시에도 보드모드 복원

      }

  }catch(e){}
  return false;
}

function pad(n){return String(n).padStart(2,'0');}
function dateStr(d=new Date()){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function timeStr(d=new Date()){return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function nowTs(){return Math.floor(Date.now()/1000);}
function tmins(s){if(!s)return 9999;const[h,m]=s.split(':').map(Number);return h*60+m;}
function getBand(t){const m=tmins(t);return TBANDS.find(b=>m>=b.s&&m<b.e)||null;}
function todayLbl(){const d=new Date(),ds=['일','월','화','수','목','금','토'];return`${d.getMonth()+1}/${d.getDate()}(${ds[d.getDay()]})`;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

(function(){
  const wrap=document.getElementById('slide-wrap');
  let sx=0,dragging=false,moved=false;
  function start(x){sx=x;dragging=true;moved=false;}
  function end(ex){if(!dragging)return;dragging=false;if(!moved)return;const dx=ex-sx;if(Math.abs(dx)>40)goTab(Math.max(0,Math.min(4,curTab+(dx<0?1:-1))));}
  wrap.addEventListener('touchstart',e=>{start(e.touches[0].clientX);},{passive:true});
  wrap.addEventListener('touchmove',e=>{if(dragging&&Math.abs(e.touches[0].clientX-sx)>5)moved=true;},{passive:true});
  wrap.addEventListener('touchend',e=>{end(e.changedTouches[0].clientX);});
  wrap.addEventListener('mousedown',e=>{start(e.clientX);});
  wrap.addEventListener('mousemove',e=>{if(dragging&&Math.abs(e.clientX-sx)>5)moved=true;});
  wrap.addEventListener('mouseup',e=>{end(e.clientX);});
})();

function tick(){
  const n=new Date();document.getElementById('hdr-clock').textContent=timeStr(n);
  if(n.getHours()===23&&n.getMinutes()===59){if(!autoFired){autoFired=true;autoReset(n);}}else autoFired=false;
  checkAutoLeave(); // 퇴소예정 10분 경과 자동 퇴소 체크
}

/* ── 출석/퇴소 ── */
function markAttend(id){
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  if(S.attendees.find(x=>x.id===id)){toast(`${m.name} 이미 출석`);goTab(2);return;}
  const t=timeStr();const ts=nowTs();S.seqCounter++;
  S.attendees.push({id:m.id,name:m.name,gender:m.gender,seq:S.seqCounter,games:0,time:t,court:null,courtFreeAt:t,courtFreeTs:ts,attendTs:ts,hasCourt:false});
  save();toast(`${m.name} 출석 ✓  ${t}`);goTab(2);
}
function restoreAttendee(id){
  const idx=S.leftMembers.findIndex(x=>x.id===id);
  if(idx===-1)return;
  const a=S.leftMembers[idx];
  const t=timeStr();const ts=nowTs();
  // 복구: 퇴소 목록에서 제거, 참석자로 복귀 (새 출석시간 반영)
  S.leftMembers.splice(idx,1);
  S.seqCounter++;
  S.attendees.push({
    id:a.id,name:a.name,gender:a.gender,
    seq:S.seqCounter,games:a.games,
    time:t,court:null,
    courtFreeAt:t,courtFreeTs:ts,attendTs:ts,hasCourt:false,
    nextCourt1:null,nextCourt2:null
  });
  save();renderAll();toast(`${a.name} 복구 완료 (${t})`);
}

function doLeave(id, isAuto){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  // 중복 처리 방지 (두 화면에서 동시에 자동퇴소 시도하는 race condition 방어)
  if(S.leftMembers.find(x=>x.id===id)){
    S.attendees=S.attendees.filter(x=>x.id!==id);
    save();renderAll();
    return;
  }
  S.leftMembers.push({...a,leftAt:timeStr()});
  S.attendees=S.attendees.filter(x=>x.id!==id);
  if(a.court)CC[a.court]=false;
  save();renderAll();
  toast(isAuto ? `⏰ ${a.name} 퇴소예정 10분 경과 → 자동 퇴소 처리됨` : `${a.name} 퇴소 처리됨`);
}
function leave(id){
  // member 모드에서는 본인 또는 모니터링/관리자 계정만 본인을 퇴소시킬 수 있음
  if(appMode!=='admin'){
    const me=getCurrentMember();
    if(!me || me.id!==id){ toast('본인만 퇴소 처리할 수 있습니다'); return; }
  }
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  openModal(`${a.name} 회원을 퇴소 처리하시겠습니까?\n(게임: ${a.games}게임)`,()=>{
    doLeave(id, false);
  });
}

/* ── 코트 배정 ── */
function toggleCourt(id,n){
  if(appMode!=='admin'){toast('관리 모드에서만 가능합니다');return;}
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  if(a.court===n){a.court=null;a.courtFreeAt=timeStr();a.courtFreeTs=nowTs();save();renderAll();return;}
  if(a.leavingScheduled){openModal(`⚠️ ${a.name}님은 퇴소예정 회원입니다.\n코트 배정이 제한됩니다.`,null);return;}
  if(!NEXT_COURTS.includes(n) && !courtActive[n]){toast(`${CNAMES[n]}은 오늘 비활성화된 코트입니다 ⚠️`);return;}
  if(S.attendees.filter(x=>x.court===n).length>=CMAX){toast(`${CNAMES[n]}은 이미 꽉 찼습니다 ⚠️`);return;}
  if(!NEXT_COURTS.includes(n)){
    if(a.court&&!NEXT_COURTS.includes(a.court))CC[a.court]=false;
    a.court=n;a.hasCourt=true;
  } else {
    const nc=n===5?'nextCourt1':'nextCourt2';
    a[nc]=a[nc]===n?null:n;save();renderAll();return;
  }
  save();renderAll();
}
function toggleNextCourt(id,which){
  if(appMode!=='admin'){toast('관리 모드에서만 가능합니다');return;}
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  const nc=which===1?'nextCourt1':'nextCourt2';
  const n=which===1?5:6;
  if(a[nc]){
    a[nc]=null;
    // 인원 빠지면 확정 상태 해제
    CC[n]=false;
    save();renderAll();return;
  }
  if(a.leavingScheduled){openModal(`⚠️ ${a.name}님은 퇴소예정 회원입니다.\n코트 배정이 제한됩니다.`,null);return;}
  if(S.attendees.filter(x=>x[nc]).length>=CMAX){toast(`${CNAMES[n]}은 이미 꽉 찼습니다 ⚠️`);return;}
  a[nc]=n;
  // 새로 배정 시 확정 상태 초기화
  CC[n]=false;
  save();renderAll();
}
function removeFromCourt(id){
  if(appMode!=='admin'){toast('관리 모드에서만 가능합니다');return;}
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  if(a.court)CC[a.court]=false;
  a.court=null;a.courtFreeAt=timeStr();a.courtFreeTs=nowTs();
  save();renderAll();toast(`${a.name} → 미배정`);
}
function clearCourt(n){
  if(appMode!=='admin'){toast('관리 모드에서만 가능합니다');return;}
  const pl=S.attendees.filter(x=>x.court===n);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  const t=timeStr();const baseTs=nowTs();
  shuffle(pl.slice()).forEach((a,i)=>{a.court=null;a.courtFreeAt=t;a.courtFreeTs=baseTs+i;});
  CC[n]=false;save();renderAll();toast(`${CNAMES[n]} 해제 완료`);
}
function confirmCourt(n){
  if(appMode!=='admin'){toast('관리 모드에서만 가능합니다');return;}
  const pl=S.attendees.filter(x=>x.court===n);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  if(CC[n]){toast(`${CNAMES[n]}은 이미 확정`);return;}
  const leavingMembers=pl.filter(a=>a.leavingScheduled);
  if(leavingMembers.length){openModal(`⚠️ ${CNAMES[n]}에 퇴소예정 회원(${leavingMembers.map(a=>a.name).join(', ')})이 포함되어 있어 확정할 수 없습니다.\n해당 회원을 다른 인원으로 교체해주세요.`,null);return;}
  if(pl.length<CMAX){openModal(`⚠️ ${CNAMES[n]}에 ${pl.length}명만 배정되어 있습니다.\n4명이 되어야 확정할 수 있습니다.\n(1명이 모자랍니다)`,null);return;}
  pl.forEach(a=>{a.games+=1;});CC[n]=true;recordCourtGame(n);save();renderAll();toast(`✅ ${CNAMES[n]} 확정`);
}
function clearNextCourt(n){
  if(appMode!=='admin'){toast('관리 모드에서만 가능합니다');return;}
  const nc=n===5?'nextCourt1':'nextCourt2';
  const pl=S.attendees.filter(x=>x[nc]);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  const t=timeStr();const baseTs=nowTs();
  shuffle(pl.slice()).forEach((a,i)=>{a[nc]=null;if(!a.court){a.courtFreeAt=t;a.courtFreeTs=baseTs+i;}});
  CC[n]=false;save();renderAll();toast(`${CNAMES[n]} 해제 완료`);
}
function confirmNextCourt(n){
  if(appMode!=='admin'){toast('관리 모드에서만 가능합니다');return;}
  const nc=n===5?'nextCourt1':'nextCourt2';
  const pl=S.attendees.filter(x=>x[nc]);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  if(CC[n]){toast(`${CNAMES[n]}은 이미 확정`);return;}
  const leavingMembers=pl.filter(a=>a.leavingScheduled);
  if(leavingMembers.length){openModal(`⚠️ ${CNAMES[n]}에 퇴소예정 회원(${leavingMembers.map(a=>a.name).join(', ')})이 포함되어 있어 확정할 수 없습니다.\n해당 회원을 다른 인원으로 교체해주세요.`,null);return;}
  if(pl.length<CMAX){openModal(`⚠️ ${CNAMES[n]}에 ${pl.length}명만 배정되어 있습니다.\n4명이 되어야 확정할 수 있습니다.\n(1명이 모자랍니다)`,null);return;}
  const availCourts=[];
  for(let cn=1;cn<=4;cn++){if(!courtActive[cn])continue;const cur=S.attendees.filter(x=>x.court===cn).length;if(cur<CMAX)availCourts.push({cn,cur,free:CMAX-cur});}
  if(!availCourts.length){toast('⚠️ 1~4코트가 모두 꽉 찼습니다. 코트를 해제한 후 확정해주세요.',3500);return;}
  const t=timeStr();const baseTs=nowTs();
  CC[n]=true;
  availCourts.sort((a,b)=>b.free-a.free);
  let pi=0;
  for(const{cn,free}of availCourts){
    let filled=0;
    while(pi<pl.length&&filled<free){
      const a=pl[pi];
      if(!a.court){a.court=cn;a.hasCourt=true;}else filled--;
      a[nc]=null;pi++;filled++;
    }
    if(pi>=pl.length)break;
  }
  while(pi<pl.length){const a=pl[pi];a[nc]=null;if(!a.court){a.courtFreeAt=t;a.courtFreeTs=baseTs+pi;}pi++;}
  save();renderAll();toast(`✅ ${CNAMES[n]} 확정 — ${pl.length}명 코트 배정`);
}
function reassign(){
  if(appMode!=='admin'){toast('관리 모드에서만 가능합니다');return;}
  // 이전 상태 저장
  prevState=JSON.parse(JSON.stringify(S));
  prevCC=JSON.parse(JSON.stringify(CC));
  const t=timeStr();const baseTs=nowTs();
  const inC=shuffle(S.attendees.filter(a=>a.court!==null));
  inC.forEach((a,i)=>{a.court=null;a.courtFreeAt=t;a.courtFreeTs=baseTs+i;});
  S.attendees.forEach(a=>{a.nextCourt1=null;a.nextCourt2=null;});
  CC={1:false,2:false,3:false,4:false,5:false,6:false};save();renderAll();toast('🔄 전체 재편성 완료 (복구 가능)');
}
function restorePrevState(){
  if(!prevState){toast('복구할 이전 상태가 없습니다.');return;}
  S=JSON.parse(JSON.stringify(prevState));
  CC=JSON.parse(JSON.stringify(prevCC));
  prevState=null;prevCC=null;
  save();renderAll();toast('↩️ 이전 상태로 복구 완료');

  const t=timeStr();const baseTs=nowTs();
  shuffle(S.attendees.filter(a=>a.court===cn)).forEach((a,i)=>{a.court=null;a.courtFreeAt=t;a.courtFreeTs=baseTs+i;});

function assignNextTeam(which,teamIds){
  if(appMode!=='admin'){toast('관리 모드에서만 가능합니다');return;}
  const leavingMembers=teamIds.map(id=>S.attendees.find(x=>x.id===id)).filter(a=>a&&a.leavingScheduled);
  if(leavingMembers.length){openModal(`⚠️ 퇴소예정 회원(${leavingMembers.map(a=>a.name).join(', ')})이 포함되어 배정할 수 없습니다.`,null);return;}
  const t=timeStr();const baseTs=nowTs();
  const nc1cnt=S.attendees.filter(a=>a.nextCourt1).length;
  let targetWhich=which;
  if(which===1&&nc1cnt>=CMAX){
    if(S.attendees.filter(a=>a.nextCourt2).length>=CMAX){toast('⚠️ 다음차례1,2 모두 꽉 찼습니다.',3000);return;}
    targetWhich=2;toast('다음차례가 꽉 차 있어 다음차례2에 배정합니다.',2500);
  }
  const nc=targetWhich===1?'nextCourt1':'nextCourt2';
  const n=targetWhich===1?5:6;
  shuffle(S.attendees.filter(a=>a[nc])).forEach((a,i)=>{a[nc]=null;if(!a.court){a.courtFreeAt=t;a.courtFreeTs=baseTs+i;}});

  save();renderAll();toast(`✅ ${CNAMES[n]}에 ${teamIds.length}명 배정`);

/* ── 대기/추천 ── */
function getSortedWaiting(){
  function getTs(a){if(a.courtFreeTs)return a.courtFreeTs;const t=a.courtFreeAt||a.time||'00:00';const[h,m]=t.split(':').map(Number);return h*3600+m*60;}
  S.attendees.forEach(a=>{if(a.hasCourt===undefined)a.hasCourt=!!(a.courtFreeAt&&a.courtFreeAt!==a.time);});
  // 화면 표시(게임편성 대기현황)는 퇴소예정 회원도 포함시켜야 함 (* 표시로 구분)
  // 추천 알고리즘에서만 별도로 제외 처리
  return S.attendees.filter(x=>x.court===null&&!HIDDEN_MEMBER_IDS.includes(x.id)).sort((a,b)=>getTs(a)-getTs(b));
}
function buildRecommendedTeams(){
  const waiting=getSortedWaiting();
  function buildPool(gender){
    // 추천 대상에서는 퇴소예정 회원 제외 (화면 표시는 getSortedWaiting에서 그대로 유지)
    const w=waiting.filter(x=>x.gender===gender&&!x.leavingScheduled);
    const c=S.attendees.filter(x=>x.gender===gender&&x.court&&!NEXT_COURTS.includes(x.court)&&!HIDDEN_MEMBER_IDS.includes(x.id)&&!x.leavingScheduled).sort((a,b)=>(a.attendTs||0)-(b.attendTs||0));
    return{all:[...w,...c]};
  }
  function pick(n,pool){
    const all=pool.all;const M=all.length;
    if(!M)return[];if(M<=n)return shuffle(all).slice(0,n);
    const fc=Math.min(Math.max(0,M-2),n);
    return[...all.slice(0,fc),...shuffle(all.slice(fc)).slice(0,n-fc)];
  }
  const mp=buildPool('m'),fp=buildPool('f');
  const teams=[];
  if(mp.all.length>=1){const t=pick(4,mp);if(t.length)teams.push({label:'추천1팀 — 남자',color:'#185FA5',badge:'👨',team:t});}
  if(fp.all.length>=1){const t=pick(4,fp);if(t.length)teams.push({label:'추천2팀 — 여자',color:'#993556',badge:'👩',team:t});}
  if(mp.all.length>=1&&fp.all.length>=1){
    const tm=pick(2,mp),tf=pick(2,fp);const t=[...tm,...tf];
    if(t.length>=2)teams.push({label:'추천3팀 — 혼성(남2여2)',color:'#7B3FA0',badge:'👫',team:t});
  }
  return teams;
}

/* ── HTML 헬퍼 ── */
function gt(g,sm){return`<span class="gt ${g}${sm?' sm':''}">${g==='m'?'남':'여'}</span>`;}
function chip(c,t){return`<span class="chip ${c}">${t}</span>`;}

/* ── 통계 ── */
function renderStats(){
  const visibleAttendees=S.attendees.filter(x=>!HIDDEN_MEMBER_IDS.includes(x.id));
  const visibleLeft=S.leftMembers.filter(x=>!HIDDEN_MEMBER_IDS.includes(x.id));
  document.getElementById('st0').textContent=visibleAttendees.length;
  document.getElementById('st1').textContent=visibleAttendees.filter(x=>x.gender==='m').length;

/* ── 회원명부 ── */
/* 퇴소예정 표시 헬퍼: 이름 우측 상단에 * 표시 */
function leavingMark(isLeaving){
  return isLeaving ? `<span style="font-size:11px;font-weight:900;color:#C0392B;vertical-align:super;margin-left:1px">*</span>` : '';
}

function renderMembers(){
  const aIds=new Set(S.attendees.map(x=>x.id));const lIds=new Set(S.leftMembers.map(x=>x.id));
  // 게스트 제외한 정회원만 카운트/표시
  // 회원명부에는 게스트도 표시, 단 (00명) 카운트는 정회원만 집계
  // 게스트는 항상 맨 아래로 정렬
  function sortGuestLast(arr){
    const regular=arr.filter(x=>!x.name.includes('게스트'));
    const guest=arr.filter(x=>x.name.includes('게스트'));
    return [...regular, ...guest];
  }
  const males=sortGuestLast(MEMBERS.filter(x=>x.gender==='m'&&!HIDDEN_MEMBER_IDS.includes(x.id)));
  const females=sortGuestLast(MEMBERS.filter(x=>x.gender==='f'&&!HIDDEN_MEMBER_IDS.includes(x.id)));
  const malesRegular=males.filter(x=>!x.name.includes('게스트'));
  const femalesRegular=females.filter(x=>!x.name.includes('게스트'));
  const mAtt=malesRegular.filter(x=>aIds.has(x.id)&&!lIds.has(x.id)).length;
  const fAtt=femalesRegular.filter(x=>aIds.has(x.id)&&!lIds.has(x.id)).length;
  function card(m){
    const a=aIds.has(m.id),l=lIds.has(m.id);
    const attendee=S.attendees.find(x=>x.id===m.id);
    const isLeaving=attendee&&attendee.leavingScheduled;
    const chips=(a&&!l?chip('g','✓'):'');
    const btn=l?`<button class="btn-att" style="background:#FAECE7;color:#993C1D;cursor:default;border:.5px solid #EFBCB0" disabled>퇴소</button>`
      :a?`<button class="btn-att done" disabled>완료</button>`
      :`<button class="btn-att" onclick="markAttend(${m.id})">출석</button>`;
    return`<div class="scard"><span class="sname">${m.name}${leavingMark(isLeaving)}</span><div style="display:flex;align-items:center;gap:3px">${chips}${btn}</div></div>`;
  }
  return`<div class="split-wrap"><div class="split-col lcol"><div class="split-hdr m">👨 남자 (${mAtt}/${malesRegular.length})</div>${males.map(card).join('')}</div><div class="split-col"><div class="split-hdr f">👩 여자 (${fAtt}/${femalesRegular.length})</div>${females.map(card).join('')}</div></div>`;
}

/* ── 참석자 행 ── */
function attendRow(a){
  const isMemberMode = appMode!=='admin';
  const counts={};[1,2,3,4].forEach(n=>{counts[n]=S.attendees.filter(x=>x.court===n).length;});
  const cBtns=[1,2,3,4].map(n=>{
    const on=a.court===n?' on':'';const isFull=counts[n]>=CMAX&&a.court!==n;
    const disabled = isMemberMode; // 일반모드: 코트버튼 보여주기만, 클릭 불가
    return`<button class="cbtn c${n}${on}${isFull?' full-disabled':''}" ${disabled?'disabled':''} onclick="${disabled?'':`toggleCourt(${a.id},${n})`}" style="${disabled?'cursor:default;opacity:'+(on?'1':'0.4'):''}">${n}코트</button>`;
  }).join('');
  const nc1on=a.nextCourt1?' on':'';const nc2on=a.nextCourt2?' on':'';
  const nc1full=S.attendees.filter(x=>x.nextCourt1).length>=CMAX&&!a.nextCourt1;
  const nc2full=S.attendees.filter(x=>x.nextCourt2).length>=CMAX&&!a.nextCourt2;
  const ncBtns=`<button class="cbtn c5${nc1on}${nc1full?' full-disabled':''}" ${isMemberMode?'disabled':''} onclick="${isMemberMode?'':(nc1full?'':`toggleNextCourt(${a.id},1)`)}" style="font-size:9px;padding:3px 3px;${isMemberMode?'cursor:default;opacity:'+(nc1on?'1':'0.4'):''}">다1</button><button class="cbtn c6${nc2on}${nc2full?' full-disabled':''}" ${isMemberMode?'disabled':''} onclick="${isMemberMode?'':(nc2full?'':`toggleNextCourt(${a.id},2)`)}" style="font-size:9px;padding:3px 3px;${isMemberMode?'cursor:default;opacity:'+(nc2on?'1':'0.4'):''}">다2</button>`;
  const courtTag='';
  const timeLabel=`출석 ${a.time}`;

/* 관리자가 직접 퇴소예정 설정/해제 */
const LEAVING_AUTO_MINUTES=10; // 퇴소예정 후 자동 퇴소까지 대기 시간(분)
function setLeavingScheduled(id){
  if(appMode!=='admin'){
    const me=getCurrentMember();
    if(!me || me.id!==id){ toast('본인만 설정할 수 있습니다'); return; }
  }
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  openModal(`퇴소 예정으로 표시하시겠습니까?\n(${LEAVING_AUTO_MINUTES}분 후 자동으로 퇴소 처리됩니다)`,()=>{
    a.leavingScheduled=true;
    a.leavingScheduledAt=nowTs();
    save();renderAll();toast(`⏰ 퇴소예정으로 표시되었습니다 (${LEAVING_AUTO_MINUTES}분 후 자동 퇴소)`);
  });
}
function cancelLeavingScheduled(id){
  if(appMode!=='admin'){
    const me=getCurrentMember();
    if(!me || me.id!==id){ toast('본인만 취소할 수 있습니다'); return; }
  }
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  a.leavingScheduled=false;
  a.leavingScheduledAt=null;
  save();renderAll();toast('퇴소예정이 취소되었습니다');
}
function toggleLeavingScheduledAdmin(id){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  a.leavingScheduled=!a.leavingScheduled;
  a.leavingScheduledAt=a.leavingScheduled?nowTs():null;
  save();renderAll();
  toast(a.leavingScheduled?`⏰ ${a.name} 퇴소예정으로 설정 (${LEAVING_AUTO_MINUTES}분 후 자동 퇴소)`:`${a.name} 퇴소예정 취소`);
}
/* 퇴소예정 10분 경과 자동 퇴소 체크 (1초 tick마다 호출) */
function checkAutoLeave(){
  const now=nowTs();
  const targets=S.attendees.filter(a=>a.leavingScheduled && a.leavingScheduledAt && (now-a.leavingScheduledAt)>=LEAVING_AUTO_MINUTES*60);
  targets.forEach(a=>{ doLeave(a.id, true); });
}

    label=confirmed?`${CNAMES[a.court]} 배정완료(확정)`:`${CNAMES[a.court]} 배정중(미확정)`;
    bg=CBGS[a.court]; tc=CCOLORS[a.court]; icon=confirmed?'✅':'🎾';
    statusKey=`court${a.court}-${confirmed?'confirmed':'pending'}`;
  } else if(a.nextCourt1){
    const confirmed=!!CC[5];

    bg=CBGS[5]; tc=CCOLORS[5]; icon=confirmed?'✅':'⏭';
    statusKey=`next1-${confirmed?'confirmed':'pending'}`;
  } else if(a.nextCourt2){
    const confirmed=!!CC[6];
    label=confirmed?'다음차례2 배정완료(확정)':'다음차례2 배정중(미확정)';
    bg=CBGS[6]; tc=CCOLORS[6]; icon=confirmed?'✅':'⏭';
    statusKey=`next2-${confirmed?'confirmed':'pending'}`;
  } else {
    label='미배정 대기중';
    bg='#EFEDE8'; tc='#6B6862'; icon='⏳';
    statusKey='waiting';
  }

  // 상태 변화 감지 → 알림 트리거 (음성+진동+팝업, 모니터링 제외)
  const appVisible = document.getElementById('app').style.display !== 'none';
  if(appVisible && initialRenderDone && lastMyStatusKey!==null && lastMyStatusKey!==statusKey && !HIDDEN_MEMBER_IDS.includes(me.id)){
    vibrateDevice([200,100,200]);
    speakStatus(`${me.name}님, ${label} 상태입니다`, {icon, label, bg, tc});
  }
  lastMyStatusKey=statusKey;

  const statusBanner=`<div style="margin:10px 11px;padding:14px 16px;border-radius:14px;background:${bg};display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)">
    <span style="font-size:26px;flex-shrink:0">${icon}</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;color:${tc};opacity:.75;font-weight:600">${me.name}님의 현재 상태</div>
      <div style="font-size:18px;font-weight:900;color:${tc};margin-top:1px">${label}</div>
    </div>
    <button onclick="notifyEnabled=!notifyEnabled;this.textContent=notifyEnabled?'🔔':'🔕';" id="notify-toggle-btn" style="flex-shrink:0;background:rgba(255,255,255,.5);border:none;border-radius:8px;padding:6px 9px;font-size:16px;cursor:pointer">🔔</button>
  </div>`;

  // 다음차례1·2 2열 비교 카드
  function buildNextCol(n){
    const ncKey=n===5?'nextCourt1':'nextCourt2';
    const players=S.attendees.filter(x=>x[ncKey]);
    const confirmed=!!CC[n];
    const names=players.length
      ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">${players.map(p=>`<span style="display:block;text-align:center;background:${CBGS[n]};color:${CCOLORS[n]};padding:5px 4px;border-radius:7px;font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</span>`).join('')}</div>`
      : '<span style="font-size:12px;color:#aaa">배정 없음</span>';
    return`<div style="flex:1;min-width:0">
      <div style="font-size:12px;color:${CCOLORS[n]};opacity:.8;font-weight:700;margin-bottom:5px">${CNAMES[n]} ${confirmed?'✅확정':`(${players.length}/${CMAX})`}</div>
      ${names}
    </div>`;

  return statusBanner + nextBanner;
}

    const confirmBtn=!conf&&cnt>0?`<button class="ct-confirm-btn" onclick="confirmCourt(${n})">확정</button>`:'';
    h+=`<div class="ct-card"><div class="ct-hdr c${n}"><span class="ct-name">${CNAMES[n]}</span><span class="ct-cnt">${cnt}/${CMAX}</span>${fullBadge}${confirmBtn}<button class="ct-hbtn" onclick="clearCourt(${n})">해제</button></div><div class="ct-body">${slots}${status}</div></div>`;
  });
  h+=`</div>`;
  // 다음차례 코트
  h+=`<div style="padding:0 11px 2px"><div class="stitle" style="margin-top:6px">⏭ 다음차례 코트 <span style="font-size:9px;color:#888780;font-weight:400">· 확정을 클릭하면 빈 코트에 배정됩니다</span></div></div><div class="court-grid" style="padding-top:0">`;

    return h;
  }

  // 참석자 배정 현황 (관리모드만)

  // 확정되지 않은 코트에 배정된 인원 (CC[court]===false)
  const inCourtUnconfirmed=S.attendees

/* 오늘 데이터를 통계 히스토리에 저장 */
function saveStatHistory(){
  try{
    const today=dateStr();
    const allToday=[...S.attendees,...S.leftMembers];
    if(!allToday.length) return;

    // Firebase에서 기존 오늘 데이터 읽어서 병합 후 저장
    const statRef=firebase.database().ref('tennis_stats/'+today);
    statRef.once('value').then(snap=>{
      const existing=snap.val();
      function mergeMembers(existList, newList){
        const map={};
        (existList||[]).forEach(a=>{ map[a.id]=a; });
        newList.forEach(a=>{ map[a.id]=a; });
        return Object.values(map);
      }
      const mergedAtt=mergeMembers(
        existing?.attendees||[],
        S.attendees.map(a=>({id:a.id,name:a.name,gender:a.gender,games:a.games,time:a.time}))
      );
      const mergedLeft=mergeMembers(
        existing?.leftMembers||[],
        S.leftMembers.map(a=>({id:a.id,name:a.name,gender:a.gender,games:a.games,time:a.time,leftAt:a.leftAt}))
      );
      const allMerged=[...mergedAtt,...mergedLeft];
      const entry={
        date:today,
        attendees:mergedAtt,
        leftMembers:mergedLeft,
        totalAttend:allMerged.length,
        totalGames:allMerged.reduce((s,a)=>s+(a.games||0),0),
      };
      // Firebase에만 저장 (기기 공통)
      statRef.set(entry);
      // localStorage도 동기화
      try{
        const st=JSON.parse(localStorage.getItem(STKEY)||'[]');
        const idx=st.findIndex(x=>x.date===today);
        if(idx>=0) st[idx]=entry; else st.push(entry);
        localStorage.setItem(STKEY,JSON.stringify(st));
      }catch(e){}
    }).catch(e=>console.error('saveStatHistory error:',e));
  }catch(e){console.error('saveStatHistory error:',e);}
}

    return`<div style="display:grid;grid-template-columns:56px 1fr 1fr 1fr;gap:2px;margin-bottom:4px;padding:0 4px">
      <span></span>
      <span style="text-align:center;font-size:9px;color:#1D9E75;font-weight:700;background:#E1F5EE;border-radius:4px;padding:2px">전체</span>
      <span style="text-align:center;font-size:9px;color:#185FA5;font-weight:700;background:#E6F1FB;border-radius:4px;padding:2px">평일</span>
      <span style="text-align:center;font-size:9px;color:#7B3FA0;font-weight:700;background:#F3E8FD;border-radius:4px;padding:2px">주말</span>
    </div>`;
  }

  let body='';

  if(statView==='attend'){
    const wdF=ALL.filter(d=>!isWeekend(d.date));
    const weF=ALL.filter(d=>isWeekend(d.date));
    function buildMap(days){
      const map={};
      days.forEach(d=>{
        [...(d.attendees||[]),...(d.leftMembers||[])].filter(a=>!a.name.includes('게스트')&&!HIDDEN_MEMBER_IDS.includes(a.id)).forEach(a=>{
          if(!map[a.id])map[a.id]={name:a.name,gender:a.gender,cnt:0};
          map[a.id].cnt++;
        });
      });
      return map;
    }
    const mapAll=buildMap(ALL),mapWd=buildMap(wdF),mapWe=buildMap(weF);
    const tAll=ALL.length||1,tWd=wdF.length||1,tWe=weF.length||1;
    const allIds=[...new Set([...Object.keys(mapAll),...Object.keys(mapWd),...Object.keys(mapWe)])];
    const males=allIds.filter(id=>(mapAll[id]||mapWd[id]||mapWe[id])?.gender==='m').sort((a,b)=>(mapAll[b]?.cnt||0)-(mapAll[a]?.cnt||0));
    const females=allIds.filter(id=>(mapAll[id]||mapWd[id]||mapWe[id])?.gender==='f').sort((a,b)=>(mapAll[b]?.cnt||0)-(mapAll[a]?.cnt||0));
    const avgAll=allIds.length?Math.round(allIds.reduce((s,id)=>s+(mapAll[id]?.cnt||0),0)/allIds.length/tAll*100):0;
    const avgM=males.length?Math.round(males.reduce((s,id)=>s+(mapAll[id]?.cnt||0),0)/males.length/tAll*100):0;
    const avgF=females.length?Math.round(females.reduce((s,id)=>s+(mapAll[id]?.cnt||0),0)/females.length/tAll*100):0;

    function memberRow(id, bg){
      const m=mapAll[id]||mapWd[id]||mapWe[id];
      const pAll=Math.round((mapAll[id]?.cnt||0)/tAll*100);
      const pWd=wdF.length?Math.round((mapWd[id]?.cnt||0)/tWd*100):null;
      const pWe=weF.length?Math.round((mapWe[id]?.cnt||0)/tWe*100):null;
      const col=m.gender==='m'?'#185FA5':'#993556';
      return`<div style="display:grid;grid-template-columns:52px 1fr 1fr 1fr;gap:2px;margin-bottom:3px;background:${bg};border-radius:7px;padding:4px 5px;align-items:center">
        <span style="font-size:11px;font-weight:700;color:${col};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</span>
        <span style="text-align:center;font-size:12px;font-weight:700;color:#1A1A1A">${pAll}</span>
        <span style="text-align:center;font-size:12px;font-weight:700;color:#1A1A1A">${pWd!==null?pWd:'-'}</span>
        <span style="text-align:center;font-size:12px;font-weight:700;color:#1A1A1A">${pWe!==null?pWe:'-'}</span>
      </div>`;
    }

    const top5m=males.slice(0,5);
    const top5f=females.slice(0,5);
    const bot5m=[...males].reverse().slice(0,5);
    const bot5f=[...females].reverse().slice(0,5);

    body=`<div class="stitle">📅 개인별 참석률 <span style="font-size:9px;color:#B25000;font-weight:400">· 전체 누적 기준 · ${tAll}일(평일${wdF.length}/주말${weF.length})</span></div>`;
    body+=threeBoxes(avgAll,avgM,avgF,'');

    if(!allIds.length){body+=`<div class="empty" style="padding:20px">데이터가 없습니다.<br><small>📥 데이터 저장만 버튼을 눌러주세요</small></div>`;}
    else{
      // 상위5 남/여 2열
      body+=`<div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:#0F6E56;margin-bottom:6px">🏆 상위 5명</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <div>
            <div style="text-align:center;background:#E6F1FB;color:#185FA5;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👨 남자</div>
            ${colHeader()}
            ${top5m.map(id=>memberRow(id,'#E1F5EE')).join('')}
          </div>
          <div>
            <div style="text-align:center;background:#FBEAF0;color:#993556;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👩 여자</div>
            ${colHeader()}
            ${top5f.map(id=>memberRow(id,'#E1F5EE')).join('')}
          </div>
        </div>
      </div>`;
      // 하위5 남/여 2열
      body+=`<div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:#993C1D;margin-bottom:6px">📉 하위 5명</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <div>
            <div style="text-align:center;background:#E6F1FB;color:#185FA5;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👨 남자</div>
            ${colHeader()}
            ${bot5m.map(id=>memberRow(id,'#FAECE7')).join('')}
          </div>
          <div>
            <div style="text-align:center;background:#FBEAF0;color:#993556;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👩 여자</div>
            ${colHeader()}
            ${bot5f.map(id=>memberRow(id,'#FAECE7')).join('')}
          </div>
        </div>
      </div>`;
      // 전체 명단
      body+=`<div style="font-size:10px;font-weight:700;color:#555;margin-bottom:5px">📋 전체 명단</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div>
          <div style="text-align:center;background:#E6F1FB;color:#185FA5;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👨 남 (${males.length})</div>
          ${colHeader()}
          ${males.map(id=>memberRow(id,'#EEF4FF')).join('')}
        </div>
        <div>
          <div style="text-align:center;background:#FBEAF0;color:#993556;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👩 여 (${females.length})</div>
          ${colHeader()}
          ${females.map(id=>memberRow(id,'#FDF0F5')).join('')}
        </div>
      </div>`;
    }
  }

  else if(statView==='games'){
    const map={};
    ALL.forEach(d=>{
      [...(d.attendees||[]),...(d.leftMembers||[])].filter(a=>!a.name.includes('게스트')&&!HIDDEN_MEMBER_IDS.includes(a.id)).forEach(a=>{
        if(!map[a.id])map[a.id]={name:a.name,gender:a.gender,games:0,minutes:0};
        map[a.id].games+=a.games||0;
        const [ih,im]=(a.time||'18:00').split(':').map(Number);
        const [oh,om]=(a.leftAt||'21:00').split(':').map(Number);
        const mins=(oh*60+om)-(ih*60+im); if(mins>0)map[a.id].minutes+=mins;
      });
    });
    const list=Object.values(map);
    const gph=m=>m.minutes>0?(m.games/(m.minutes/60)).toFixed(1):'0.0';
    const males=list.filter(m=>m.gender==='m').sort((a,b)=>parseFloat(gph(b))-parseFloat(gph(a)));
    const females=list.filter(m=>m.gender==='f').sort((a,b)=>parseFloat(gph(b))-parseFloat(gph(a)));
    const calcAvg=arr=>arr.length?(arr.reduce((s,m)=>s+parseFloat(gph(m)),0)/arr.length).toFixed(1):'-';

    function gRow(m, bg){
      const col=m.gender==='m'?'#185FA5':'#993556';
      return`<div style="display:flex;align-items:center;justify-content:space-between;background:${bg};border-radius:7px;padding:4px 8px;margin-bottom:3px">
        <span style="font-size:11px;font-weight:700;color:${col};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1">${m.name}</span>
        <span style="font-size:13px;font-weight:700;color:#B25000;white-space:nowrap;margin-left:6px">${gph(m)}회</span>
      </div>`;
    }

    body=`<div class="stitle">🎾 개인별 시간당 게임수 <span style="font-size:9px;color:#B25000;font-weight:400">· 전체 누적 기준</span></div>`;
    body+=threeBoxes(calcAvg(list),calcAvg(males),calcAvg(females),'회');
    if(!list.length){body+=`<div class="empty" style="padding:20px">데이터가 없습니다.</div>`;}
    else{
      body+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div>
          <div style="text-align:center;background:#E6F1FB;color:#185FA5;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👨 남 (${males.length})</div>
          ${males.map(m=>gRow(m,'#EEF4FF')).join('')}
        </div>
        <div>
          <div style="text-align:center;background:#FBEAF0;color:#993556;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👩 여 (${females.length})</div>
          ${females.map(m=>gRow(m,'#FDF0F5')).join('')}
        </div>
      </div>`;
    }
  }

  else if(statView==='together'){
    const pairMap={};
    ch.forEach(entry=>{
      const ng=entry.members.filter(m=>!m.name.includes('게스트')&&!HIDDEN_MEMBER_IDS.includes(m.id));
      if(ng.length<2)return;
      const ids=ng.map(m=>m.id),names={};ng.forEach(m=>{names[m.id]=m.name;});
      for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++){
        const key=[ids[i],ids[j]].sort().join('-');
        if(!pairMap[key])pairMap[key]={ids:[ids[i],ids[j]],names:[names[ids[i]],names[ids[j]]],cnt:0};
        pairMap[key].cnt++;
      }
    });
    const personMap={};
    Object.values(pairMap).forEach(pair=>{
      pair.ids.forEach((id,idx)=>{
        if(!personMap[id])personMap[id]={name:pair.names[idx],pairs:[]};
        personMap[id].pairs.push({name:pair.names[1-idx],cnt:pair.cnt});
      });
    });
    const persons=Object.values(personMap).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    body=`<div class="stitle">👫 개인별 같이 게임한 인원 <span style="font-size:9px;color:#B25000;font-weight:400">· 전체 누적 · 상위2/하위2</span></div>`;
    if(!persons.length){body+=`<div class="empty" style="padding:20px">코트 확정 기록이 없습니다.</div>`;}
    else body+=persons.map(p=>{
      const sorted=p.pairs.sort((a,b)=>b.cnt-a.cnt);
      const top=sorted.slice(0,2);
      const bot=[...sorted].reverse().filter(x=>!top.find(t=>t.name===x.name)).slice(0,2);
      const topHtml=top.map(x=>`<span style="background:#E1F5EE;color:#0F6E56;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700">${x.name} ${x.cnt}회</span>`).join(' ');
      const botHtml=bot.map(x=>`<span style="background:#FAECE7;color:#993C1D;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700">${x.name} ${x.cnt}회</span>`).join(' ');
      return`<div style="background:#fff;border:.5px solid #E0DFDB;border-radius:9px;padding:7px 10px;margin-bottom:5px">
        <div style="font-size:12px;font-weight:700;color:#1A1A1A;margin-bottom:4px">${p.name}</div>
        <div style="display:flex;flex-direction:column;gap:3px">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span style="font-size:9px;color:#888780;min-width:24px">최다</span>${topHtml}</div>
          ${bot.length?`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span style="font-size:9px;color:#888780;min-width:24px">최소</span>${botHtml}</div>`:''}
        </div>
      </div>`;
    }).join('');
  }

  return`<div class="pg-inner">
    <div class="stitle">📊 통계</div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${pBtns}</div>
    ${rangeBox}${avgBox}${detailBox}${divider}
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${vBtns}</div>
    <div>${body}</div>
  </div>`;
}

/* ════ 관리 탭: 회원 추가/검색·수정·삭제 + 일자별 DB 삭제 ════ */
/* ── 전체 회원 코트 배정/확정 음성 안내 ──
   이전 상태와 비교해서 새로 꽉 찬 코트(배정) / 새로 확정된 코트(확정)를 감지 */
let prevCourtSnapshot={}; // {courtNum: {cnt, confirmed, key}}
function checkGlobalCourtAnnouncements(){
  if(!notifyEnabled) return;
  [1,2,3,4,5,6].forEach(n=>{
    // 1~4코트는 court 필드, 5/6(다음차례1·2)은 nextCourt1/nextCourt2 필드로 판별
    const pl = n<=4
      ? S.attendees.filter(x=>x.court===n)
      : S.attendees.filter(x=>n===5 ? x.nextCourt1 : x.nextCourt2);
    const cnt=pl.length;
    const confirmed=!!CC[n];
    const key=pl.map(a=>a.id).sort().join(',');
    const prev=prevCourtSnapshot[n];

    if(prev){
      if(cnt===CMAX && !confirmed && (prev.key!==key || prev.cnt<CMAX)){
        const names=pl.map(a=>a.name).join(', ');
        const msg=`${CNAMES[n]}에 ${names} 배정되었습니다`;
        speakStatus(msg, {icon:'🎾', label:msg, bg:CBGS[n], tc:CCOLORS[n]});
      }
      if(confirmed && !prev.confirmed){
        const names=pl.map(a=>a.name).join(', ');
        const msg = n<=4
          ? `${CNAMES[n]}에 ${names} 확정되어 입장하십시오`
          : `${CNAMES[n]}에 ${names} 확정되었습니다`;
        speakStatus(msg, {icon:'✅', label:msg, bg:CBGS[n], tc:CCOLORS[n]});
      }
    }
    prevCourtSnapshot[n]={cnt, confirmed, key};
  });
}

let boardModeOn=false;
function toggleBoardMode(on){
  boardModeOn=on;
  document.getElementById('board-overlay').style.display=on?'block':'none';
  if(on) renderBoard();
}

function renderBoard(){
  if(!boardModeOn) return;
  const el=document.getElementById('board-content');
  if(!el) return;
  const me=getCurrentMember();

  function bigSlot(a){
    const isMe=me&&a.id===me.id;
    const ring=isMe?`box-shadow:0 0 0 clamp(2px,.5vw,5px) #FFD23F;`:'';
    return`<div style="background:#fff;border-radius:clamp(8px,1.2vw,14px);padding:clamp(8px,1.4vw,16px) clamp(10px,1.6vw,18px);margin-bottom:clamp(5px,.8vw,10px);display:flex;align-items:center;gap:clamp(6px,1vw,12px);${ring}">
      <span style="font-size:clamp(14px,2.6vw,26px);font-weight:900;color:${a.gender==='m'?'#185FA5':'#993556'}">${a.name}</span>
      <span style="font-size:clamp(9px,1.4vw,16px);font-weight:700;color:${a.gender==='m'?'#185FA5':'#993556'};background:${a.gender==='m'?'#E6F1FB':'#FBEAF0'};padding:clamp(1px,.3vw,3px) clamp(5px,1vw,11px);border-radius:clamp(4px,.6vw,8px)">${a.gender==='m'?'남':'여'}</span>
      ${isMe?`<span style="margin-left:auto;font-size:clamp(9px,1.4vw,15px);font-weight:900;color:#B8860B;white-space:nowrap">⭐ 나</span>`:''}
    </div>`;
  }
  function emptySlot(){
    return`<div style="border:clamp(1.5px,.25vw,2.5px) dashed rgba(255,255,255,.45);border-radius:clamp(8px,1.2vw,14px);padding:clamp(8px,1.4vw,16px) clamp(10px,1.6vw,18px);margin-bottom:clamp(5px,.8vw,10px);text-align:center;color:rgba(255,255,255,.75);font-size:clamp(10px,1.7vw,18px);font-weight:700">— 빈자리 —</div>`;
  }
  function bigCard(n, isNext){
    if(!isNext && !courtActive[n]){
      return`<div style="background:#D8D5CF;border-radius:clamp(10px,1.8vw,20px);padding:clamp(20px,3vw,36px) clamp(10px,1.8vw,20px);min-width:0;box-shadow:0 clamp(2px,.4vw,6px) clamp(6px,1.2vw,18px) rgba(0,0,0,.1);text-align:center;opacity:.7">
        <div style="color:#6B6862;font-size:clamp(15px,2.8vw,27px);font-weight:900;margin-bottom:6px">${CNAMES[n]}</div>
        <div style="color:#8B8780;font-size:clamp(11px,1.8vw,17px);font-weight:700">오늘 사용 안 함</div>
      </div>`;
    }
    const ncKey=n===5?'nextCourt1':'nextCourt2';
    const pl=isNext ? S.attendees.filter(x=>x[ncKey]) : S.attendees.filter(x=>x.court===n);
    const cnt=pl.length, conf=!!CC[n];
    let body='';
    pl.forEach(a=>{ body+=bigSlot(a); });
    for(let i=cnt;i<CMAX;i++) body+=emptySlot();
    const badgeStyle='padding:clamp(3px,.6vw,7px) clamp(8px,1.4vw,16px);border-radius:clamp(10px,1.8vw,22px);font-size:clamp(10px,1.6vw,17px);font-weight:900;white-space:nowrap';
    const statusBadge=conf
      ? `<span style="background:#1D9E75;color:#fff;${badgeStyle}">✅ 게임 확정</span>`
      : cnt>=CMAX
        ? `<span style="background:#B25000;color:#fff;${badgeStyle}">🔴 배정완료(대기)</span>`
        : `<span style="background:rgba(255,255,255,.35);color:#fff;${badgeStyle};font-weight:800">${cnt}/${CMAX}명 대기</span>`;
    return`<div style="background:${CCOLORS[n]};border-radius:clamp(10px,1.8vw,20px);padding:clamp(10px,1.8vw,20px);min-width:0;box-shadow:0 clamp(2px,.4vw,6px) clamp(6px,1.2vw,18px) rgba(0,0,0,.18)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(8px,1.6vw,16px);flex-wrap:wrap;gap:6px">
        <span style="color:#fff;font-size:clamp(15px,2.8vw,27px);font-weight:900;text-shadow:0 1px 3px rgba(0,0,0,.25)">${CNAMES[n]}</span>
        ${statusBadge}
      </div>
      ${body}
    </div>`;
  }

  let h='';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,280px),1fr));gap:clamp(8px,1.6vw,20px);margin-bottom:clamp(14px,2.4vw,26px)">';
  [1,2,3,4].forEach(n=>{ h+=bigCard(n,false); });
  h+='</div>';
  h+='<div style="color:#2C2C2A;font-size:clamp(13px,2.2vw,22px);font-weight:900;margin-bottom:clamp(8px,1.6vw,16px)">⏭ 다음차례 코트</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,280px),1fr));gap:clamp(8px,1.6vw,20px)">';
  [5,6].forEach(n=>{ h+=bigCard(n,true); });
  h+='</div>';

  el.innerHTML=h;
}

      <button onclick="const n=document.getElementById('new-member-name').value;const g=document.getElementById('new-member-gender').value;const o=document.getElementById('new-member-officer').checked;if(addNewMember(n,g,o)){document.getElementById('new-member-name').value='';document.getElementById('new-member-officer').checked=false;}"
        style="padding:7px 14px;background:#1D9E75;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">추가</button>
    </div>
  </div>`;

  // 회원 검색/수정/삭제 박스
  const searchKw=(statMemberSearch||'').trim();
  const searchBox=`<div style="background:#fff;border:.5px solid #E0DFDB;border-radius:10px;padding:10px;margin-bottom:10px">
    <div class="stitle" style="margin-bottom:8px;justify-content:space-between">🔍 회원 검색·수정·삭제 <span style="font-size:11px;color:#888780;font-weight:500">임원/일반 회원 설정 가능</span></div>
    <input type="text" id="member-search-input" placeholder="회원 이름 검색" value="${searchKw}"

    <div id="member-search-results"></div>
  </div>`;

  // 일자별 DB 삭제 박스 (초기값: 오늘 날짜)
  if(!adminDeleteDate) adminDeleteDate=dateStr();
  const allDates=[];
  try{
    const st=JSON.parse(localStorage.getItem(STKEY)||'[]');
    st.forEach(x=>{ if(x.date && !allDates.includes(x.date)) allDates.push(x.date); });
  }catch(e){}
  if(!allDates.includes(adminDeleteDate)) allDates.push(adminDeleteDate);
  allDates.sort((a,b)=>b.localeCompare(a));

  const deleteDateBox=`<div style="background:#fff;border:.5px solid #E0DFDB;border-radius:10px;padding:10px;margin-bottom:10px">
    <div class="stitle" style="margin-bottom:8px">🗑 일자별 DB 삭제</div>
    <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">
      <input type="date" id="admin-delete-date" value="${adminDeleteDate}"
        onchange="adminDeleteDate=this.value;"

      <button onclick="deleteDBByDate(document.getElementById('admin-delete-date').value)"
        style="padding:7px 14px;background:#C0392B;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">삭제</button>
    </div>
    <div style="font-size:9px;color:#888780">선택한 날짜의 참석·통계·코트기록 데이터를 완전히 삭제합니다 (오늘 날짜 선택 시 현재 진행중인 참석 데이터도 함께 초기화됩니다)</div>
  </div>`;

  // 엑셀 다운로드 박스 (조회기간 설정 — 통계탭과 동일한 패턴)
  const now=new Date();
  const todayStr=dateStr();
  let exFrom='', exTo='';
  if(adminExportFrom && adminExportTo){ exFrom=adminExportFrom; exTo=adminExportTo; }
  else{
    if(adminExportPeriod==='day'){ exFrom=exTo=todayStr; }
    else if(adminExportPeriod==='week'){ const d=new Date(now); d.setDate(d.getDate()-6); exFrom=dateStr(d); exTo=todayStr; }
    else if(adminExportPeriod==='month'){ exFrom=todayStr.slice(0,7)+'-01'; exTo=todayStr; }
    else{ exFrom='2000-01-01'; exTo='2099-12-31'; }
  }
  const exPBtns=['day','week','month','all'].map(p=>{
    const lbl={day:'오늘',week:'1주',month:'이번달',all:'전체'}[p];
    const on=adminExportPeriod===p&&!adminExportFrom;
    return`<button onclick="adminExportPeriod='${p}';adminExportFrom='';adminExportTo='';document.getElementById('pg4').innerHTML=renderAdminPage();" style="padding:5px 10px;border-radius:7px;border:1.5px solid ${on?'#1D9E75':'#D8D5CF'};background:${on?'#1D9E75':'#fff'};color:${on?'#fff':'#666'};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">${lbl}</button>`;
  }).join('');

  const exportBox=`<div style="background:#fff;border:.5px solid #E0DFDB;border-radius:10px;padding:10px;margin-bottom:10px">
    <div class="stitle" style="margin-bottom:8px">📥 엑셀 파일로 다운로드</div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${exPBtns}</div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
      <input type="date" id="admin-export-from" value="${exFrom}" style="flex:1;padding:6px 8px;border:.5px solid #D8D5CF;border-radius:7px;font-size:12px;font-family:inherit" onchange="adminExportFrom=this.value;adminExportTo=document.getElementById('admin-export-to').value||this.value;adminExportPeriod='';document.getElementById('pg4').innerHTML=renderAdminPage();">
      <span style="font-size:12px;color:#888780">~</span>
      <input type="date" id="admin-export-to" value="${exTo}" style="flex:1;padding:6px 8px;border:.5px solid #D8D5CF;border-radius:7px;font-size:12px;font-family:inherit" onchange="adminExportTo=this.value;adminExportFrom=document.getElementById('admin-export-from').value||this.value;adminExportPeriod='';document.getElementById('pg4').innerHTML=renderAdminPage();">
    </div>
    <button onclick="exportExcel('${exFrom}','${exTo}')" style="width:100%;padding:10px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">📥 엑셀 다운로드 (${exFrom} ~ ${exTo})</button>
    <div style="font-size:9px;color:#888780;margin-top:6px">일자·총참석률(남/여)·참석인원·출석시각·퇴소시각·게임수 포함 (게스트 제외)</div>
  </div>`;

  return`<div class="pg-inner">
    <div class="stitle">⚙️ 관리</div>
    ${renderNoticeAdminBox()}
    ${addMemberBox}
    ${searchBox}
    ${deleteDateBox}

}

function exportExcel(fromDate, toDate){
  if(!fromDate || !toDate){ toast('조회 기간을 선택해주세요'); return; }
  toast('엑셀 생성 중...');

  // localStorage + Firebase 통계 병합 후 기간 필터링 → 엑셀 생성
  firebase.database().ref('tennis_stats').once('value').then(snap=>{
    const fbData=snap.val()||{};
    let st=[];
    try{ st=JSON.parse(localStorage.getItem(STKEY)||'[]'); }catch(e){}
    const localDates=new Set(st.map(x=>x.date));
    Object.values(fbData).forEach(entry=>{
      if(entry&&entry.date){
        const idx=st.findIndex(x=>x.date===entry.date);
        if(idx>=0) st[idx]=entry; else st.push(entry);
      }
    });

    const filtered=st.filter(x=>x.date>=fromDate && x.date<=toDate).sort((a,b)=>a.date.localeCompare(b.date));
    if(!filtered.length){ toast('선택한 기간에 데이터가 없습니다'); return; }

    const REGULAR_COUNT=MEMBERS.filter(m=>!m.name.includes('게스트')&&!HIDDEN_MEMBER_IDS.includes(m.id)).length;
    const rows=[]; // 일자별 요약 시트
    const detailRows=[]; // 일자별 상세(개인별) 시트

    filtered.forEach(entry=>{
      const all=[...(entry.attendees||[]),...(entry.leftMembers||[])]
        .filter(a=>!a.name.includes('게스트')&&!HIDDEN_MEMBER_IDS.includes(a.id));
      const mCnt=all.filter(a=>a.gender==='m').length;
      const fCnt=all.filter(a=>a.gender==='f').length;
      const totalCnt=all.length;
      const totalRate=REGULAR_COUNT>0 ? Math.round(totalCnt/REGULAR_COUNT*100) : 0;

      rows.push({
        '일자': entry.date,
        '총참석률(%)': totalRate,
        '남자참석률(%)': REGULAR_COUNT>0?Math.round(mCnt/REGULAR_COUNT*100):0,
        '여자참석률(%)': REGULAR_COUNT>0?Math.round(fCnt/REGULAR_COUNT*100):0,
        '참석인원': totalCnt,
        '남자인원': mCnt,
        '여자인원': fCnt,
      });

      all.forEach(a=>{
        detailRows.push({
          '일자': entry.date,
          '이름': a.name,
          '성별': a.gender==='m'?'남':'여',
          '출석시각': a.time||'',
          '퇴소시각': a.leftAt||'',
          '게임수': a.games||0,
        });
      });
    });

    const wb = XLSX.utils.book_new();
    const ws1 = XLSX.utils.json_to_sheet(rows);
    ws1['!cols']=[{wch:12},{wch:12},{wch:14},{wch:14},{wch:10},{wch:10},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws1, '일자별 요약');

    const ws2 = XLSX.utils.json_to_sheet(detailRows);
    ws2['!cols']=[{wch:12},{wch:10},{wch:6},{wch:10},{wch:10},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws2, '개인별 상세');

    const filename=`테니스클럽_출석현황_${fromDate}_${toDate}.xlsx`;
    XLSX.writeFile(wb, filename);
    toast('✅ 엑셀 다운로드 완료');
  }).catch(e=>{
    console.error(e);
    toast('엑셀 생성 중 오류가 발생했습니다');
  });
}

function deleteDBByDate(targetDate){
  if(!targetDate){ toast('날짜를 선택해주세요'); return; }
  openModal(`⚠️ ${targetDate} 데이터를 완전 삭제하시겠습니까?\n(참석·통계·코트기록 모두 삭제, 복구 불가)`,()=>{
    const today=dateStr();
    // 1. 오늘 날짜를 삭제하는 경우 → 현재 진행중인 S도 초기화
    if(targetDate===today){
      S={attendees:[],leftMembers:[],seqCounter:0};
      CC={1:false,2:false,3:false,4:false,5:false,6:false};
      save();
      try{ firebase.database().ref('tennis/'+today).remove(); }catch(e){}
    }
    // 2. localStorage 통계에서 해당 날짜 삭제
    try{
      const st=JSON.parse(localStorage.getItem(STKEY)||'[]');
      localStorage.setItem(STKEY, JSON.stringify(st.filter(x=>x.date!==targetDate)));
    }catch(e){}
    // 3. Firebase 통계에서 해당 날짜 삭제
    try{ firebase.database().ref('tennis_stats/'+targetDate).remove(); }catch(e){}
    // 4. 코트 히스토리(같이한 인원)에서 해당 날짜 기록 삭제
    try{
      const ch=JSON.parse(localStorage.getItem('tennis_court_hist')||'[]');
      localStorage.setItem('tennis_court_hist', JSON.stringify(ch.filter(x=>x.date!==targetDate)));
    }catch(e){}
    renderAll();
    toast(`🗑 ${targetDate} 데이터 삭제 완료`);
  });
}

/* ── 통합 음성+팝업 알림 큐 시스템 (출석/퇴소 + 본인상태 + 전체코트안내 모두 공유) ── */
let notifyEnabled=true; // 알림 on/off
let lastMyStatusKey=null; // 본인 상태 변화 감지용
let initialRenderDone=false; // 첫 렌더에서는 알림 안 뜨게
let speechUnlocked=false; // 음성엔진이 사용자 제스처로 활성화됐는지 여부

/* 모바일 브라우저는 사용자 클릭 없이 speechSynthesis.speak()를 호출하면
   음성을 차단하는 경우가 있다. 로그인(사용자가 직접 누른 버튼) 시점에
   무음(volume 0) 더미 발화를 한 번 실행해 음성 엔진을 미리 '잠금해제'해 둔다.
   이렇게 하면 이후 Firebase 변경 감지로 자동 트리거되는 음성도 정상 재생된다. */
function unlockSpeechSynthesis(){
  if(speechUnlocked) return;
  try{
    if(!('speechSynthesis' in window)) return;
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0; u.lang='ko-KR';
    window.speechSynthesis.speak(u);
    speechUnlocked=true;
  }catch(e){}
}

const notifyQueue=[];
let notifyQueueRunning=false;

function speakStatus(text, popupInfo){
  if(!notifyEnabled) return;
  notifyQueue.push({text, popupInfo});
  runNotifyQueue();
}
function runNotifyQueue(){
  if(notifyQueueRunning) return;
  const next=notifyQueue.shift();
  if(!next) return;
  notifyQueueRunning=true;
  if(next.popupInfo){
    renderStatusPopupDOM(next.popupInfo.icon, next.popupInfo.label, next.popupInfo.bg, next.popupInfo.tc);
  }
  try{
    if(!('speechSynthesis' in window)){
      setTimeout(()=>{ closeStatusPopupDOM(); notifyQueueRunning=false; runNotifyQueue(); }, 3000);
      return;
    }
    const utter=new SpeechSynthesisUtterance(next.text);
    utter.lang='ko-KR'; utter.rate=1.15; utter.pitch=1.0;
    utter.onend=()=>{ closeStatusPopupDOM(); notifyQueueRunning=false; runNotifyQueue(); };
    utter.onerror=()=>{ closeStatusPopupDOM(); notifyQueueRunning=false; runNotifyQueue(); };
    window.speechSynthesis.speak(utter);
    setTimeout(()=>{ if(notifyQueueRunning){ closeStatusPopupDOM(); notifyQueueRunning=false; runNotifyQueue(); } }, 8000);
  }catch(e){ closeStatusPopupDOM(); notifyQueueRunning=false; runNotifyQueue(); }
}
function vibrateDevice(pattern){
  if(!notifyEnabled) return;
  try{ if('vibrate' in navigator) navigator.vibrate(pattern); }catch(e){}
}
function renderStatusPopupDOM(icon, label, bg, tc){
  if(!notifyEnabled) return;
  const old=document.getElementById('status-popup-overlay');
  if(old) old.remove();
  const overlay=document.createElement('div');
  overlay.id='status-popup-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:900;animation:fadeIn .2s';
  overlay.innerHTML=`<div style="background:${bg};border-radius:20px;padding:28px 30px;max-width:300px;width:85%;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.3);animation:popIn .25s">
    <div style="font-size:48px;margin-bottom:10px">${icon}</div>
    <div style="font-size:18px;font-weight:900;color:${tc};line-height:1.5;word-break:keep-all">${label}</div>
    <button onclick="document.getElementById('status-popup-overlay').remove()" style="margin-top:18px;padding:9px 22px;background:${tc};color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">확인</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.remove(); };
}
function closeStatusPopupDOM(){
  const el=document.getElementById('status-popup-overlay');
  if(el) el.remove();
}
let prevAttendIds=null; // 직전 출석자 id Set (변화 감지용)
let prevLeftIds=null;   // 직전 퇴소자 id Set
function checkAttendanceAnnouncements(){
  const curAttendIds=new Set(S.attendees.filter(x=>!HIDDEN_MEMBER_IDS.includes(x.id)).map(x=>x.id));
  const curLeftIds=new Set(S.leftMembers.filter(x=>!HIDDEN_MEMBER_IDS.includes(x.id)).map(x=>x.id));

  if(prevAttendIds!==null){
    // 새로 출석한 회원
    curAttendIds.forEach(id=>{
      if(!prevAttendIds.has(id)){
        const a=S.attendees.find(x=>x.id===id);
        if(a) speakStatus(`${a.name} 회원님 출석하였습니다`);
      }
    });
  }
  if(prevLeftIds!==null){
    // 새로 퇴소한 회원
    curLeftIds.forEach(id=>{
      if(!prevLeftIds.has(id)){
        const a=S.leftMembers.find(x=>x.id===id);
        if(a) speakStatus(`${a.name} 회원님 퇴소하였습니다`);
      }
    });
  }
  prevAttendIds=curAttendIds;
  prevLeftIds=curLeftIds;
}

// (checkExistingLogin으로 재입장한 경우는 doLogin을 안 거치므로 이 장치가 필요함)
