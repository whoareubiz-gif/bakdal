<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎾 테니스 동호회</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{
  font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;
  background:#E8E5E0;
  height:100%;
  overflow:hidden;
  display:flex;justify-content:center;
}
#app{
  width:100%;max-width:480px;
  height:100vh;
  display:flex;flex-direction:column;
  background:#f8f7f4;
  overflow:hidden;
}

/* ── 헤더 ── */
.hdr{background:#1D9E75;padding:10px 13px 9px;flex-shrink:0;}
.hdr-top{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.hdr-title{color:#fff;font-size:15px;font-weight:700;flex:1;}
.hdr-meta{display:flex;align-items:center;gap:5px;}
.hdr-date{color:rgba(255,255,255,.82);font-size:10px;}
.hdr-clock{color:rgba(255,255,255,.6);font-size:10px;font-variant-numeric:tabular-nums;}
.stat-row{display:flex;gap:4px;}
.sc{flex:1;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:5px 2px;text-align:center;cursor:pointer;user-select:none;}
.sc:active{background:rgba(255,255,255,.35);}
.sn{font-size:17px;font-weight:700;color:#fff;line-height:1.1;}
.sn.m{color:#B5D4F4;}.sn.f{color:#F4C0D1;}.sn.lv{color:#FFD580;}
.sl{font-size:9px;color:rgba(255,255,255,.76);margin-top:1px;}

/* ── 탭 ── */
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #E0DFDB;flex-shrink:0;}
.tab{flex:1;padding:9px 3px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:10px;color:#888780;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:2.5px solid transparent;transition:color .15s;}
.tab span{font-size:17px;}
.tab.active{color:#1D9E75;font-weight:700;border-bottom-color:#1D9E75;}

/* ── 슬라이드 래퍼 ── */
.slide-wrap{flex:1;overflow:hidden;position:relative;min-height:0;}
.slide-track{display:flex;width:300%;height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.slide-page{width:calc(100% / 3);flex-shrink:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 0 20px;}

/* ── 섹션타이틀 ── */
.stitle{display:flex;align-items:center;gap:5px;font-size:11px;color:#888780;font-weight:600;padding-bottom:5px;border-bottom:.5px solid #E0DFDB;margin-bottom:7px;margin-top:3px;}

/* ── 분할 (남/여) ── */
.split-wrap{display:grid;grid-template-columns:1fr 1fr;}
.split-col{padding:7px 5px 60px;}
.split-col.lcol{border-right:.5px solid #E0DFDB;}
.split-hdr{text-align:center;padding:5px 3px;border-radius:7px;margin-bottom:5px;font-size:11px;font-weight:700;}
.split-hdr.m{background:#E6F1FB;color:#185FA5;}
.split-hdr.f{background:#FBEAF0;color:#993556;}

/* ── 분할 카드 ── */
.scard{display:flex;align-items:center;justify-content:space-between;padding:5px 6px;background:#fff;border:.5px solid #E0DFDB;border-radius:8px;margin-bottom:4px;gap:4px;}
.sname{font-size:12px;font-weight:700;color:#1A1A1A;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── 성별태그 ── */
.gt{font-size:9px;font-weight:700;padding:1px 4px;border-radius:5px;flex-shrink:0;}
.gt.m{background:#E6F1FB;color:#185FA5;}.gt.f{background:#FBEAF0;color:#993556;}

/* ── 칩 ── */
.chip{font-size:9px;font-weight:700;padding:1px 4px;border-radius:5px;}
.chip.g{background:#E1F5EE;color:#0F6E56;}.chip.r{background:#FAECE7;color:#993C1D;}

/* ── 출석 버튼 ── */
.btn-att{background:#1D9E75;color:#fff;border:none;padding:4px 7px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;}
.btn-att:active{opacity:.8;}
.btn-att.done{background:#B4B2A9;cursor:default;}

/* ── 참석자 카드 ── */
.acard{display:flex;align-items:center;padding:7px 8px;background:#fff;border:.5px solid #E0DFDB;border-radius:10px;margin-bottom:5px;gap:5px;}
.seq-b{width:18px;height:18px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.ainfo{flex:1;min-width:0;}
.aname{font-size:13px;font-weight:700;color:#1A1A1A;}
.atime-row{font-size:9px;color:#888780;background:#F0EDE8;padding:1px 5px;border-radius:4px;display:inline-block;margin-top:2px;}

/* ── 코트버튼 (참석자 행 안) ── */
.cbtn-wrap{display:flex;gap:2px;flex-shrink:0;}
.cbtn{padding:4px 4px;border-radius:6px;font-size:10px;font-weight:700;border:1.5px solid #D8D5CF;cursor:pointer;font-family:inherit;text-align:center;background:#F0EDE8;color:#888780;white-space:nowrap;-webkit-appearance:none;transition:all .12s;}
.cbtn:active{opacity:.7;}
.cbtn.c1.on{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.cbtn.c2.on{background:#185FA5;color:#fff;border-color:#185FA5;}
.cbtn.c3.on{background:#B25000;color:#fff;border-color:#B25000;}
.cbtn.c4.on{background:#7B3FA0;color:#fff;border-color:#7B3FA0;}
.cbtn.full-disabled{opacity:.35;cursor:not-allowed;}

/* ── 게임수 / 퇴소버튼 ── */
.gcnt-only{font-size:11px;font-weight:700;color:#1A1A1A;background:#F0EDE8;padding:3px 6px;border-radius:5px;flex-shrink:0;white-space:nowrap;}
.btn-lv{background:#FAECE7;color:#993C1D;border:.5px solid #EFBCB0;padding:4px 7px;border-radius:7px;font-size:11px;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-appearance:none;}
.btn-lv:active{opacity:.7;}

/* ── 시간대 그룹 ── */
.tg{margin-bottom:8px;}
.tg-hdr{font-size:10px;font-weight:700;background:#E1F5EE;color:#0F6E56;padding:3px 8px;border-radius:6px;margin-bottom:3px;}

/* ── 퇴소 행 ── */
.lrow{opacity:.65;}
.lname{font-size:12px;font-weight:600;text-decoration:line-through;color:#888780;flex:1;}

/* ── 빈상태 ── */
.empty{text-align:center;padding:44px 16px;color:#888780;font-size:13px;}

/* ══ 코트 현황 ══ */
.court-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:9px 11px 5px;}
.ct-card{border-radius:12px;overflow:hidden;border:1px solid #E0DFDB;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.07);}
.ct-hdr{padding:7px 8px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.ct-hdr.c1{background:#1D9E75;}.ct-hdr.c2{background:#185FA5;}
.ct-hdr.c3{background:#B25000;}.ct-hdr.c4{background:#7B3FA0;}
.ct-name{color:#fff;font-size:12px;font-weight:700;flex:1;}
.ct-cnt{color:rgba(255,255,255,.85);font-size:9px;}
.ct-full-badge{background:rgba(0,0,0,.28);color:#fff;font-size:10px;font-weight:900;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ct-hbtn{background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:5px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-appearance:none;}
.ct-confirm-btn{background:rgba(255,255,255,.9);color:#1A1A1A;border:none;border-radius:5px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-appearance:none;}
.ct-body{padding:5px 6px 7px;}
.ct-slot{display:flex;align-items:center;gap:4px;padding:4px 5px;border-radius:6px;background:#F5F4F1;margin-bottom:2px;font-size:10px;font-weight:600;color:#1A1A1A;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ct-slot:active{background:#E0DFDB;}
.ct-slot-hint{font-size:7px;color:#B8B5AF;margin-left:auto;}
.ct-empty{padding:3px 4px;border-radius:5px;border:1px dashed #D8D5CF;margin-bottom:2px;font-size:8px;color:#B8B5AF;text-align:center;}
.ct-status{margin-top:3px;padding:3px 5px;border-radius:5px;font-size:8px;text-align:center;}
.ct-status.full{background:#FFF0E0;color:#B25000;font-weight:700;}
.ct-status.wait{background:#F5F4F1;color:#888780;}
.ct-status.confirmed{background:#E1F5EE;color:#0F6E56;font-weight:700;}

/* ── 코트 배정 버튼 (추천팀→코트) ── */
.assign-btn{flex:1;padding:9px 3px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;-webkit-appearance:none;border:none;color:#fff;}
.assign-btn .ab-label{font-size:11px;font-weight:700;}
.assign-btn .ab-sub{font-size:10px;opacity:.9;}

/* ── 미배정 ── */
.wseq-b{width:17px;height:17px;border-radius:50%;background:#FFF3E0;color:#B25000;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}

/* ── 추천 팀 카드 ── */
.rec-card{background:#F8F7F4;border:.5px solid #E0DFDB;border-radius:10px;padding:9px 10px;margin-bottom:8px;}
.rec-title{font-size:11px;font-weight:700;color:#1A1A1A;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.rec-members{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:7px;}
.rec-member{display:flex;align-items:center;gap:3px;background:#fff;border:.5px solid #E0DFDB;border-radius:7px;padding:4px 6px;}
.rec-name{font-size:11px;font-weight:700;color:#1A1A1A;flex:1;}
.rec-time{font-size:8px;color:#888780;}
.assign-row{display:flex;gap:4px;}

/* ── 하단버튼 ── */
.bottom-btns{padding:7px 11px 10px;border-top:.5px solid #E0DFDB;flex-shrink:0;background:#fff;}
.btn-reassign{width:100%;padding:9px;background:#EEF4FF;color:#185FA5;border:.5px solid #B5CFF5;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:4px;-webkit-appearance:none;display:block;}
.btn-reset{width:100%;padding:9px;background:#FFF3E0;color:#B25000;border:.5px solid #F5C98A;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-appearance:none;display:block;}
.bhint{font-size:8px;color:#888780;text-align:center;margin-top:3px;}

/* ── 토스트 ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:#2C2C2A;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;white-space:nowrap;z-index:600;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;max-width:90%;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 모달 ── */
#moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:700;}
#moverlay.show{display:flex;}
.mbox{background:#fff;border-radius:16px;padding:22px 18px;max-width:300px;width:88%;box-shadow:0 12px 48px rgba(0,0,0,.22);}
.mmsg{font-size:13px;color:#1A1A1A;line-height:1.7;white-space:pre-line;margin-bottom:18px;}
.mbtns{display:flex;gap:8px;}
.mcancel{flex:1;padding:10px;background:#F5F5F3;border:.5px solid #E0DFDB;border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit;-webkit-appearance:none;}
.mok{flex:1;padding:10px;background:#1D9E75;border:none;border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit;color:#fff;font-weight:700;-webkit-appearance:none;}

/* ── 패딩 래퍼 ── */
.pg-inner{padding:9px 11px 6px;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <span style="font-size:19px">🎾</span>
      <span class="hdr-title">테니스 동호회</span>
      <div class="hdr-meta">
        <span class="hdr-date" id="hdr-date"></span>
        <span class="hdr-clock" id="hdr-clock"></span>
      </div>
    </div>
    <div class="stat-row">
      <div class="sc" onclick="goTab(1)"><div class="sn" id="st0">0</div><div class="sl">참석 총</div></div>
      <div class="sc" onclick="showGender('m')"><div class="sn m" id="st1">0</div><div class="sl">남</div></div>
      <div class="sc" onclick="showGender('f')"><div class="sn f" id="st2">0</div><div class="sl">여</div></div>
      <div class="sc" onclick="showLeft()"><div class="sn lv" id="st3">0</div><div class="sl">퇴소</div></div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" id="tab0" onclick="goTab(0)"><span>👥</span>회원명부</button>
    <button class="tab" id="tab1" onclick="goTab(1)"><span>📋</span>오늘 참석자</button>

  <div class="slide-wrap" id="slide-wrap">
    <div class="slide-track" id="slide-track">
      <div class="slide-page" id="pg0"></div>
      <div class="slide-page" id="pg1"></div>
      <div class="slide-page" id="pg2"></div>
    </div>
  </div>

  <div id="bottom-btns"></div>
</div>

<div id="toast"></div>
<div id="moverlay">
  <div class="mbox">
    <div class="mmsg" id="mmsg"></div>
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal()">취소</button>
      <button class="mok" id="mok">확인</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════
   회원 데이터
════════════════════════════════ */
const MEMBERS=[
  {id:1,name:'강태욱',gender:'m'},{id:2,name:'고윤정',gender:'f'},
  {id:3,name:'권성렬',gender:'m'},{id:4,name:'권윤지',gender:'f'},
  {id:5,name:'김광숙',gender:'f'},{id:6,name:'김금수',gender:'m'},

  {id:41,name:'윤기보',gender:'m'},{id:42,name:'이경희',gender:'f'},

  {id:69,name:'게스트1',gender:'m'},{id:70,name:'게스트2',gender:'m'},

  {id:73,name:'게스트1',gender:'f'},{id:74,name:'게스트2',gender:'f'},
  {id:75,name:'게스트3',gender:'f'},{id:76,name:'게스트4',gender:'f'},
];

const TBANDS=[
  {label:'17:30~18:00',s:17*60+30,e:18*60},
  {label:'18:00~19:00',s:18*60,e:19*60},
  {label:'19:00~20:00',s:19*60,e:20*60},
  {label:'20:00~21:00',s:20*60,e:21*60},
];
const CMAX=4;
const CNAMES={1:'1코트',2:'2코트',3:'3코트',4:'4코트'};
const CCOLORS=['','#1D9E75','#185FA5','#B25000','#7B3FA0'];
const CBGS=['','#E1F5EE','#E6F1FB','#FFF0E0','#F3E8FD'];
const SK='tennis_v6',HK='tennis_hist';

let S={attendees:[],leftMembers:[],seqCounter:0};
let CC={1:false,2:false,3:false,4:false};
let curTab=0, leftOnly=false, todayGender=null;
let autoFired=false, toastT=null, modalFn=null;

/* ══ 유틸 ══ */
function pad(n){return String(n).padStart(2,'0');}
function dateStr(d=new Date()){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function timeStr(d=new Date()){return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function nowTs(){return Math.floor(Date.now()/1000);}
function tmins(s){if(!s)return 9999;const[h,m]=s.split(':').map(Number);return h*60+m;}
function getBand(t){const m=tmins(t);return TBANDS.find(b=>m>=b.s&&m<b.e)||null;}
function todayLbl(){const d=new Date(),ds=['일','월','화','수','목','금','토'];return`${d.getMonth()+1}/${d.getDate()}(${ds[d.getDay()]})`;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ══ 스토리지 ══ */
function load(){
  try{const r=localStorage.getItem(SK);if(!r)return;
    const o=JSON.parse(r);
    if(o.date===dateStr()){S=o.state;CC=o.CC||{1:false,2:false,3:false,4:false};}
  }catch(e){}
}
function save(){
  try{localStorage.setItem(SK,JSON.stringify({date:dateStr(),state:S,CC}));}catch(e){}
}
function archive(s,dt){
  try{const h=JSON.parse(localStorage.getItem(HK)||'[]');
    h.push({date:dt,...JSON.parse(JSON.stringify(s))});

/* ── 스와이프 ── */
(function(){
  const wrap=document.getElementById('slide-wrap');
  let sx=0,sy=0,dragging=false,moved=false;
  function start(x,y){sx=x;sy=y;dragging=true;moved=false;}
  function end(ex){
    if(!dragging)return;dragging=false;
    if(!moved)return;
    const dx=ex-sx;
    if(Math.abs(dx)>40){goTab(Math.max(0,Math.min(2,curTab+(dx<0?1:-1))));}
  }
  wrap.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  wrap.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const dx=Math.abs(e.touches[0].clientX-sx),dy=Math.abs(e.touches[0].clientY-sy);
    if(dx>dy&&dx>5)moved=true;
  },{passive:true});
  wrap.addEventListener('touchend',e=>{end(e.changedTouches[0].clientX);});
  wrap.addEventListener('mousedown',e=>{start(e.clientX,e.clientY);});
  wrap.addEventListener('mousemove',e=>{if(dragging&&Math.abs(e.clientX-sx)>5)moved=true;});
  wrap.addEventListener('mouseup',e=>{end(e.clientX);});
})();

/* ══ 미배정 정렬 ══ */
function getSortedWaiting(){
  function getTs(a){
    if(a.courtFreeTs) return a.courtFreeTs;
    const t=a.courtFreeAt||a.time||'00:00';
    const[h,m]=t.split(':').map(Number);
    return h*3600+m*60;
  }
  // hasCourt 없는 레거시 데이터 보정:
  // courtFreeAt과 time이 같으면 코트 경험 없음으로 간주
  S.attendees.forEach(a=>{
    if(a.hasCourt===undefined){
      a.hasCourt = !!(a.courtFreeAt && a.courtFreeAt !== a.time);
    }
  });
  return S.attendees.filter(x=>x.court===null)
    .sort((a,b)=>getTs(a)-getTs(b));
}

/* ══ 추천 로직 ══
   핵심 규칙 (getSortedWaiting = courtFreeTs 오름차순):
   M명 대기 중 n명 선택 시 → 탈락 가능 최대 2명
   상위 max(0, M-2)명 무조건 고정, 나머지 랜덤
   팀1:남자4, 팀2:여자4, 팀3:남2여2
*/
function buildRecommendedTeams(){
  const waiting=getSortedWaiting();
  if(!waiting.length)return[];

  const mAll=waiting.filter(x=>x.gender==='m');
  const fAll=waiting.filter(x=>x.gender==='f');

  function pick(n,gList){
    const M=gList.length;
    if(M===0)return[];
    if(M<=n)return shuffle(gList).slice(0,n);
    // 탈락 가능 최대 2명 → 상위 (M-2)명 고정
    const fixedCount=Math.min(Math.max(0,M-2),n);
    const fixed=gList.slice(0,fixedCount);
    const pool=gList.slice(fixedCount);
    const remaining=n-fixedCount;
    const rPick=shuffle(pool).slice(0,remaining);
    return [...fixed,...rPick];
  }

  const teams=[];
  if(mAll.length>=1){
    const t=pick(4,mAll);
    if(t.length>0)teams.push({label:'추천1팀 — 남자',color:'#185FA5',badge:'👨',team:t});
  }
  if(fAll.length>=1){
    const t=pick(4,fAll);
    if(t.length>0)teams.push({label:'추천2팀 — 여자',color:'#993556',badge:'👩',team:t});
  }
  if(mAll.length>=1&&fAll.length>=1){
    const tm=pick(2,mAll);
    const tf=pick(2,fAll);
    const t=[...tm,...tf];
    if(t.length>=2)teams.push({label:'추천3팀 — 혼성(남2여2)',color:'#7B3FA0',badge:'👫',team:t});
  }
  return teams;
}

  /* ── 미배정 남/여 분할 ── */

    function waitCard(a){

      </div>`;
    }
    h+=`<div class="pg-inner" style="padding-top:0">
      <div class="stitle">⏳ 미배정 대기 (${waiting.length}명)<span style="font-size:8px;color:#B25000;margin-left:4px">·대기순</span></div>
      <div class="split-wrap">
        <div class="split-col lcol" style="padding:0 4px 10px 0">
          <div class="split-hdr m" style="font-size:10px">👨 남 (${mW.length})</div>
          ${mW.map(waitCard).join('')}
        </div>
        <div class="split-col" style="padding:0 0 10px 4px">
          <div class="split-hdr f" style="font-size:10px">👩 여 (${fW.length})</div>
          ${fW.map(waitCard).join('')}
        </div>
      </div>
    </div>`;
  }

  /* ── 추천 팀 — 미배정 여부와 무관하게 항상 표시 ── */
  const recTeams=buildRecommendedTeams();
  if(recTeams.length){
    function recCourtBtns(tIds){
      return [1,2,3,4].map(n=>{
        const ex=S.attendees.filter(x=>x.court===n).length;
        const lbl2=ex===0?'빈코트':`${ex}/${CMAX}`;
        return`<button class="assign-btn" onclick="assignTeam(${n},${tIds})" style="background:${CCOLORS[n]}">
          <span class="ab-label">${CNAMES[n]}</span>
          <span class="ab-sub">${lbl2}</span>
        </button>`;
      }).join('');
    }
    h+=`<div class="pg-inner" style="padding-top:0">
      <div class="stitle">📌 다음 게임 추천</div>`;
    recTeams.forEach(({label,color,badge,team})=>{
      if(!team.length)return;
      const tIds=JSON.stringify(team.map(a=>a.id));
      const members=team.map(a=>`
        <div class="rec-member">
          <span class="rec-name">${a.name}</span>${gt(a.gender,true)}
          <span class="rec-time">${a.courtFreeAt||a.time}</span>
        </div>`).join('');
      h+=`<div class="rec-card">
        <div class="rec-title">
          <span style="font-size:14px">${badge}</span>
          <span style="color:${color}">${label}</span>
        </div>
        <div class="rec-members">${members}</div>
        <div style="font-size:9px;color:#888780;margin-bottom:5px;text-align:center">코트를 눌러 바로 배정 (기존 인원은 미배정으로)</div>
        <div class="assign-row">${recCourtBtns(tIds)}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

/* ══ 하단 버튼 ══ */
function renderBottom(){
  const el=document.getElementById('bottom-btns');
  let h='<div class="bottom-btns">';
  if(curTab===2)h+=`<button class="btn-reassign" onclick="reassign()">🔄 전체 재편성 (모든 코트 배정 초기화)</button><div class="bhint" style="margin-bottom:4px">모든 코트 배정 해제</div>`;
  h+=`<button class="btn-reset" onclick="manualReset()">♻️ 수동 초기화 (데이터 보관 후 초기화)</button><div class="bhint">매일 23:59 자동 초기화 · 이력 자동 보관</div></div>`;
  el.innerHTML=h;
}

/* ══ 전체 렌더 ══ */
function renderAll(){
  renderStats();
  document.getElementById('pg0').innerHTML=renderMembers();
  document.getElementById('pg1').innerHTML=renderToday();
  document.getElementById('pg2').innerHTML=renderCourts();
  renderBottom();
}

/* ══ 시작 ══ */
load();
document.getElementById('hdr-date').textContent=todayLbl();
setInterval(tick,1000);tick();
renderAll();
</script>
