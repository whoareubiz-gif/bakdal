<style>

html,body{height:100%;overflow:hidden;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;background:#E8E5E0;display:flex;justify-content:center;}
#app{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;background:#f8f7f4;overflow:hidden;}
.hdr{background:#1D9E75;padding:10px 13px 9px;flex-shrink:0;}
.hdr-top{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.hdr-title{color:#fff;font-size:15px;font-weight:700;flex:1;}
.hdr-date{color:rgba(255,255,255,.82);font-size:10px;}
.hdr-clock{color:rgba(255,255,255,.6);font-size:10px;font-variant-numeric:tabular-nums;}
.stat-row{display:flex;gap:4px;}
.sc{flex:1;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:5px 2px;text-align:center;cursor:pointer;user-select:none;}
.sc:active{background:rgba(255,255,255,.35);}
.sn{font-size:17px;font-weight:700;color:#fff;line-height:1.1;}
.sn.m{color:#B5D4F4;}.sn.f{color:#F4C0D1;}.sn.lv{color:#FFD580;}
.sl{font-size:9px;color:rgba(255,255,255,.76);margin-top:1px;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #E0DFDB;flex-shrink:0;}
.tab{flex:1;padding:9px 3px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:10px;color:#888780;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:2.5px solid transparent;}
.tab span{font-size:17px;}
.tab.active{color:#1D9E75;font-weight:700;border-bottom-color:#1D9E75;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0;}
.stitle{display:flex;align-items:center;gap:5px;font-size:11px;color:#888780;font-weight:600;padding-bottom:5px;border-bottom:.5px solid #E0DFDB;margin-bottom:7px;margin-top:3px;}
/* 남/여 분할 레이아웃 */
.split-layout{display:grid;grid-template-columns:1fr 1fr;min-height:100%;}
.split-col{overflow-y:visible;padding:8px 7px 80px;}
.split-col.left{border-right:.5px solid #E0DFDB;}
.split-hdr{display:flex;align-items:center;justify-content:center;gap:4px;padding:5px 6px;border-radius:8px;margin-bottom:6px;font-size:11px;font-weight:700;}
.split-hdr.m{background:#E6F1FB;color:#185FA5;}
.split-hdr.f{background:#FBEAF0;color:#993556;}
/* 카드 */
.card{display:flex;align-items:center;flex-wrap:wrap;padding:7px 8px;background:#fff;border:.5px solid #E0DFDB;border-radius:9px;margin-bottom:5px;gap:5px;}
.gt{font-size:9px;font-weight:700;padding:1px 4px;border-radius:5px;flex-shrink:0;}
.gt.m{background:#E6F1FB;color:#185FA5;}.gt.f{background:#FBEAF0;color:#993556;}
.chip{font-size:9px;font-weight:700;padding:1px 4px;border-radius:5px;}
.chip.g{background:#E1F5EE;color:#0F6E56;}.chip.r{background:#FAECE7;color:#993C1D;}
.btn-att{background:#1D9E75;color:#fff;border:none;padding:5px 9px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.btn-att.done{background:#B4B2A9;cursor:default;}
/* 참석자 행 */
.seq-b{width:18px;height:18px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.aname{font-size:12px;font-weight:700;color:#1A1A1A;}
.atime{font-size:9px;color:#888780;background:#F0EDE8;padding:1px 4px;border-radius:4px;display:inline-block;margin-top:1px;}
.gcnt-only{font-size:11px;font-weight:700;color:#1A1A1A;background:#F0EDE8;padding:2px 5px;border-radius:5px;flex-shrink:0;}
.btn-lv{background:#FAECE7;color:#993C1D;border:.5px solid #EFBCB0;padding:3px 6px;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-appearance:none;}
/* 코트 버튼 행 */
.court-btns{display:flex;gap:2px;width:100%;padding-top:3px;border-top:.5px solid #F0EDE8;margin-top:1px;}
.cbtn{flex:1;padding:4px 1px;border-radius:6px;font-size:10px;font-weight:700;border:1.5px solid #D8D5CF;cursor:pointer;font-family:inherit;text-align:center;background:#F0EDE8;color:#888780;-webkit-appearance:none;}
.cbtn.c1.on{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.cbtn.c2.on{background:#185FA5;color:#fff;border-color:#185FA5;}
.cbtn.c3.on{background:#B25000;color:#fff;border-color:#B25000;}
.cbtn.c4.on{background:#7B3FA0;color:#fff;border-color:#7B3FA0;}
.cbtn.full-disabled{opacity:.35;cursor:not-allowed;}

.tg-hdr{font-size:10px;font-weight:700;background:#E1F5EE;color:#0F6E56;padding:3px 7px;border-radius:6px;margin-bottom:3px;}

.lname{font-size:12px;font-weight:600;text-decoration:line-through;color:#888780;flex:1;}
/* 빈상태 */
.empty{text-align:center;padding:30px 10px;color:#888780;font-size:12px;}
/* 코트 현황 */

.ct-card{border-radius:11px;overflow:hidden;border:1px solid #E0DFDB;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.06);}
.ct-hdr{padding:7px 9px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.ct-hdr.c1{background:#1D9E75;}.ct-hdr.c2{background:#185FA5;}
.ct-hdr.c3{background:#B25000;}.ct-hdr.c4{background:#7B3FA0;}

.ct-cnt{color:rgba(255,255,255,.85);font-size:9px;}
.ct-full-badge{background:rgba(0,0,0,.28);color:#fff;font-size:10px;font-weight:900;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ct-hbtn{background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:5px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-appearance:none;}
.ct-confirm-btn{background:rgba(255,255,255,.9);color:#1A1A1A;border:1px solid rgba(255,255,255,.9);border-radius:5px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-appearance:none;}
.ct-body{padding:5px 6px 6px;}
.ct-slot{display:flex;align-items:center;gap:4px;padding:4px 5px;border-radius:6px;background:#F5F4F1;margin-bottom:2px;font-size:10px;font-weight:600;color:#1A1A1A;cursor:pointer;}
.ct-slot:active{background:#E8E5E0;}
.ct-slot-hint{font-size:7px;color:#B8B5AF;margin-left:auto;white-space:nowrap;}
.ct-empty{padding:3px 4px;border-radius:5px;border:1px dashed #D8D5CF;margin-bottom:2px;font-size:8px;color:#B8B5AF;text-align:center;}
.ct-status{margin-top:3px;padding:3px 5px;border-radius:5px;font-size:8px;text-align:center;}
.ct-status.full{background:#FFF0E0;color:#B25000;font-weight:700;}
.ct-status.wait{background:#F5F4F1;color:#888780;}
.ct-status.confirmed{background:#E1F5EE;color:#0F6E56;font-weight:700;}
.waiting-section{padding:0 10px 7px;}
.wseq-b{width:17px;height:17px;border-radius:50%;background:#FFF3E0;color:#B25000;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.bottom-btns{padding:6px 11px 5px;border-top:.5px solid #E0DFDB;flex-shrink:0;background:#fff;}
.btn-reassign{width:100%;padding:8px;background:#EEF4FF;color:#185FA5;border:.5px solid #B5CFF5;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:4px;-webkit-appearance:none;display:block;}
.btn-reset{width:100%;padding:8px;background:#FFF3E0;color:#B25000;border:.5px solid #F5C98A;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-appearance:none;display:block;}
.bhint{font-size:8px;color:#888780;text-align:center;margin-top:2px;}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(8px);background:#2C2C2A;color:#fff;padding:7px 14px;border-radius:18px;font-size:11px;white-space:nowrap;z-index:600;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;max-width:90%;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:700;}
#moverlay.show{display:flex;}
.mbox{background:#fff;border-radius:15px;padding:20px 17px;max-width:290px;width:88%;box-shadow:0 10px 40px rgba(0,0,0,.22);}
.mmsg{font-size:13px;color:#1A1A1A;line-height:1.7;white-space:pre-line;margin-bottom:16px;}
.mbtns{display:flex;gap:7px;}
.mcancel{flex:1;padding:9px;background:#F5F5F3;border:.5px solid #E0DFDB;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;color:#1A1A1A;-webkit-appearance:none;}
.mok{flex:1;padding:9px;background:#1D9E75;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;color:#fff;font-weight:700;-webkit-appearance:none;}
/* 동기화 인디케이터 */
.sync-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:800;padding:3px 10px;font-size:10px;text-align:center;transition:all .3s;}
.sync-bar.ok{background:#1D9E75;color:#fff;}
.sync-bar.err{background:#C0392B;color:#fff;}
.sync-bar.loading{background:#E8A020;color:#fff;}
.sync-bar.hidden{display:none;}
</style>

function pad(n){return String(n).padStart(2,'0');}
function dateStr(d=new Date()){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function timeStr(d=new Date()){return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function tmins(s){if(!s)return 9999;const[h,m]=s.split(':').map(Number);return h*60+m;}
function getBand(t){const m=tmins(t);return TBANDS.find(b=>m>=b.s&&m<b.e)||null;}
function todayLbl(){const d=new Date(),ds=['일','월','화','수','목','금','토'];return`${d.getMonth()+1}/${d.getDate()}(${ds[d.getDay()]})`;}

/* ── toast ── */
function toast(msg,dur=2400){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),dur);
}

/* ── modal ── */
function openModal(msg,fn){document.getElementById('mmsg').textContent=msg;modalFn=fn;document.getElementById('moverlay').classList.add('show');}
function closeModal(){document.getElementById('moverlay').classList.remove('show');modalFn=null;}

/* ── sync bar ── */
function syncBar(state,msg){
  const el=document.getElementById('sync-bar');
  if(!el)return;
  el.className='sync-bar '+state;
  el.textContent=msg;
  if(state==='ok'){setTimeout(()=>{el.className='sync-bar hidden';},2500);}
}

/* ── 렌더 헬퍼 ── */
function gt(g,sm){return`<span class="gt ${g}${sm?' sm':''}">${g==='m'?'남':'여'}</span>`;}
function chip(c,t){return`<span class="chip ${c}">${t}</span>`;}

    return`<div class="card" style="flex-direction:column;align-items:stretch;gap:3px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
        <span style="font-size:13px;font-weight:700;color:#1A1A1A;flex:1">${m.name}</span>
        ${chips}${btn}
      </div>
    </div>`;
  }
  const mCnt=males.length, fCnt=females.length;
  const mAtt=males.filter(x=>aIds.has(x.id)&&!lIds.has(x.id)).length;
  const fAtt=females.filter(x=>aIds.has(x.id)&&!lIds.has(x.id)).length;
  return`<div class="split-layout">
    <div class="split-col left">
      <div class="split-hdr m">👨 남자 (${mAtt}/${mCnt})</div>
      ${males.map(memberCard).join('')}
    </div>
    <div class="split-col">
      <div class="split-hdr f">👩 여자 (${fAtt}/${fCnt})</div>
      ${females.map(memberCard).join('')}
    </div>
  </div>`;
}

/* ── 참석자 행 ── */
function attendRow(a, viewOnly){
  const counts={};[1,2,3,4].forEach(n=>{counts[n]=S.attendees.filter(x=>x.court===n).length;});
  const cBtns=[1,2,3,4].map(n=>{
    const on=a.court===n?' on':'';
    const isFull=counts[n]>=CMAX&&a.court!==n;
    return`<button class="cbtn c${n}${on}${isFull?' full-disabled':''}" onclick="toggleCourt(${a.id},${n})">${n}코트</button>`;
  }).join('');
  const courtTag=a.court?`<span style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:5px;background:${CBGS[a.court]};color:${CCOLORS[a.court]}">${CNAMES[a.court]}</span>`:'';
  const bottomRow=viewOnly?'':`<div class="court-btns">${cBtns}</div>`;
  const leaveBtn=viewOnly?'':`<button class="btn-lv" onclick="leave(${a.id})">퇴소</button>`;
  return`<div class="card">
    <div class="seq-b">${a.seq}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap">
        <span class="aname">${a.name}</span>${gt(a.gender,true)}${courtTag}
      </div>
      <div class="atime">🕐 ${a.time}</div>
    </div>
    <span class="gcnt-only">${a.games}게임</span>
    ${leaveBtn}
    ${bottomRow}
  </div>`;
}

/* ── 오늘 참석자 (남/여 좌우 분할) ── */
function renderToday(viewOnly){
  const allList=S.attendees;
  if(!allList.length){
    return`<div class="empty" style="padding:40px 16px">🎾<br>출석한 회원이 없습니다</div>`;
  }
  function buildCol(list){
    if(!list.length) return`<div class="empty">없음</div>`;
    const grp={};TBANDS.forEach(b=>{grp[b.label]=[];});grp['기타']=[];
    list.forEach(a=>{const b=getBand(a.time);grp[b?b.label:'기타'].push(a);});
    let h='';
    TBANDS.forEach(b=>{
      if(!grp[b.label].length)return;
      h+=`<div class="tg"><div class="tg-hdr">⏰${b.label}·${grp[b.label].length}</div>${grp[b.label].map(a=>attendRow(a,viewOnly)).join('')}</div>`;
    });
    if(grp['기타'].length){
      h+=`<div class="tg"><div class="tg-hdr" style="background:#F0EDE8;color:#888780">⏰기타·${grp['기타'].length}</div>${grp['기타'].map(a=>attendRow(a,viewOnly)).join('')}</div>`;
    }
    return h;
  }
  const males=allList.filter(x=>x.gender==='m');
  const females=allList.filter(x=>x.gender==='f');
  const mLeft=S.leftMembers.filter(x=>x.gender==='m');
  const fLeft=S.leftMembers.filter(x=>x.gender==='f');
  function leftRows(ls){
    if(!ls.length)return'';
    return`<div style="margin-top:6px"><div class="stitle" style="font-size:10px">🚪퇴소(${ls.length})</div>`+
      ls.map(a=>`<div class="card lrow">
        <span style="font-size:10px;color:#888780;font-weight:700;min-width:13px">${a.seq}.</span>
        <span class="lname">${a.name}</span>
        <span style="font-size:8px;color:#888780;margin-left:auto;white-space:nowrap">${a.games}게임·${a.leftAt}</span>
      </div>`).join('')+'</div>';
  }
  return`<div class="split-layout">
    <div class="split-col left">
      <div class="split-hdr m">👨 남 (${males.length})</div>
      ${buildCol(males)}${leftRows(mLeft)}
    </div>
    <div class="split-col">
      <div class="split-hdr f">👩 여 (${females.length})</div>
      ${buildCol(females)}${leftRows(fLeft)}
    </div>
  </div>`;
}

/* ── 코트 현황 ── */
function renderCourts(){
  let h='<div class="court-grid">';
  [1,2,3,4].forEach(n=>{
    const players=S.attendees.filter(x=>x.court===n);
    const cnt=players.length,full=cnt>=CMAX,confirmed=courtConfirmed[n];
    let slots='';
    players.forEach(a=>{
      slots+=`<div class="ct-slot" onclick="removeFromCourt(${a.id})">
        <span style="flex:1;font-size:10px;font-weight:600">${a.name}</span>
        ${gt(a.gender,true)}<span class="ct-slot-hint">해제</span>
      </div>`;
    });
    for(let i=cnt;i<CMAX;i++) slots+=`<div class="ct-empty">— 빈자리 —</div>`;
    const statusHtml=confirmed
      ?`<div class="ct-status confirmed">✅ 확정</div>`
      :full?`<div class="ct-status full">🔴꽉참(${cnt}/${CMAX})</div>`
      :cnt>0?`<div class="ct-status wait">${cnt}/${CMAX}명</div>`
      :`<div class="ct-status wait">배정없음</div>`;
    const fullBadge=full&&!confirmed?`<div class="ct-full-badge">✕</div>`:'';
    const confirmBtn=!confirmed&&cnt>0?`<button class="ct-confirm-btn" onclick="confirmCourt(${n})">확정</button>`:'';
    const clearBtn=`<button class="ct-hbtn" onclick="clearCourt(${n})">해제</button>`;
    h+=`<div class="ct-card">
      <div class="ct-hdr c${n}">
        <span class="ct-name">${CNAMES[n]}</span>
        <span class="ct-cnt">${cnt}/${CMAX}</span>
        ${fullBadge}${confirmBtn}${clearBtn}
      </div>
      <div class="ct-body">${slots}${statusHtml}</div>
    </div>`;
  });
  h+='</div>';
  const waiting=getSortedWaiting();
  if(waiting.length){
    h+=`<div class="waiting-section"><div class="stitle">⏳미배정(${waiting.length}명)<span style="font-size:8px;color:#B25000;margin-left:3px">·대기순</span></div>`;
    waiting.forEach((a,idx)=>{
      const cBtns=[1,2,3,4].map(n=>{
        const isFull=S.attendees.filter(x=>x.court===n).length>=CMAX;
        return`<button class="cbtn c${n}${isFull?' full-disabled':''}" onclick="${isFull?'':` toggleCourt(${a.id},${n})`}">${n}코트</button>`;
      }).join('');
      h+=`<div class="card">
        <div class="wseq-b">${idx+1}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:3px">
            <span style="font-size:12px;font-weight:700;color:#1A1A1A">${a.name}</span>${gt(a.gender,true)}
          </div>
          <div style="font-size:8px;color:#888780">대기 ${a.courtFreeAt||a.time}</div>
        </div>
        <div class="court-btns" style="border-top:none;padding-top:0;margin-top:0;width:auto;flex-shrink:0">${cBtns}</div>
      </div>`;
    });
    h+='</div>';
    const team=getRecommendedTeam();
    if(team.length>0){
      const teamIds=team.map(a=>a.id);
      const tJson=JSON.stringify(teamIds);
      const mCnt=team.filter(x=>x.gender==='m').length,fCnt=team.filter(x=>x.gender==='f').length;
      const gS=mCnt===4?'남4':fCnt===4?'여4':`남${mCnt}여${fCnt}`;
      const mCards=team.map(a=>`<div style="display:flex;align-items:center;gap:3px;background:#fff;border:.5px solid #E0DFDB;border-radius:7px;padding:3px 6px;">
        <span style="font-size:11px;font-weight:700">${a.name}</span>${gt(a.gender,true)}
      </div>`).join('');
      const aBtns=[1,2,3,4].map(n=>{
        const ex=S.attendees.filter(x=>x.court===n).length;
        return`<button onclick="assignTeamToCourt(${n},${tJson})"
          style="flex:1;padding:7px 2px;border-radius:7px;border:2px solid ${CCOLORS[n]};background:${CCOLORS[n]};color:#fff;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;-webkit-appearance:none;">
          <span>${CNAMES[n]}</span><span style="font-size:7px;opacity:.85">${ex>0?`(${ex}명교체)`:'(빈코트)'}</span>
        </button>`;
      }).join('');
      h+=`<div style="padding:0 10px 10px">
        <div class="stitle">📌추천 1팀<span style="font-size:8px;color:#B25000;margin-left:3px">·${gS}</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:7px">${mCards}</div>
        <div style="font-size:9px;color:#888780;margin-bottom:4px;text-align:center">코트 눌러 바로 배정</div>
        <div style="display:flex;gap:4px">${aBtns}</div>
      </div>`;
    }
  }
  return h;
}

/* ── 네비 ── */
function showPage(p){
  page=p;if(p==='members')fGender=null;
  ['members','today','courts'].forEach(k=>{document.getElementById(`tab-${k}`).classList.toggle('active',p===k);});
  render();
}
function navToday(g){fGender=g;showPage('today');}

/* ── 코트 로직 ── */
function toggleCourt(id,n){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  if(a.court===n){a.court=null;a.courtFreeAt=timeStr();saveAndPush();render();return;}
  const cnt=S.attendees.filter(x=>x.court===n).length;
  if(cnt>=CMAX){toast(`${CNAMES[n]}은 이미 꽉 찼습니다 ⚠️`);return;}
  if(a.court)courtConfirmed[a.court]=false;
  a.court=n;saveAndPush();render();
}
function removeFromCourt(id){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  if(a.court)courtConfirmed[a.court]=false;
  a.court=null;a.courtFreeAt=timeStr();saveAndPush();render();toast(`${a.name}→미배정`);
}
function clearCourt(n){
  const players=S.attendees.filter(x=>x.court===n);
  if(!players.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  openModal(`${CNAMES[n]} 배정 해제?
(게임수 유지)`,()=>{
    const t=timeStr();S.attendees.forEach(a=>{if(a.court===n){a.court=null;a.courtFreeAt=t;}});
    courtConfirmed[n]=false;saveAndPush();render();toast(`${CNAMES[n]} 해제 완료`);
  });
}
function confirmCourt(n){
  const players=S.attendees.filter(x=>x.court===n);
  if(!players.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  if(courtConfirmed[n]){toast(`${CNAMES[n]}은 이미 확정 상태`);return;}
  openModal(`${CNAMES[n]} 게임 확정?
${players.length}명 게임수 +1`,()=>{
    players.forEach(a=>{a.games+=1;});courtConfirmed[n]=true;
    saveAndPush();render();toast(`✅${CNAMES[n]} 확정 — ${players.length}명 +1`);
  });
}
function reassign(){
  openModal('전체 코트 편성 초기화?
모든 배정 해제됩니다.',()=>{
    const t=timeStr();S.attendees.forEach(a=>{if(a.court!==null){a.court=null;a.courtFreeAt=t;}});
    courtConfirmed={1:false,2:false,3:false,4:false};
    saveAndPush();render();toast('🔄전체 재편성 완료');
  });
}
function assignTeamToCourt(courtNum,teamIds){
  const t=timeStr();
  S.attendees.forEach(a=>{if(a.court===courtNum){a.court=null;a.courtFreeAt=t;}});
  courtConfirmed[courtNum]=false;
  teamIds.forEach(id=>{const a=S.attendees.find(x=>x.id===id);if(a)a.court=courtNum;});
  saveAndPush();render();toast(`✅${CNAMES[courtNum]}에 ${teamIds.length}명 배정`);
}
function getSortedWaiting(){
  return S.attendees.filter(x=>x.court===null).sort((a,b)=>tmins(a.courtFreeAt)-tmins(b.courtFreeAt));
}
function getRecommendedTeam(){
  const w=getSortedWaiting();if(!w.length)return[];
  const mW=w.filter(x=>x.gender==='m'),fW=w.filter(x=>x.gender==='f');
  if(mW.length>=4)return mW.slice(0,4);
  if(fW.length>=4)return fW.slice(0,4);
  return[...mW.slice(0,2),...fW.slice(0,2)].sort((a,b)=>tmins(a.courtFreeAt)-tmins(b.courtFreeAt)).slice(0,4);
}

/* ── 하단 버튼 ── */
function renderBottom(){
  const el=document.getElementById('bottom-btns');
  let h='<div class="bottom-btns">';
  if(page==='courts'){
    h+=`<button class="btn-reassign" onclick="reassign()">🔄 전체 재편성 (모든 코트 배정 초기화)</button><div class="bhint" style="margin-bottom:4px">모든 코트 배정 해제</div>`;
  }
  h+=`<button class="btn-reset" onclick="manualReset()">♻️ 수동 초기화 (데이터 보관 후 초기화)</button><div class="bhint">매일 23:59 자동 초기화</div></div>`;
  el.innerHTML=h;
}

/* ── 메인 렌더 ── */
function render(){
  renderStats();
  const el=document.getElementById('content');
  if(page==='members')    el.innerHTML=renderMembers();
  else if(page==='today') el.innerHTML=renderToday(false);
  else if(page==='courts')el.innerHTML=renderCourts();

/* ════ GitHub 동기화 ════
   - GET  : raw URL (캐시방지용 ?t=타임스탬프)
   - PUT  : Contents API (토큰 필요, index.html에서만 쓰기)
*/
const GH_RAW = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/main/${GH_FILE}`;
const GH_API = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

let lastPullHash='';
let pulling=false;

/* JSON → GitHub */
async function pushToGitHub(){
  if(!GH_TOKEN){return;}
  syncBar('loading','저장 중…');
  const payload={
    date:dateStr(),
    state:S,
    courtConfirmed,
    updatedAt:new Date().toISOString()
  };
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(payload,null,2))));
  try{
    const r=await fetch(GH_API,{
      method:'PUT',
      headers:{'Authorization':`token ${GH_TOKEN}`,'Content-Type':'application/json'},
      body:JSON.stringify({message:`update ${dateStr()} ${timeStr()}`,content,sha:ghFileSha||undefined})
    });
    const d=await r.json();
    if(d.content&&d.content.sha){ghFileSha=d.content.sha;}
    syncBar('ok','✅ 저장됨 '+timeStr());
  }catch(e){syncBar('err','❌ 저장 실패');}
}

/* GitHub → 화면 */
async function pullFromGitHub(){
  if(pulling)return;pulling=true;
  try{
    const r=await fetch(GH_RAW+'?t='+Date.now(),{cache:'no-store'});
    if(!r.ok){pulling=false;return;}
    const txt=await r.text();
    const h=txt.substring(0,200);
    if(h===lastPullHash){pulling=false;return;}
    lastPullHash=h;
    const obj=JSON.parse(txt);
    if(obj.date===dateStr()){
      S=obj.state;
      courtConfirmed=obj.courtConfirmed||{1:false,2:false,3:false,4:false};
      render();
    }
    /* SHA 갱신 (쓰기용) */
    try{
      const meta=await fetch(GH_API+'?t='+Date.now(),{headers:GH_TOKEN?{'Authorization':`token ${GH_TOKEN}`}:{}});
      const md=await meta.json();
      if(md.sha)ghFileSha=md.sha;
    }catch(e){}
  }catch(e){}
  pulling=false;
}

function saveAndPush(){
  localStorage.setItem('tennis_local',JSON.stringify({date:dateStr(),state:S,courtConfirmed}));
  pushToGitHub();
}


/* ── 출석 ── */
function markAttend(id){
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  if(S.attendees.find(x=>x.id===id)){toast(`${m.name} 이미 출석`);navToday(null);return;}
  const t=timeStr();S.seqCounter++;
  S.attendees.push({id:m.id,name:m.name,gender:m.gender,seq:S.seqCounter,games:0,time:t,court:null,courtFreeAt:t});
  saveAndPush();toast(`${m.name} 출석 ✓  ${t}`);navToday(null);
}

/* ── 퇴소 ── */
function leave(id){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  openModal(`${a.name} 회원을 퇴소 처리하시겠습니까?\n(게임: ${a.games}게임)`,()=>{
    S.leftMembers.push({...a,leftAt:timeStr()});
    S.attendees=S.attendees.filter(x=>x.id!==id);
    if(a.court)courtConfirmed[a.court]=false;
    saveAndPush();render();toast(`${a.name} 퇴소 처리됨`);
  });
}

/* ── 초기화 ── */
function autoReset(now){
  localStorage.setItem('tennis_arch_'+dateStr(now),JSON.stringify({state:S,courtConfirmed}));
  S={attendees:[],leftMembers:[],seqCounter:0};
  courtConfirmed={1:false,2:false,3:false,4:false};
  saveAndPush();page='members';render();
  toast('🌙 자정 자동 초기화',5000);
}
function manualReset(){
  openModal('오늘 데이터를 초기화하시겠습니까?\n(이력은 자동 보관됩니다)',()=>{
    localStorage.setItem('tennis_arch_'+dateStr(),JSON.stringify({state:S,courtConfirmed}));
    S={attendees:[],leftMembers:[],seqCounter:0};
    courtConfirmed={1:false,2:false,3:false,4:false};
    saveAndPush();page='members';render();toast('🔄 초기화 완료');
  });
}

/* ── 시계 + 자동초기화 ── */
function tick(){
  const n=new Date();document.getElementById('hdr-clock').textContent=timeStr(n);
  if(n.getHours()===23&&n.getMinutes()===59){if(!autoFired){autoFired=true;autoReset(n);}}else autoFired=false;
}

/* ── 모달 연결 ── */
document.getElementById('mok').onclick=()=>{if(modalFn)modalFn();closeModal();};
document.getElementById('moverlay').onclick=e=>{if(e.target.id==='moverlay')closeModal();};

/* ── 시작 ── */
(async()=>{
  document.getElementById('hdr-date').textContent=todayLbl();
  // 로컬 먼저
  try{
    const r=localStorage.getItem('tennis_local');
    if(r){const o=JSON.parse(r);if(o.date===dateStr()){S=o.state;courtConfirmed=o.courtConfirmed||{1:false,2:false,3:false,4:false};}}
  }catch(e){}
  render();
  // GitHub에서 최신 pull
  await pullFromGitHub();
  render();
  setInterval(tick,1000);tick();
  // 30초마다 자동 pull
  setInterval(()=>pullFromGitHub(),30000);
})();
</script>
