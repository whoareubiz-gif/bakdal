firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const REF = db.ref('tennis/' + new Date().toISOString().slice(0,10)); // 날짜별 분리

let syncPushTimer = null;
let amIPushing = false; // 내가 push 중인지
let localSeq = 0;       // 내가 보낸 시퀀스
let lastSeenSeq = -1;   // 마지막으로 화면에 반영한 시퀀스

function setSyncDot(st){
  const d=document.getElementById('sync-dot');
  if(d){d.className='sync-dot'+(st?' '+st:'');}
}

/* Firebase 데이터 정규화 (배열↔객체 변환) */
function normalizeFirebase(d){
  if(!d) return;
  if(d.state){
    // attendees: Firebase 객체→배열
    if(d.state.attendees && !Array.isArray(d.state.attendees))
      d.state.attendees = Object.values(d.state.attendees);
    // leftMembers: Firebase 객체→배열
    if(d.state.leftMembers && !Array.isArray(d.state.leftMembers))
      d.state.leftMembers = Object.values(d.state.leftMembers);
    // attendees 내부 nextCourt1/2 null 처리
    if(Array.isArray(d.state.attendees)){
      d.state.attendees.forEach(a=>{
        if(a.nextCourt1===undefined) a.nextCourt1=null;
        if(a.nextCourt2===undefined) a.nextCourt2=null;
      });
    }
  }
  // CC 숫자키 정규화
  if(d.CC){
    d.CC = {
      1:!!(d.CC['1']||d.CC[1]),2:!!(d.CC['2']||d.CC[2]),
      3:!!(d.CC['3']||d.CC[3]),4:!!(d.CC['4']||d.CC[4]),
      5:!!(d.CC['5']||d.CC[5]),6:!!(d.CC['6']||d.CC[6]),
    };
  }
  return d;
}

/* 서버로 push (debounce 1초) */
function syncPush(){
  if(syncPushTimer) clearTimeout(syncPushTimer);
  setSyncDot('busy');
  syncPushTimer = setTimeout(()=>{
    localSeq++;
    const seq = localSeq;
    // push 직전 seq 기록 → 수신 시 무시 처리
    lastSeenSeq = seq;
    const payload = {state:S, CC, seq, updatedAt:Date.now()};
    REF.set(payload)
      .then(()=>{ setSyncDot('ok'); })
      .catch(()=>{ setSyncDot('err'); });
  }, 1000);
}

/* 서버에서 실시간 listen */
function syncListen(){
  REF.on('value', snap=>{
    const raw = snap.val();
    if(!raw) return;
    setSyncDot('ok');

    // seq가 내가 마지막으로 push한 것과 같으면 내 데이터 → 무시
    if(raw.seq !== undefined && raw.seq === lastSeenSeq) return;
    // seq 갱신
    lastSeenSeq = raw.seq !== undefined ? raw.seq : lastSeenSeq;

    const d = normalizeFirebase(raw);
    if(d.state) S = d.state;
    if(d.CC)    CC = d.CC;

    renderAll();
  });
}

function pad(n){return String(n).padStart(2,'0');}
function dateStr(d=new Date()){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function timeStr(d=new Date()){return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function nowTs(){return Math.floor(Date.now()/1000);}
function tmins(s){if(!s)return 9999;const[h,m]=s.split(':').map(Number);return h*60+m;}
function getBand(t){const m=tmins(t);return TBANDS.find(b=>m>=b.s&&m<b.e)||null;}
function todayLbl(){const d=new Date(),ds=['일','월','화','수','목','금','토'];return`${d.getMonth()+1}/${d.getDate()}(${ds[d.getDay()]})`;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

(function(){
  const wrap=document.getElementById('slide-wrap');
  let sx=0,dragging=false,moved=false;
  function start(x){sx=x;dragging=true;moved=false;}
  function end(ex){if(!dragging)return;dragging=false;if(!moved)return;const dx=ex-sx;if(Math.abs(dx)>40)goTab(Math.max(0,Math.min(2,curTab+(dx<0?1:-1))));}
  wrap.addEventListener('touchstart',e=>{start(e.touches[0].clientX);},{passive:true});
  wrap.addEventListener('touchmove',e=>{if(dragging&&Math.abs(e.touches[0].clientX-sx)>5)moved=true;},{passive:true});
  wrap.addEventListener('touchend',e=>{end(e.changedTouches[0].clientX);});
  wrap.addEventListener('mousedown',e=>{start(e.clientX);});
  wrap.addEventListener('mousemove',e=>{if(dragging&&Math.abs(e.clientX-sx)>5)moved=true;});
  wrap.addEventListener('mouseup',e=>{end(e.clientX);});
})();

/* ── 출석/퇴소 ── */
function markAttend(id){
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  if(S.attendees.find(x=>x.id===id)){toast(`${m.name} 이미 출석`);goTab(1);return;}
  const t=timeStr();const ts=nowTs();S.seqCounter++;
  S.attendees.push({id:m.id,name:m.name,gender:m.gender,seq:S.seqCounter,games:0,time:t,court:null,courtFreeAt:t,courtFreeTs:ts,attendTs:ts,hasCourt:false});
  save();toast(`${m.name} 출석 ✓  ${t}`);goTab(1);
}
function leave(id){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  openModal(`${a.name} 회원을 퇴소 처리하시겠습니까?\n(게임: ${a.games}게임)`,()=>{
    S.leftMembers.push({...a,leftAt:timeStr()});
    S.attendees=S.attendees.filter(x=>x.id!==id);

    save();renderAll();toast(`${a.name} 퇴소 처리됨`);
  });
}

/* ── 코트 배정 ── */
function toggleCourt(id,n){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  if(a.court===n){a.court=null;a.courtFreeAt=timeStr();a.courtFreeTs=nowTs();save();renderAll();return;}
  if(S.attendees.filter(x=>x.court===n).length>=CMAX){toast(`${CNAMES[n]}은 이미 꽉 찼습니다 ⚠️`);return;}
  if(!NEXT_COURTS.includes(n)){
    if(a.court&&!NEXT_COURTS.includes(a.court))CC[a.court]=false;
    a.court=n;a.hasCourt=true;
  } else {
    const nc=n===5?'nextCourt1':'nextCourt2';
    a[nc]=a[nc]===n?null:n;save();renderAll();return;
  }
  save();renderAll();
}
function toggleNextCourt(id,which){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  const nc=which===1?'nextCourt1':'nextCourt2';
  const n=which===1?5:6;
  if(a[nc]){a[nc]=null;save();renderAll();return;}
  if(S.attendees.filter(x=>x[nc]).length>=CMAX){toast(`${CNAMES[n]}은 이미 꽉 찼습니다 ⚠️`);return;}
  a[nc]=n;save();renderAll();
}
function removeFromCourt(id){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  if(a.court)CC[a.court]=false;
  a.court=null;a.courtFreeAt=timeStr();a.courtFreeTs=nowTs();
  save();renderAll();toast(`${a.name} → 미배정`);
}
function clearCourt(n){
  const pl=S.attendees.filter(x=>x.court===n);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  openModal(`${CNAMES[n]} 배정 해제?\n(게임수 유지)`,()=>{
    const t=timeStr();const baseTs=nowTs();
    shuffle(pl.slice()).forEach((a,i)=>{a.court=null;a.courtFreeAt=t;a.courtFreeTs=baseTs+i;});
    CC[n]=false;save();renderAll();toast(`${CNAMES[n]} 해제 완료`);
  });
}
function confirmCourt(n){
  const pl=S.attendees.filter(x=>x.court===n);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  if(CC[n]){toast(`${CNAMES[n]}은 이미 확정`);return;}
  openModal(`${CNAMES[n]} 게임 확정?\n${pl.length}명 게임수 +1`,()=>{
    pl.forEach(a=>{a.games+=1;});CC[n]=true;save();renderAll();toast(`✅ ${CNAMES[n]} 확정`);
  });
}
function clearNextCourt(n){
  const nc=n===5?'nextCourt1':'nextCourt2';
  const pl=S.attendees.filter(x=>x[nc]);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  openModal(`${CNAMES[n]} 배정 해제?\n(게임수 유지)`,()=>{
    const t=timeStr();const baseTs=nowTs();
    shuffle(pl.slice()).forEach((a,i)=>{a[nc]=null;if(!a.court){a.courtFreeAt=t;a.courtFreeTs=baseTs+i;}});
    CC[n]=false;save();renderAll();toast(`${CNAMES[n]} 해제 완료`);
  });
}
function confirmNextCourt(n){
  const nc=n===5?'nextCourt1':'nextCourt2';
  const pl=S.attendees.filter(x=>x[nc]);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  if(CC[n]){toast(`${CNAMES[n]}은 이미 확정`);return;}
  const availCourts=[];
  for(let cn=1;cn<=4;cn++){const cur=S.attendees.filter(x=>x.court===cn).length;if(cur<CMAX)availCourts.push({cn,cur,free:CMAX-cur});}
  if(!availCourts.length){toast('⚠️ 1~4코트가 모두 꽉 찼습니다. 코트를 해제한 후 확정해주세요.',3500);return;}
  const availTxt=availCourts.map(c=>`${CNAMES[c.cn]}(${c.cur}/${CMAX})`).join(', ');
  openModal(`${CNAMES[n]} 확정 → 코트 이동\n\n배정 가능: ${availTxt}\n\n${pl.length}명을 빈 코트로 배정합니다.`,()=>{
    const t=timeStr();const baseTs=nowTs();
    CC[n]=true;
    availCourts.sort((a,b)=>b.free-a.free);
    let pi=0;
    for(const{cn,free}of availCourts){
      let filled=0;
      while(pi<pl.length&&filled<free){
        const a=pl[pi];
        if(!a.court){a.court=cn;a.hasCourt=true;}else filled--;
        a[nc]=null;pi++;filled++;
      }
      if(pi>=pl.length)break;
    }
    while(pi<pl.length){const a=pl[pi];a[nc]=null;if(!a.court){a.courtFreeAt=t;a.courtFreeTs=baseTs+pi;}pi++;}
    save();renderAll();toast(`✅ ${CNAMES[n]} 확정 — ${pl.length}명 코트 배정`);
  });
}
function reassign(){
  openModal('전체 코트 편성 초기화?\n모든 배정 해제됩니다.',()=>{
    const t=timeStr();const baseTs=nowTs();
    const inC=shuffle(S.attendees.filter(a=>a.court!==null));
    inC.forEach((a,i)=>{a.court=null;a.courtFreeAt=t;a.courtFreeTs=baseTs+i;});
    S.attendees.forEach(a=>{a.nextCourt1=null;a.nextCourt2=null;});
    CC={1:false,2:false,3:false,4:false,5:false,6:false};save();renderAll();toast('🔄 전체 재편성 완료');
  });
}
function assignTeam(cn,teamIds){
  const t=timeStr();const baseTs=nowTs();
  shuffle(S.attendees.filter(a=>a.court===cn)).forEach((a,i)=>{a.court=null;a.courtFreeAt=t;a.courtFreeTs=baseTs+i;});
  CC[cn]=false;
  teamIds.forEach(id=>{const a=S.attendees.find(x=>x.id===id);if(a){a.court=cn;a.hasCourt=true;}});
  save();renderAll();toast(`✅ ${CNAMES[cn]}에 ${teamIds.length}명 배정`);
}
function assignNextTeam(which,teamIds){
  const t=timeStr();const baseTs=nowTs();
  const nc1cnt=S.attendees.filter(a=>a.nextCourt1).length;
  let targetWhich=which;
  if(which===1&&nc1cnt>=CMAX){
    if(S.attendees.filter(a=>a.nextCourt2).length>=CMAX){toast('⚠️ 다음차례1,2 모두 꽉 찼습니다.',3000);return;}
    targetWhich=2;toast('다음차례가 꽉 차 있어 다음차례2에 배정합니다.',2500);
  }
  const nc=targetWhich===1?'nextCourt1':'nextCourt2';
  const n=targetWhich===1?5:6;
  shuffle(S.attendees.filter(a=>a[nc])).forEach((a,i)=>{a[nc]=null;if(!a.court){a.courtFreeAt=t;a.courtFreeTs=baseTs+i;}});
  CC[n]=false;
  teamIds.forEach(id=>{const a=S.attendees.find(x=>x.id===id);if(a)a[nc]=n;});
  save();renderAll();toast(`✅ ${CNAMES[n]}에 ${teamIds.length}명 배정`);
}

/* ── 대기/추천 ── */
function getSortedWaiting(){
  function getTs(a){if(a.courtFreeTs)return a.courtFreeTs;const t=a.courtFreeAt||a.time||'00:00';const[h,m]=t.split(':').map(Number);return h*3600+m*60;}
  S.attendees.forEach(a=>{if(a.hasCourt===undefined)a.hasCourt=!!(a.courtFreeAt&&a.courtFreeAt!==a.time);});
  return S.attendees.filter(x=>x.court===null).sort((a,b)=>getTs(a)-getTs(b));
}
function buildRecommendedTeams(){
  const waiting=getSortedWaiting();
  function buildPool(gender){
    const w=waiting.filter(x=>x.gender===gender);
    const c=S.attendees.filter(x=>x.gender===gender&&x.court&&!NEXT_COURTS.includes(x.court)).sort((a,b)=>(a.attendTs||0)-(b.attendTs||0));
    return{all:[...w,...c]};
  }
  function pick(n,pool){
    const all=pool.all;const M=all.length;
    if(!M)return[];if(M<=n)return shuffle(all).slice(0,n);
    const fc=Math.min(Math.max(0,M-2),n);
    return[...all.slice(0,fc),...shuffle(all.slice(fc)).slice(0,n-fc)];
  }
  const mp=buildPool('m'),fp=buildPool('f');
  const teams=[];
  if(mp.all.length>=1){const t=pick(4,mp);if(t.length)teams.push({label:'추천1팀 — 남자',color:'#185FA5',badge:'👨',team:t});}
  if(fp.all.length>=1){const t=pick(4,fp);if(t.length)teams.push({label:'추천2팀 — 여자',color:'#993556',badge:'👩',team:t});}
  if(mp.all.length>=1&&fp.all.length>=1){
    const tm=pick(2,mp),tf=pick(2,fp);const t=[...tm,...tf];
    if(t.length>=2)teams.push({label:'추천3팀 — 혼성(남2여2)',color:'#7B3FA0',badge:'👫',team:t});
  }
  return teams;
}

/* ── 회원명부 ── */
function renderMembers(){
  const aIds=new Set(S.attendees.map(x=>x.id));const lIds=new Set(S.leftMembers.map(x=>x.id));
  const males=MEMBERS.filter(x=>x.gender==='m');const females=MEMBERS.filter(x=>x.gender==='f');
  const mAtt=males.filter(x=>aIds.has(x.id)&&!lIds.has(x.id)).length;
  const fAtt=females.filter(x=>aIds.has(x.id)&&!lIds.has(x.id)).length;
  function card(m){
    const a=aIds.has(m.id),l=lIds.has(m.id);
    const chips=(a&&!l?chip('g','✓'):'')+(l?chip('r','퇴'):'');
    const btn=l?`<span style="font-size:8px;color:#888780">퇴소</span>`
      :a?`<button class="btn-att done" disabled>완료</button>`
      :`<button class="btn-att" onclick="markAttend(${m.id})">출석</button>`;
    return`<div class="scard"><span class="sname">${m.name}</span><div style="display:flex;align-items:center;gap:3px">${chips}${btn}</div></div>`;
  }
  return`<div class="split-wrap"><div class="split-col lcol"><div class="split-hdr m">👨 남자 (${mAtt}/${males.length})</div>${males.map(card).join('')}</div><div class="split-col"><div class="split-hdr f">👩 여자 (${fAtt}/${females.length})</div>${females.map(card).join('')}</div></div>`;
}

/* ── 참석자 행 ── */
function attendRow(a){
  const counts={};[1,2,3,4].forEach(n=>{counts[n]=S.attendees.filter(x=>x.court===n).length;});
  const cBtns=[1,2,3,4].map(n=>{
    const on=a.court===n?' on':'';const isFull=counts[n]>=CMAX&&a.court!==n;
    return`<button class="cbtn c${n}${on}${isFull?' full-disabled':''}" onclick="toggleCourt(${a.id},${n})">${n}코트</button>`;
  }).join('');
  const nc1on=a.nextCourt1?' on':'';const nc2on=a.nextCourt2?' on':'';
  const nc1full=S.attendees.filter(x=>x.nextCourt1).length>=CMAX&&!a.nextCourt1;
  const nc2full=S.attendees.filter(x=>x.nextCourt2).length>=CMAX&&!a.nextCourt2;
  const ncBtns=`<button class="cbtn c5${nc1on}${nc1full?' full-disabled':''}" onclick="${nc1full?'':` toggleNextCourt(${a.id},1)`}" style="font-size:9px;padding:3px 3px">다1</button><button class="cbtn c6${nc2on}${nc2full?' full-disabled':''}" onclick="${nc2full?'':` toggleNextCourt(${a.id},2)`}" style="font-size:9px;padding:3px 3px">다2</button>`;
  const courtTag=a.court?`<span style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:4px;background:${CBGS[a.court]};color:${CCOLORS[a.court]}">${CNAMES[a.court]}</span>`:'';
  const timeLabel=`출석 ${a.time}`;
  return`<div class="acard"><div class="seq-b">${a.seq}</div><div class="ainfo"><div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap"><span class="aname">${a.name}</span>${gt(a.gender,true)}${courtTag}</div><div class="atime-row">🕐 ${timeLabel}</div></div><div class="cbtn-wrap">${cBtns}${ncBtns}</div><span class="gcnt-only">${a.games}게임</span><button class="btn-lv" onclick="leave(${a.id})">퇴소</button></div>`;
}

function renderToday(){
  if(leftOnly){
    const ls=S.leftMembers;let h=`<div class="pg-inner"><div style="display:flex;align-items:center;margin-bottom:8px"><div class="stitle" style="border:none;padding-bottom:0;margin:0;flex:1">🚪 퇴소자 (${ls.length}명)</div><button onclick="leftOnly=false;renderAll()" style="font-size:10px;color:#1D9E75;background:none;border:none;cursor:pointer;font-family:inherit">전체 보기 ×</button></div>`;
    if(!ls.length){h+=`<div class="empty">🚪<br>퇴소한 회원이 없습니다.</div></div>`;return h;}
    ls.forEach(a=>{h+=`<div class="acard"><div class="seq-b" style="background:#FAECE7;color:#993C1D">${a.seq}</div><div class="ainfo"><div style="display:flex;align-items:center;gap:3px"><span class="aname">${a.name}</span>${gt(a.gender,true)}</div><div class="atime-row">🕐 출석 ${a.time} · 퇴소 ${a.leftAt}</div></div><span class="gcnt-only">${a.games}게임</span></div>`;});
    h+=`</div>`;return h;
  }
  if(todayGender){
    const list=S.attendees.filter(x=>x.gender===todayGender);
    const lbl=todayGender==='m'?'👨 남자 참석자':'👩 여자 참석자';
    let h=`<div class="pg-inner"><div style="display:flex;align-items:center;margin-bottom:8px"><div class="stitle" style="border:none;padding-bottom:0;margin:0;flex:1">${lbl} (${list.length}명)</div><button onclick="todayGender=null;renderAll()" style="font-size:10px;color:#1D9E75;background:none;border:none;cursor:pointer;font-family:inherit">전체 보기 ×</button></div>`;
    if(!list.length){h+=`<div class="empty">🎾<br>해당 성별 참석자가 없습니다.</div></div>`;return h;}
    const grp={};TBANDS.forEach(b=>{grp[b.label]=[];});grp['기타']=[];
    list.forEach(a=>{const b=getBand(a.time);grp[b?b.label:'기타'].push(a);});
    TBANDS.forEach(b=>{if(grp[b.label].length)h+=`<div class="tg"><div class="tg-hdr">⏰ ${b.label} · ${grp[b.label].length}명</div>${grp[b.label].map(attendRow).join('')}</div>`;});
    if(grp['기타'].length)h+=`<div class="tg"><div class="tg-hdr" style="background:#F0EDE8;color:#888780">⏰ 기타</div>${grp['기타'].map(attendRow).join('')}</div>`;
    h+=`</div>`;return h;
  }
  const list=S.attendees;
  let h=`<div class="pg-inner"><div class="stitle">📋 오늘 참석자 (${list.length}명)</div>`;
  if(!list.length){h+=`<div class="empty" style="padding:30px 0">🎾<br>아직 출석한 회원이 없습니다.<div style="font-size:11px;margin-top:4px">회원명부에서 출석 버튼을 눌러주세요</div></div></div>`;return h;}
  const grp={};TBANDS.forEach(b=>{grp[b.label]=[];});grp['기타']=[];
  list.forEach(a=>{const b=getBand(a.time);grp[b?b.label:'기타'].push(a);});
  TBANDS.forEach(b=>{if(grp[b.label].length)h+=`<div class="tg"><div class="tg-hdr">⏰ ${b.label} · ${grp[b.label].length}명</div>${grp[b.label].map(attendRow).join('')}</div>`;});
  if(grp['기타'].length)h+=`<div class="tg"><div class="tg-hdr" style="background:#F0EDE8;color:#888780">⏰ 기타</div>${grp['기타'].map(attendRow).join('')}</div>`;
  h+=`</div>`;return h;
}

/* ── 코트 현황 ── */
function renderCourts(){
  let h='<div class="court-grid">';
  [1,2,3,4].forEach(n=>{
    const pl=S.attendees.filter(x=>x.court===n);const cnt=pl.length,full=cnt>=CMAX,conf=CC[n];
    let slots='';pl.forEach(a=>{slots+=`<div class="ct-slot" onclick="removeFromCourt(${a.id})"><span style="flex:1;font-size:10px;font-weight:600">${a.name}</span>${gt(a.gender,true)}<span class="ct-slot-hint">해제</span></div>`;});
    for(let i=cnt;i<CMAX;i++)slots+=`<div class="ct-empty">— 빈자리 —</div>`;
    const status=conf?`<div class="ct-status confirmed">✅ 게임 확정</div>`:full?`<div class="ct-status full">🔴 꽉참(${cnt}/${CMAX})</div>`:cnt>0?`<div class="ct-status wait">${cnt}/${CMAX}명</div>`:`<div class="ct-status wait">배정없음</div>`;
    const fullBadge=full&&!conf?`<div class="ct-full-badge">✕</div>`:'';
    const confirmBtn=!conf&&cnt>0?`<button class="ct-confirm-btn" onclick="confirmCourt(${n})">확정</button>`:'';
    h+=`<div class="ct-card"><div class="ct-hdr c${n}"><span class="ct-name">${CNAMES[n]}</span><span class="ct-cnt">${cnt}/${CMAX}</span>${fullBadge}${confirmBtn}<button class="ct-hbtn" onclick="clearCourt(${n})">해제</button></div><div class="ct-body">${slots}${status}</div></div>`;
  });
  h+=`</div>`;
  // 다음차례 코트
  h+=`<div style="padding:0 11px 2px"><div class="stitle" style="margin-top:6px">⏭ 다음차례 코트</div></div><div class="court-grid" style="padding-top:0">`;
  [5,6].forEach(n=>{
    const ncKey=n===5?'nextCourt1':'nextCourt2';
    const players=S.attendees.filter(x=>x[ncKey]);const cnt=players.length,full=cnt>=CMAX,conf=CC[n];
    let slots='';players.forEach(a=>{
      const inC=a.court&&!NEXT_COURTS.includes(a.court);
      const cb=inC?`<span style="font-size:7px;background:${CBGS[a.court]};color:${CCOLORS[a.court]};padding:1px 3px;border-radius:3px;margin-left:2px">${CNAMES[a.court]}</span>`:'';
      slots+=`<div class="ct-slot" onclick="toggleNextCourt(${a.id},${n===5?1:2})"><span style="flex:1;font-size:10px;font-weight:600">${a.name}${cb}</span>${gt(a.gender,true)}<span class="ct-slot-hint">해제</span></div>`;
    });
    for(let i=cnt;i<CMAX;i++)slots+=`<div class="ct-empty">— 빈자리 —</div>`;
    const status=conf?`<div class="ct-status confirmed">✅ 게임 확정</div>`:full?`<div class="ct-status full">🔴 꽉참(${cnt}/${CMAX})</div>`:cnt>0?`<div class="ct-status wait">${cnt}/${CMAX}명</div>`:`<div class="ct-status wait">배정없음</div>`;
    const fullBadge=full&&!conf?`<div class="ct-full-badge">✕</div>`:'';
    const confirmBtn=!conf&&cnt>0?`<button class="ct-confirm-btn" onclick="confirmNextCourt(${n})">확정</button>`:'';
    h+=`<div class="ct-card"><div class="ct-hdr c${n}"><span class="ct-name">${CNAMES[n]}</span><span class="ct-cnt">${cnt}/${CMAX}</span>${fullBadge}${confirmBtn}<button class="ct-hbtn" onclick="clearNextCourt(${n})">해제</button></div><div class="ct-body">${slots}${status}</div></div>`;
  });
  h+=`</div>`;
  // 참석자 배정 현황
  const waiting=getSortedWaiting();
  const inCourt=S.attendees.filter(x=>x.court&&!NEXT_COURTS.includes(x.court)).sort((a,b)=>(a.attendTs||0)-(b.attendTs||0));
  const allSorted=[...waiting,...inCourt];
  if(allSorted.length){
    function courtAllCard(a){
      const isWaiting=!a.court||NEXT_COURTS.includes(a.court);
      const cBtns=[1,2,3,4].map(n=>{
        const isFull=S.attendees.filter(x=>x.court===n).length>=CMAX&&a.court!==n;
        const isOn=a.court===n?' on':'';
        return`<button class="cbtn c${n}${isOn}${isFull?' full-disabled':''}" onclick="${isFull?'':` toggleCourt(${a.id},${n})`}" style="font-size:10px;font-weight:700;padding:3px 4px;min-width:20px;border-radius:5px">${n}</button>`;
      }).join('');
      const nc1on=a.nextCourt1?' on':'';const nc2on=a.nextCourt2?' on':'';
      const nc1full=S.attendees.filter(x=>x.nextCourt1).length>=CMAX&&!a.nextCourt1;
      const nc2full=S.attendees.filter(x=>x.nextCourt2).length>=CMAX&&!a.nextCourt2;
      const ncBtns=`<button class="cbtn c5${nc1on}${nc1full?' full-disabled':''}" onclick="${nc1full?'':` toggleNextCourt(${a.id},1)`}" style="font-size:10px;font-weight:700;padding:3px 4px;min-width:20px;border-radius:5px">다1</button><button class="cbtn c6${nc2on}${nc2full?' full-disabled':''}" onclick="${nc2full?'':` toggleNextCourt(${a.id},2)`}" style="font-size:10px;font-weight:700;padding:3px 4px;min-width:20px;border-radius:5px">다2</button>`;
      const divider=!isWaiting&&allSorted.indexOf(a)===waiting.length?`<div style="font-size:10px;color:#888780;padding:4px 0 2px;font-weight:600">─── 코트 배정 중 ───</div>`:'';
      return`${divider}<div style="background:${isWaiting?'#fff':'#F5F4F0'};border:.5px solid #E0DFDB;border-radius:9px;margin-bottom:4px;padding:4px 5px;display:flex;align-items:center;gap:2px"><span style="font-size:11px;font-weight:700;color:${isWaiting?'#1A1A1A':'#666'};flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.name}</span><div style="display:flex;gap:1px;flex-shrink:0">${cBtns}${ncBtns}</div></div>`;
    }
    const mSorted=allSorted.filter(x=>x.gender==='m');const fSorted=allSorted.filter(x=>x.gender==='f');
    h+=`<div class="pg-inner" style="padding-top:0"><div class="stitle">👥 참석자 배정 현황 (${S.attendees.length}명)<span style="font-size:8px;color:#B25000;margin-left:4px">미배정(${waiting.length})·코트배정(${inCourt.length})</span></div><div class="split-wrap"><div class="split-col lcol" style="padding:0 4px 10px 0"><div class="split-hdr m" style="font-size:10px">👨 남 (${mSorted.length})</div>${mSorted.map(courtAllCard).join('')}</div><div class="split-col" style="padding:0 0 10px 4px"><div class="split-hdr f" style="font-size:10px">👩 여 (${fSorted.length})</div>${fSorted.map(courtAllCard).join('')}</div></div></div>`;
  }
  // 추천팀
  const recTeams=buildRecommendedTeams();
  if(recTeams.length){
    function recCourtBtns(tIds){
      return[1,2,3,4].map(n=>{const ex=S.attendees.filter(x=>x.court===n).length;return`<button class="assign-btn" onclick="assignTeam(${n},${tIds})" style="background:${CCOLORS[n]}"><span class="ab-label">${CNAMES[n]}</span><span class="ab-sub">${ex===0?'빈코트':`${ex}/${CMAX}`}</span></button>`;}).join('');
    }
    h+=`<div class="pg-inner" style="padding-top:0"><div class="stitle">📌 다음 게임 추천</div>`;
    recTeams.forEach(({label,color,badge,team})=>{
      if(!team.length)return;
      const tIds=JSON.stringify(team.map(a=>a.id));
      const members=team.map(a=>{const inC=a.court&&!NEXT_COURTS.includes(a.court);const cb=inC?`<span style="font-size:7px;background:${CBGS[a.court]};color:${CCOLORS[a.court]};padding:1px 3px;border-radius:3px">${CNAMES[a.court]}</span>`:'';return`<div class="rec-member"><span class="rec-name">${a.name}</span>${gt(a.gender,true)}${cb}<span class="rec-time">${a.courtFreeAt||a.time}</span></div>`;}).join('');
      const nextBtn=`<button onclick="assignNextTeam(1,${tIds})" style="flex:1;padding:8px 2px;border-radius:8px;border:2px solid ${CCOLORS[5]};background:${CCOLORS[5]};color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;-webkit-appearance:none;"><span style="font-size:10px;font-weight:700">다음차례</span><span style="font-size:8px;opacity:.9">(자동배정)</span></button>`;
      h+=`<div class="rec-card"><div class="rec-title"><span style="font-size:14px">${badge}</span><span style="color:${color}">${label}</span></div><div class="rec-members">${members}</div><div style="font-size:9px;color:#888780;margin-bottom:5px;text-align:center">코트를 눌러 바로 배정 · 기존 인원은 미배정으로</div><div class="assign-row">${recCourtBtns(tIds)}${nextBtn}</div></div>`;
    });
    h+=`</div>`;
  }
  return h;
}

/* ── 하단 버튼 ── */
function renderBottom(){
  const el=document.getElementById('bottom-btns');
  let h='<div class="bottom-btns">';
  if(curTab===2)h+=`<button class="btn-reassign" onclick="reassign()">🔄 전체 재편성 (모든 코트 배정 초기화)</button><div class="bhint" style="margin-bottom:4px">모든 코트 배정 해제</div>`;
  h+=`<button class="btn-reset" onclick="manualReset()">♻️ 수동 초기화 (데이터 보관 후 초기화)</button><div class="bhint">매일 23:59 자동 초기화 · 이력 자동 보관</div></div>`;
  el.innerHTML=h;
}

/* ── 전체 렌더 ── */
function renderAll(){
  renderStats();
  document.getElementById('pg0').innerHTML=renderMembers();
  document.getElementById('pg1').innerHTML=renderToday();
  document.getElementById('pg2').innerHTML=renderCourts();
  renderBottom();
}

/* ── 시작 ── */
load();
document.getElementById('hdr-date').textContent=todayLbl();
setInterval(tick,1000);tick();
renderAll();
syncListen(); // Firebase 실시간 수신 시작
</script>
