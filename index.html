<script>
/* ════════════════════════════════════════
   🔥 Firebase 설정
   아래 firebaseConfig 를 본인 프로젝트로 교체하세요
   (무료 Spark 플랜, 보안규칙 read/write: true)
════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyD_anBSKfX8UsExUOQoDilhMJtDe8eoVks",
  authDomain: "bakdal-d30e6.firebaseapp.com",
  databaseURL: "https://bakdal-d30e6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bakdal-d30e6",
  storageBucket: "bakdal-d30e6.firebasestorage.app",
  messagingSenderId: "250451058346",
  appId: "1:250451058346:web:d1635d423763fba63cbad3",
  measurementId: "G-EEGPXMBXKL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const REF = db.ref('tennis/' + new Date().toISOString().slice(0,10)); // 날짜별 분리

let syncPushTimer = null;
const DEVICE_ID = Date.now()+'-'+Math.random().toString(36).slice(2,8); // 기기별 고유 ID
let lastSentToken = ''; // 내가 마지막으로 보낸 토큰

function setSyncDot(st){
  const d=document.getElementById('sync-dot');
  if(d){d.className='sync-dot'+(st?' '+st:'');}
}

/* Firebase 객체/배열 정규화
   Firebase는 JS 배열을 {"0":{...},"1":{...}} 객체로 저장함
   → 받아올 때 반드시 Array로 복원해야 filter/find/map 동작함 */
function toArr(v){
  if(!v) return [];
  if(Array.isArray(v)) return v;
  return Object.values(v);
}
function normalizeS(raw){
  if(!raw) return;
  const s = raw.state;
  if(s){
    s.attendees  = toArr(s.attendees).map(a=>({
      ...a,
      court:      a.court      ?? null,
      nextCourt1: a.nextCourt1 ?? null,
      nextCourt2: a.nextCourt2 ?? null,
      hasCourt:   a.hasCourt   ?? false,
    }));
    s.leftMembers = toArr(s.leftMembers);
    S = s;
  }
  if(raw.CC){
    const c = raw.CC;
    CC = {
      1:!!(c['1']||c[1]), 2:!!(c['2']||c[2]),
      3:!!(c['3']||c[3]), 4:!!(c['4']||c[4]),
      5:!!(c['5']||c[5]), 6:!!(c['6']||c[6]),
    };
  }
}

/* 서버로 push (debounce 1초) */
function syncPush(){
  if(syncPushTimer) clearTimeout(syncPushTimer);
  setSyncDot('busy');
  syncPushTimer = setTimeout(()=>{
    const token = DEVICE_ID+'-'+Date.now(); // 기기+시간 조합으로 전역 고유성 보장
    lastSentToken = token;
    REF.set({state:S, CC, seq:token, updatedAt:Date.now()})
      .then(()=>setSyncDot('ok'))
      .catch(()=>setSyncDot('err'));
  }, 1000);
}

/* 서버에서 실시간 listen */
function syncListen(){
  REF.on('value', snap=>{
    const raw = snap.val();
    if(!raw){ setSyncDot('err'); return; }
    setSyncDot('ok');
    // 내가 방금 보낸 토큰과 동일하면 (내 데이터가 그대로 돌아온 것) 무시
    const incomingToken = raw.seq ?? '';
    if(incomingToken && incomingToken === lastSentToken) return;
    // 다른 기기(관리자 포함)에서 온 변경사항 → 반드시 반영
    normalizeS(raw);
    renderAll();
  });
}

function pad(n){return String(n).padStart(2,'0');}
function dateStr(d=new Date()){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function timeStr(d=new Date()){return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function nowTs(){return Math.floor(Date.now()/1000);}
function tmins(s){if(!s)return 9999;const[h,m]=s.split(':').map(Number);return h*60+m;}
function getBand(t){const m=tmins(t);return TBANDS.find(b=>m>=b.s&&m<b.e)||null;}
function todayLbl(){const d=new Date(),ds=['일','월','화','수','목','금','토'];return`${d.getMonth()+1}/${d.getDate()}(${ds[d.getDay()]})`;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ── 로컬 스토리지 ── */
function load(){
  try{const r=localStorage.getItem(SK);if(!r)return;
    const o=JSON.parse(r);
    if(o.date===dateStr()){
      // 로컬 데이터도 정규화 (혹시 오염된 경우 대비)
      if(o.state){
        o.state.attendees  = toArr(o.state.attendees).map(a=>({...a,court:a.court??null,nextCourt1:a.nextCourt1??null,nextCourt2:a.nextCourt2??null,hasCourt:a.hasCourt??false}));
        o.state.leftMembers= toArr(o.state.leftMembers);
      }
      S =o.state;
      CC=o.CC||{1:false,2:false,3:false,4:false,5:false,6:false};
    }
  }catch(e){}
}
function save(){
  try{localStorage.setItem(SK,JSON.stringify({date:dateStr(),state:S,CC}));}catch(e){}
  syncPush();
}
function archive(s,dt){
  try{const h=JSON.parse(localStorage.getItem(HK)||'[]');
    h.push({date:dt,...JSON.parse(JSON.stringify(s))});
    localStorage.setItem(HK,JSON.stringify(h));}catch(e){}
}

function goTab(idx){

(function(){
  const wrap=document.getElementById('slide-wrap');
  let sx=0,dragging=false,moved=false;
  function start(x){sx=x;dragging=true;moved=false;}
  function end(ex){if(!dragging)return;dragging=false;if(!moved)return;const dx=ex-sx;if(Math.abs(dx)>40)goTab(Math.max(1,Math.min(2,curTab+(dx<0?1:-1))));}
  wrap.addEventListener('touchstart',e=>{start(e.touches[0].clientX);},{passive:true});
  wrap.addEventListener('touchmove',e=>{if(dragging&&Math.abs(e.touches[0].clientX-sx)>5)moved=true;},{passive:true});
  wrap.addEventListener('touchend',e=>{end(e.changedTouches[0].clientX);});
  wrap.addEventListener('mousedown',e=>{start(e.clientX);});
  wrap.addEventListener('mousemove',e=>{if(dragging&&Math.abs(e.clientX-sx)>5)moved=true;});
  wrap.addEventListener('mouseup',e=>{end(e.clientX);});
})();

/* ── 출석/퇴소 ── */
function markAttend(id){
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  // ID 기준 + 이름 기준 모두 체크 (동명이인 ID 꼬임 대비 이중 안전장치)
  if(S.attendees.find(x=>x.id===id || x.name===m.name)){toast(`${m.name} 이미 출석`);goTab(1);return;}
  const t=timeStr();const ts=nowTs();S.seqCounter++;
  S.attendees.push({id:m.id,name:m.name,gender:m.gender,seq:S.seqCounter,games:0,time:t,court:null,courtFreeAt:t,courtFreeTs:ts,attendTs:ts,hasCourt:false});
  save();toast(`${m.name} 출석 ✓  ${t}`);goTab(1);
}
function restoreAttendee(id){
  const idx=S.leftMembers.findIndex(x=>x.id===id);
  if(idx===-1)return;
  const a=S.leftMembers[idx];
  const t=timeStr();const ts=nowTs();
  S.leftMembers.splice(idx,1);
  S.seqCounter++;
  S.attendees.push({id:a.id,name:a.name,gender:a.gender,seq:S.seqCounter,games:a.games,time:t,court:null,courtFreeAt:t,courtFreeTs:ts,attendTs:ts,hasCourt:false,nextCourt1:null,nextCourt2:null});
  save();renderAll();toast(`${a.name} 복구 완료 (${t})`);
}

function leave(id){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  openModal(`${a.name} 회원을 퇴소 처리하시겠습니까?\n(게임: ${a.games}게임)`,()=>{
    S.leftMembers.push({...a,leftAt:timeStr()});
    S.attendees=S.attendees.filter(x=>x.id!==id);
    if(a.court)CC[a.court]=false;
    save();renderAll();toast(`${a.name} 퇴소 처리됨`);
  });
}

/* ── 코트 배정 ── */
function toggleCourt(id,n){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  if(a.court===n){a.court=null;a.courtFreeAt=timeStr();a.courtFreeTs=nowTs();save();renderAll();return;}
  if(S.attendees.filter(x=>x.court===n).length>=CMAX){toast(`${CNAMES[n]}은 이미 꽉 찼습니다 ⚠️`);return;}
  if(!NEXT_COURTS.includes(n)){
    if(a.court&&!NEXT_COURTS.includes(a.court))CC[a.court]=false;
    a.court=n;a.hasCourt=true;
  } else {
    const nc=n===5?'nextCourt1':'nextCourt2';
    a[nc]=a[nc]===n?null:n;save();renderAll();return;
  }
  save();renderAll();
}
function toggleNextCourt(id,which){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  const nc=which===1?'nextCourt1':'nextCourt2';
  const n=which===1?5:6;
  if(a[nc]){a[nc]=null;save();renderAll();return;}
  if(S.attendees.filter(x=>x[nc]).length>=CMAX){toast(`${CNAMES[n]}은 이미 꽉 찼습니다 ⚠️`);return;}
  a[nc]=n;save();renderAll();
}
function removeFromCourt(id){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  if(a.court)CC[a.court]=false;
  a.court=null;a.courtFreeAt=timeStr();a.courtFreeTs=nowTs();
  save();renderAll();toast(`${a.name} → 미배정`);
}
function clearCourt(n){
  const pl=S.attendees.filter(x=>x.court===n);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  const t=timeStr();const baseTs=nowTs();
  shuffle(pl.slice()).forEach((a,i)=>{a.court=null;a.courtFreeAt=t;a.courtFreeTs=baseTs+i;});
  CC[n]=false;save();renderAll();toast(`${CNAMES[n]} 해제 완료`);
}
function confirmCourt(n){
  const pl=S.attendees.filter(x=>x.court===n);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  if(CC[n]){toast(`${CNAMES[n]}은 이미 확정`);return;}
  if(pl.length<CMAX){openModal(`⚠️ ${CNAMES[n]}에 ${pl.length}명만 배정되어 있습니다.\n4명이 되어야 확정할 수 있습니다.\n(1명이 모자랍니다)`,null);return;}
  pl.forEach(a=>{a.games+=1;});CC[n]=true;save();renderAll();toast(`✅ ${CNAMES[n]} 확정`);
}
function clearNextCourt(n){
  const nc=n===5?'nextCourt1':'nextCourt2';
  const pl=S.attendees.filter(x=>x[nc]);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  const t=timeStr();const baseTs=nowTs();
  shuffle(pl.slice()).forEach((a,i)=>{a[nc]=null;if(!a.court){a.courtFreeAt=t;a.courtFreeTs=baseTs+i;}});
  CC[n]=false;save();renderAll();toast(`${CNAMES[n]} 해제 완료`);
}
function confirmNextCourt(n){
  const nc=n===5?'nextCourt1':'nextCourt2';
  const pl=S.attendees.filter(x=>x[nc]);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  if(CC[n]){toast(`${CNAMES[n]}은 이미 확정`);return;}
  if(pl.length<CMAX){openModal(`⚠️ ${CNAMES[n]}에 ${pl.length}명만 배정되어 있습니다.\n4명이 되어야 확정할 수 있습니다.\n(1명이 모자랍니다)`,null);return;}
  const availCourts=[];
  for(let cn=1;cn<=4;cn++){const cur=S.attendees.filter(x=>x.court===cn).length;if(cur<CMAX)availCourts.push({cn,cur,free:CMAX-cur});}
  if(!availCourts.length){toast('⚠️ 1~4코트가 모두 꽉 찼습니다. 코트를 해제한 후 확정해주세요.',3500);return;}
  const availTxt=availCourts.map(c=>`${CNAMES[c.cn]}(${c.cur}/${CMAX})`).join(', ');
  openModal(`${CNAMES[n]} 확정 → 코트 이동\n\n배정 가능: ${availTxt}\n\n${pl.length}명을 빈 코트로 배정합니다.`,()=>{
    const t=timeStr();const baseTs=nowTs();
    CC[n]=true;
    availCourts.sort((a,b)=>b.free-a.free);
    let pi=0;
    for(const{cn,free}of availCourts){
      let filled=0;
      while(pi<pl.length&&filled<free){
        const a=pl[pi];
        if(!a.court){a.court=cn;a.hasCourt=true;}else filled--;
        a[nc]=null;pi++;filled++;
      }
      if(pi>=pl.length)break;
    }
    while(pi<pl.length){const a=pl[pi];a[nc]=null;if(!a.court){a.courtFreeAt=t;a.courtFreeTs=baseTs+pi;}pi++;}
    save();renderAll();toast(`✅ ${CNAMES[n]} 확정 — ${pl.length}명 코트 배정`);
  });
}

function assignNextTeam(which,teamIds){

  const nc1cnt=S.attendees.filter(a=>a.nextCourt1).length;
  let targetWhich=which;
  if(which===1&&nc1cnt>=CMAX){
    if(S.attendees.filter(a=>a.nextCourt2).length>=CMAX){toast('⚠️ 다음차례1,2 모두 꽉 찼습니다.',3000);return;}
    targetWhich=2;toast('다음차례가 꽉 차 있어 다음차례2에 배정합니다.',2500);
  }
  const nc=targetWhich===1?'nextCourt1':'nextCourt2';
  const n=targetWhich===1?5:6;
  shuffle(S.attendees.filter(a=>a[nc])).forEach((a,i)=>{a[nc]=null;if(!a.court){a.courtFreeAt=t;a.courtFreeTs=baseTs+i;}});
  CC[n]=false;
  teamIds.forEach(id=>{const a=S.attendees.find(x=>x.id===id);if(a)a[nc]=n;});
  save();renderAll();toast(`✅ ${CNAMES[n]}에 ${teamIds.length}명 배정`);
}

/* ── 대기/추천 ── */
function getSortedWaiting(){
  function getTs(a){if(a.courtFreeTs)return a.courtFreeTs;const t=a.courtFreeAt||a.time||'00:00';const[h,m]=t.split(':').map(Number);return h*3600+m*60;}
  S.attendees.forEach(a=>{if(a.hasCourt===undefined)a.hasCourt=!!(a.courtFreeAt&&a.courtFreeAt!==a.time);});
  return S.attendees.filter(x=>x.court===null).sort((a,b)=>getTs(a)-getTs(b));
}
function buildRecommendedTeams(){
  const waiting=getSortedWaiting();
  function buildPool(gender){
    const w=waiting.filter(x=>x.gender===gender);
    const c=S.attendees.filter(x=>x.gender===gender&&x.court&&!NEXT_COURTS.includes(x.court)).sort((a,b)=>(a.attendTs||0)-(b.attendTs||0));
    return{all:[...w,...c]};
  }
  function pick(n,pool){
    const all=pool.all;const M=all.length;
    if(!M)return[];if(M<=n)return shuffle(all).slice(0,n);
    const fc=Math.min(Math.max(0,M-2),n);
    return[...all.slice(0,fc),...shuffle(all.slice(fc)).slice(0,n-fc)];
  }
  const mp=buildPool('m'),fp=buildPool('f');
  const teams=[];
  if(mp.all.length>=1){const t=pick(4,mp);if(t.length)teams.push({label:'추천1팀 — 남자',color:'#185FA5',badge:'👨',team:t});}
  if(fp.all.length>=1){const t=pick(4,fp);if(t.length)teams.push({label:'추천2팀 — 여자',color:'#993556',badge:'👩',team:t});}
  if(mp.all.length>=1&&fp.all.length>=1){
    const tm=pick(2,mp),tf=pick(2,fp);const t=[...tm,...tf];
    if(t.length>=2)teams.push({label:'추천3팀 — 혼성(남2여2)',color:'#7B3FA0',badge:'👫',team:t});
  }
  return teams;
}

/* ── 코트 현황 ── */
function renderCourts(){
  const me=getCurrentMember();
  let h='<div class="court-grid">';
  [1,2,3,4].forEach(n=>{
    const pl=S.attendees.filter(x=>x.court===n);const cnt=pl.length,full=cnt>=CMAX,conf=CC[n];
    let slots='';pl.forEach(a=>{
      const isMe=me&&a.id===me.id;
      const nameStyle=isMe?'font-size:13px;font-weight:900;color:#0D5FBF;text-decoration:underline':'font-size:13px;font-weight:700';
      slots+=`<div class="ct-slot" style="cursor:default${isMe?';background:#E3F0FF':''}"><span style="${nameStyle}">${a.name}</span>${gt(a.gender,true)}<span style="flex:1"></span><span class="ct-slot-hint">해제</span></div>`;
    });
    for(let i=cnt;i<CMAX;i++)slots+=`<div class="ct-empty">— 빈자리 —</div>`;
    const status=conf?`<div class="ct-status confirmed">✅ 게임 확정</div>`:full?`<div class="ct-status full">🔴 꽉참(${cnt}/${CMAX})</div>`:cnt>0?`<div class="ct-status wait">${cnt}/${CMAX}명</div>`:`<div class="ct-status wait">배정없음</div>`;
    const fullBadge=full&&!conf?`<div class="ct-full-badge">✕</div>`:'';
    const confirmBtn=!conf&&cnt>0?`<button class="ct-confirm-btn" onclick="confirmCourt(${n})">확정</button>`:'';
    h+=`<div class="ct-card"><div class="ct-hdr c${n}"><span class="ct-name">${CNAMES[n]}</span><span class="ct-cnt">${cnt}/${CMAX}</span>${fullBadge}${confirmBtn}<button class="ct-hbtn" onclick="clearCourt(${n})">해제</button></div><div class="ct-body">${slots}${status}</div></div>`;
  });
  h+=`</div>`;
  // 다음차례 코트
  h+=`<div style="padding:0 11px 2px"><div class="stitle" style="margin-top:6px">⏭ 다음차례 코트</div></div><div class="court-grid" style="padding-top:0">`;
  [5,6].forEach(n=>{
    const ncKey=n===5?'nextCourt1':'nextCourt2';
    const players=S.attendees.filter(x=>x[ncKey]);const cnt=players.length,full=cnt>=CMAX;
    // 인원이 없는데 확정 상태면 자동 초기화
    if(cnt===0&&CC[n]){CC[n]=false;save();}
    const conf=CC[n];
    let slots='';players.forEach(a=>{
      const inC=a.court&&!NEXT_COURTS.includes(a.court);
      const cb=inC?`<span style="font-size:7px;background:${CBGS[a.court]};color:${CCOLORS[a.court]};padding:1px 3px;border-radius:3px;margin-left:2px">${CNAMES[a.court]}</span>`:'';
      const isMe=me&&a.id===me.id;
      const nameStyle=isMe?'font-size:13px;font-weight:900;color:#0D5FBF;text-decoration:underline':'font-size:13px;font-weight:700';
      slots+=`<div class="ct-slot" style="cursor:default${isMe?';background:#E3F0FF':''}"><span style="${nameStyle}">${a.name}</span>${gt(a.gender,true)}<span style="font-size:7px;color:#B8B5AF">${cb}</span><span style="flex:1"></span><span class="ct-slot-hint">해제</span></div>`;
    });
    for(let i=cnt;i<CMAX;i++)slots+=`<div class="ct-empty">— 빈자리 —</div>`;
    const status=conf?`<div class="ct-status confirmed">✅ 게임 확정</div>`:full?`<div class="ct-status full">🔴 꽉참(${cnt}/${CMAX})</div>`:cnt>0?`<div class="ct-status wait">${cnt}/${CMAX}명</div>`:`<div class="ct-status wait">배정없음</div>`;
    const fullBadge=full&&!conf?`<div class="ct-full-badge">✕</div>`:'';
    const confirmBtn=!conf&&cnt>0?`<button class="ct-confirm-btn" onclick="confirmNextCourt(${n})">확정</button>`:'';
    h+=`<div class="ct-card"><div class="ct-hdr c${n}"><span class="ct-name">${CNAMES[n]}</span><span class="ct-cnt">${cnt}/${CMAX}</span>${fullBadge}${confirmBtn}<button class="ct-hbtn" onclick="clearNextCourt(${n})">해제</button></div><div class="ct-body">${slots}${status}</div></div>`;
  });

  return h;
}

/* ── 모니터링 계정 전용: 출석/퇴소 음성 안내 (팝업 없음, 음성만) ── */
let prevAttendIds=null;
let prevLeftIds=null;
function checkAttendanceAnnouncements(){
  const me=getCurrentMember();
  if(!me || !HIDDEN_MEMBER_IDS.includes(me.id)) return; // 모니터링 계정만 동작
  if(!notifyEnabled) return;

  const curAttendIds=new Set(S.attendees.filter(x=>!HIDDEN_MEMBER_IDS.includes(x.id)).map(x=>x.id));
  const curLeftIds=new Set(S.leftMembers.filter(x=>!HIDDEN_MEMBER_IDS.includes(x.id)).map(x=>x.id));

  if(prevAttendIds!==null){
    curAttendIds.forEach(id=>{
      if(!prevAttendIds.has(id)){
        const a=S.attendees.find(x=>x.id===id);
        if(a) speakStatus(`${a.name} 회원님 출석하였습니다`);
      }
    });
  }
  if(prevLeftIds!==null){
    curLeftIds.forEach(id=>{
      if(!prevLeftIds.has(id)){
        const a=S.leftMembers.find(x=>x.id===id);
        if(a) speakStatus(`${a.name} 회원님 퇴소하였습니다`);
      }
    });
  }
  prevAttendIds=curAttendIds;
  prevLeftIds=curLeftIds;
}

/* ── 전체 회원 코트 배정/확정 음성 안내 ──
   이전 상태와 비교해서 새로 꽉 찬 코트(배정) / 새로 확정된 코트(확정)를 감지 */
let prevCourtSnapshot={}; // {courtNum: {cnt, confirmed, key}}
function checkGlobalCourtAnnouncements(){
  if(!notifyEnabled) return;
  [1,2,3,4,5,6].forEach(n=>{
    // 1~4코트는 court 필드, 5/6(다음차례1·2)은 nextCourt1/nextCourt2 필드로 판별
    const pl = n<=4
      ? S.attendees.filter(x=>x.court===n)
      : S.attendees.filter(x=>n===5 ? x.nextCourt1 : x.nextCourt2);
    const cnt=pl.length;
    const confirmed=!!CC[n];
    const key=pl.map(a=>a.id).sort().join(',');
    const prev=prevCourtSnapshot[n];

    if(prev){
      // 새로 4명이 채워짐 (배정 완료, 이전엔 4명이 아니었거나 다른 조합)
      if(cnt===CMAX && !confirmed && (prev.key!==key || prev.cnt<CMAX)){
        const names=pl.map(a=>a.name).join(', ');
        const msg=`${CNAMES[n]}에 ${names} 배정되었습니다`;
        speakStatus(msg);
        showStatusPopup('🎾', msg, CBGS[n], CCOLORS[n]);
      }
      // 새로 확정됨 (이전엔 미확정 → 지금 확정)
      if(confirmed && !prev.confirmed){
        const names=pl.map(a=>a.name).join(', ');
        const msg = n<=4
          ? `${CNAMES[n]}에 ${names} 확정되어 입장하십시오`
          : `${CNAMES[n]}에 ${names} 확정되었습니다`;
        speakStatus(msg);
        showStatusPopup('✅', msg, CBGS[n], CCOLORS[n]);
      }
    }
    prevCourtSnapshot[n]={cnt, confirmed, key};
  });
}

function renderBoard(){

  function bigSlot(a, accentColor){
    const isMe=me&&a.id===me.id;
    const ring=isMe?`box-shadow:0 0 0 4px #FFD23F;`:'';
    return`<div style="background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px;${ring}">

      ${isMe?'<span style="margin-left:auto;font-size:13px;font-weight:900;color:#B8860B">⭐ 나</span>':''}
    </div>`;
  }
  function emptySlot(){
    return`<div style="border:2px dashed rgba(255,255,255,.25);border-radius:12px;padding:14px 16px;margin-bottom:8px;text-align:center;color:rgba(255,255,255,.4);font-size:16px;font-weight:600">— 빈자리 —</div>`;
  }
  function bigCard(n, isNext){
    const ncKey=n===5?'nextCourt1':'nextCourt2';
    const pl=isNext ? S.attendees.filter(x=>x[ncKey]) : S.attendees.filter(x=>x.court===n);
    const cnt=pl.length, conf=!!CC[n];
    let body='';
    pl.forEach(a=>{ body+=bigSlot(a); });
    for(let i=cnt;i<CMAX;i++) body+=emptySlot();
    const statusBadge=conf
      ? `<span style="background:#1D9E75;color:#fff;padding:6px 14px;border-radius:20px;font-size:15px;font-weight:900">✅ 게임 확정</span>`
      : cnt>=CMAX
        ? `<span style="background:#B25000;color:#fff;padding:6px 14px;border-radius:20px;font-size:15px;font-weight:900">🔴 배정완료(대기)</span>`
        : `<span style="background:rgba(255,255,255,.15);color:#fff;padding:6px 14px;border-radius:20px;font-size:15px;font-weight:700">${cnt}/${CMAX}명 대기</span>`;
    return`<div style="background:${CCOLORS[n]};border-radius:18px;padding:18px;min-width:0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <span style="color:#fff;font-size:24px;font-weight:900">${CNAMES[n]}</span>
        ${statusBadge}
      </div>
      ${body}
    </div>`;
  }

  let h='';
  // 1~4코트 (2x2)
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px">';
  [1,2,3,4].forEach(n=>{ h+=bigCard(n,false); });
  h+='</div>';
  // 다음차례 (1x2)
  h+='<div style="color:#fff;font-size:20px;font-weight:900;margin-bottom:14px;opacity:.85">⏭ 다음차례 코트</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">';
  [5,6].forEach(n=>{ h+=bigCard(n,true); });
  h+='</div>';

  el.innerHTML=h;
}

/* ── 상태 변화 알림 (음성 + 진동 + 팝업) ── */
let lastMyStatusKey=null; // 직전 상태값 (변화 감지용)
let notifyEnabled=true;   // 알림 on/off (사용자가 끌 수 있게)

function speakStatus(text){
  if(!notifyEnabled) return;
  try{
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel(); // 이전 음성 중단
    const utter=new SpeechSynthesisUtterance(text);
    utter.lang='ko-KR';
    utter.rate=1.0;
    utter.pitch=1.0;
    window.speechSynthesis.speak(utter);
  }catch(e){}
}

function vibrateDevice(pattern){
  if(!notifyEnabled) return;
  try{
    if('vibrate' in navigator) navigator.vibrate(pattern);
  }catch(e){}
}

function showStatusPopup(icon, label, bg, tc){
  if(!notifyEnabled) return;
  const old=document.getElementById('status-popup-overlay');
  if(old) old.remove();
  const overlay=document.createElement('div');
  overlay.id='status-popup-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:900;animation:fadeIn .2s';
  overlay.innerHTML=`<div style="background:${bg};border-radius:20px;padding:28px 30px;max-width:300px;width:85%;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.3);animation:popIn .25s">
    <div style="font-size:48px;margin-bottom:10px">${icon}</div>
    <div style="font-size:18px;font-weight:900;color:${tc};line-height:1.5;word-break:keep-all">${label}</div>
    <button onclick="document.getElementById('status-popup-overlay').remove()" style="margin-top:18px;padding:9px 22px;background:${tc};color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">확인</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.remove(); };

  // 음성이 끝나면 팝업도 같이 닫힘 (speechSynthesis 종료 감지)
  // 음성 시작까지 약간의 지연이 있으므로, 0.8초 뒤부터 감지 시작 (오작동 방지)
  try{
    if('speechSynthesis' in window){
      setTimeout(()=>{
        const checkSpeaking=setInterval(()=>{
          if(!window.speechSynthesis.speaking){
            clearInterval(checkSpeaking);
            const el=document.getElementById('status-popup-overlay');
            if(el) el.remove();
          }
        },200);
        // 안전장치: 감지 시작 후 최대 8초 지나면 무조건 닫힘
        setTimeout(()=>{ clearInterval(checkSpeaking); const el=document.getElementById('status-popup-overlay'); if(el) el.remove(); }, 8000);
      }, 800);
    } else {
      // 음성 API 미지원 기기는 4초 후 자동 닫힘
      setTimeout(()=>{ const el=document.getElementById('status-popup-overlay'); if(el) el.remove(); }, 4000);
    }
  }catch(e){
    setTimeout(()=>{ const el=document.getElementById('status-popup-overlay'); if(el) el.remove(); }, 4000);
  }
}

function renderMyStatusBanner(){
  const el=document.getElementById('my-status-banner');
  if(!el) return;
  const me=getCurrentMember();
  if(!me){ el.innerHTML=''; lastMyStatusKey=null; return; }
  const a=S.attendees.find(x=>x.id===me.id);
  if(!a){ el.innerHTML=''; lastMyStatusKey=null; return; } // 아직 출석 전이면 표시 안 함

  let label='', bg='#F0EDE8', tc='#555', icon='⏳', statusKey='';
  if(a.court && !NEXT_COURTS.includes(a.court)){
    const confirmed=!!CC[a.court];
    label=confirmed?`${CNAMES[a.court]} 배정완료(확정)`:`${CNAMES[a.court]} 배정중(미확정)`;
    bg=CBGS[a.court]; tc=CCOLORS[a.court]; icon=confirmed?'✅':'🎾';
    statusKey=`court${a.court}-${confirmed?'confirmed':'pending'}`;
  } else if(a.nextCourt1){
    const confirmed=!!CC[5];
    label=confirmed?'다음차례1 배정완료(확정)':'다음차례1 배정중(미확정)';
    bg=CBGS[5]; tc=CCOLORS[5]; icon=confirmed?'✅':'⏭';
    statusKey=`next1-${confirmed?'confirmed':'pending'}`;
  } else if(a.nextCourt2){
    const confirmed=!!CC[6];
    label=confirmed?'다음차례2 배정완료(확정)':'다음차례2 배정중(미확정)';
    bg=CBGS[6]; tc=CCOLORS[6]; icon=confirmed?'✅':'⏭';
    statusKey=`next2-${confirmed?'confirmed':'pending'}`;
  } else {
    label='미배정 대기중';
    bg='#EFEDE8'; tc='#6B6862'; icon='⏳';
    statusKey='waiting';
  }

  el.innerHTML=`<div style="margin:10px 11px;padding:14px 16px;border-radius:14px;background:${bg};display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)">
    <span style="font-size:26px;flex-shrink:0">${icon}</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;color:${tc};opacity:.75;font-weight:600">${me.name}님의 현재 상태</div>
      <div style="font-size:18px;font-weight:900;color:${tc};margin-top:1px">${label}</div>
    </div>
    <button onclick="notifyEnabled=!notifyEnabled;this.textContent=notifyEnabled?'🔔':'🔕';" id="notify-toggle-btn" style="flex-shrink:0;background:rgba(255,255,255,.5);border:none;border-radius:8px;padding:6px 9px;font-size:16px;cursor:pointer">🔔</button>
  </div>`;

  // ── 상태 변화 감지 → 알림 트리거 (음성 + 진동 + 팝업, 모니터링 계정은 제외) ──
  if(lastMyStatusKey!==null && lastMyStatusKey!==statusKey && !HIDDEN_MEMBER_IDS.includes(me.id)){
    vibrateDevice([200,100,200]);
    speakStatus(`${me.name}님, ${label} 상태입니다`);
    showStatusPopup(icon, label, bg, tc);
  }
  lastMyStatusKey=statusKey;
}

/* 다음차례1·2 배정 인원 현황 배너 */
function renderNextCourtBanner(){
  const el=document.getElementById('next-court-banner');
  if(!el) return;
  const me=getCurrentMember();
  if(!me){ el.innerHTML=''; return; }

  function buildCol(n){
    const ncKey=n===5?'nextCourt1':'nextCourt2';
    const players=S.attendees.filter(x=>x[ncKey]);
    const confirmed=!!CC[n];
    const names=players.length
      ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">${players.map(a=>`<span style="display:block;text-align:center;background:${CBGS[n]};color:${CCOLORS[n]};padding:5px 4px;border-radius:7px;font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.name}</span>`).join('')}</div>`
      : '<span style="font-size:12px;color:#aaa">배정 없음</span>';
    return`<div style="flex:1;min-width:0">
      <div style="font-size:12px;color:${CCOLORS[n]};opacity:.8;font-weight:700;margin-bottom:5px">${CNAMES[n]} ${confirmed?'✅확정':`(${players.length}/${CMAX})`}</div>
      ${names}
    </div>`;
  }

  el.innerHTML=`<div style="margin:6px 11px 10px;padding:12px 16px;border-radius:14px;background:#F4F6F7;box-shadow:0 2px 8px rgba(0,0,0,.06)">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
      <span style="font-size:18px">⏭</span>
      <span style="font-size:12px;font-weight:700;color:#666">다음차례 배정 현황</span>
    </div>
    <div style="display:flex;gap:14px">
      ${buildCol(5)}
      <div style="width:1px;background:#D8D5CF;flex-shrink:0"></div>
      ${buildCol(6)}
    </div>
  </div>`;
}

let loginInProgress=false;
function doLogin(){
  if(loginInProgress) return; // 중복 클릭 방지
  const nameInput=document.getElementById('login-name-input');
  const errEl=document.getElementById('login-error');
  const name=(nameInput.value||'').trim();
  errEl.textContent='';
  if(!name){ errEl.textContent='이름을 입력해주세요.'; return; }

  const member=MEMBERS.find(x=>x.name===name);
  if(!member){
    errEl.textContent=`"${name}" 회원이 아닙니다. 이름을 다시 확인해주세요.`;
    return;
  }

  loginInProgress=true;
  errEl.textContent='출석 확인 중...';

  // 로그인 직전, Firebase에서 최신 데이터를 반드시 먼저 받아온 뒤 출석 처리
  // (다른 기기에서 이미 출석시켰는지 확인하기 위함 — race condition 방지)
  REF.once('value').then(snap=>{
    const raw=snap.val();
    if(raw){ normalizeS(raw); }

    // 로그인 성공 처리
    try{ sessionStorage.setItem(LOGIN_KEY, JSON.stringify(member)); }catch(e){}
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';

    // 최신 데이터 기준으로 출석 여부 재확인
    if(!S.attendees.find(x=>x.id===member.id)){
      markAttend(member.id);
    } else {
      toast(`${member.name} 님, 이미 출석하셨습니다`);
      renderAll();
      goTab(1);
    }
    if(HIDDEN_MEMBER_IDS.includes(member.id)) toggleBoardMode(true); // 모니터링 회원: 자동 보드모드
    loginInProgress=false;
  }).catch(()=>{
    // Firebase 조회 실패 시에도 로컬 기준으로 진행 (오프라인 대비)
    try{ sessionStorage.setItem(LOGIN_KEY, JSON.stringify(member)); }catch(e){}
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    if(!S.attendees.find(x=>x.id===member.id)){
      markAttend(member.id);
    } else {
      toast(`${member.name} 님, 이미 출석하셨습니다`);
      goTab(1);
    }
    if(HIDDEN_MEMBER_IDS.includes(member.id)) toggleBoardMode(true); // 모니터링 회원: 자동 보드모드
    loginInProgress=false;
  });
}

function checkExistingLogin(){
  try{
    const saved=sessionStorage.getItem(LOGIN_KEY);
    if(saved){
      const member=JSON.parse(saved);
      // 회원명부에 여전히 존재하는지 재확인
      if(MEMBERS.find(x=>x.id===member.id && x.name===member.name)){
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').style.display='flex';
        return true;
      }
    }
  }catch(e){}
  return false;
}
