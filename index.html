<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎾 테니스 동호회</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','맑은 고딕',sans-serif;background:#E8E5E0;display:flex;justify-content:center;align-items:flex-start;}
#app{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;background:#f8f7f4;overflow:hidden;}

/* 헤더 */
.hdr{background:#1D9E75;padding:10px 13px 9px;flex-shrink:0;}
.hdr-top{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.hdr-title{color:#fff;font-size:15px;font-weight:700;flex:1;}
.hdr-date{color:rgba(255,255,255,.82);font-size:10px;}
.hdr-clock{color:rgba(255,255,255,.6);font-size:10px;font-variant-numeric:tabular-nums;}
.stat-row{display:flex;gap:4px;}
.sc{flex:1;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:5px 2px;text-align:center;cursor:pointer;user-select:none;}
.sc:active{background:rgba(255,255,255,.35);}
.sn{font-size:17px;font-weight:700;color:#fff;line-height:1.1;}
.sn.m{color:#B5D4F4;}.sn.f{color:#F4C0D1;}.sn.lv{color:#FFD580;}
.sl{font-size:9px;color:rgba(255,255,255,.76);margin-top:1px;}

/* 탭 */
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #E0DFDB;flex-shrink:0;}
.tab{flex:1;padding:9px 3px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:10px;color:#888780;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:2.5px solid transparent;}
.tab span{font-size:17px;}
.tab.active{color:#1D9E75;font-weight:700;border-bottom-color:#1D9E75;}

/* 본문 스크롤 */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0;}

/* 섹션 타이틀 */
.stitle{display:flex;align-items:center;gap:5px;font-size:11px;color:#888780;font-weight:600;padding-bottom:5px;border-bottom:.5px solid #E0DFDB;margin-bottom:7px;margin-top:3px;}

/* 기본 카드 */
.card{display:flex;align-items:center;flex-wrap:wrap;padding:7px 8px;background:#fff;border:.5px solid #E0DFDB;border-radius:10px;margin-bottom:5px;gap:5px;}

/* 남/여 분할 레이아웃 (회원명부, 미배정) */
.split-wrap{display:grid;grid-template-columns:1fr 1fr;}
.split-col{padding:7px 6px 60px;}
.split-col.lcol{border-right:.5px solid #E0DFDB;}
.split-hdr{text-align:center;padding:5px 3px;border-radius:7px;margin-bottom:5px;font-size:11px;font-weight:700;}
.split-hdr.m{background:#E6F1FB;color:#185FA5;}
.split-hdr.f{background:#FBEAF0;color:#993556;}
/* 분할 카드 */
.scard{display:flex;align-items:center;justify-content:space-between;padding:5px 6px;background:#fff;border:.5px solid #E0DFDB;border-radius:8px;margin-bottom:4px;gap:4px;}
.sname{font-size:12px;font-weight:700;color:#1A1A1A;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.schips{display:flex;align-items:center;gap:2px;flex-shrink:0;}

/* 성별태그 */
.gt{font-size:9px;font-weight:700;padding:1px 4px;border-radius:5px;flex-shrink:0;}
.gt.m{background:#E6F1FB;color:#185FA5;}.gt.f{background:#FBEAF0;color:#993556;}

/* 칩 */
.chip{font-size:9px;font-weight:700;padding:1px 4px;border-radius:5px;}
.chip.g{background:#E1F5EE;color:#0F6E56;}.chip.r{background:#FAECE7;color:#993C1D;}

/* 출석 버튼 */
.btn-att{background:#1D9E75;color:#fff;border:none;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;}
.btn-att:active{opacity:.8;}
.btn-att.done{background:#B4B2A9;cursor:default;}

/* 참석자 행 — 컴팩트 */
.ai{flex:1;min-width:0;}
.aname{font-size:12px;font-weight:700;color:#1A1A1A;}
.atime{font-size:9px;color:#888780;background:#F0EDE8;padding:1px 4px;border-radius:4px;display:inline-block;margin-top:1px;}
.seq-b{width:18px;height:18px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.gcnt-only{font-size:11px;font-weight:700;color:#1A1A1A;background:#F0EDE8;padding:2px 5px;border-radius:5px;flex-shrink:0;}

/* 퇴소 버튼 */
.btn-lv{background:#FAECE7;color:#993C1D;border:.5px solid #EFBCB0;padding:3px 6px;border-radius:6px;font-size:10px;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-appearance:none;}
.btn-lv:active{opacity:.7;}

/* 코트 버튼 — 참석자 행 상단 (wrap으로 위로 올라옴) */
.court-btns-top{display:flex;gap:2px;width:100%;margin-bottom:2px;}
.cbtn{flex:1;padding:4px 1px;border-radius:6px;font-size:10px;font-weight:700;border:1.5px solid #D8D5CF;cursor:pointer;font-family:inherit;text-align:center;background:#F0EDE8;color:#888780;-webkit-appearance:none;}
.cbtn:active{opacity:.75;}
.cbtn.c1.on{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.cbtn.c2.on{background:#185FA5;color:#fff;border-color:#185FA5;}
.cbtn.c3.on{background:#B25000;color:#fff;border-color:#B25000;}
.cbtn.c4.on{background:#7B3FA0;color:#fff;border-color:#7B3FA0;}
.cbtn.full-disabled{opacity:.35;cursor:not-allowed;}

/* 시간대 그룹 */
.tg{margin-bottom:8px;}
.tg-hdr{font-size:10px;font-weight:700;background:#E1F5EE;color:#0F6E56;padding:3px 8px;border-radius:6px;margin-bottom:3px;}

/* 퇴소 행 */
.lrow{opacity:.6;}
.lname{font-size:12px;font-weight:600;text-decoration:line-through;color:#888780;flex:1;}

/* 빈 상태 */
.empty{text-align:center;padding:44px 16px;color:#888780;font-size:13px;}
.empty-icon{font-size:38px;margin-bottom:9px;}

/* ══ 코트 현황 ══ */
.court-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:9px 11px 5px;}
.ct-card{border-radius:12px;overflow:hidden;border:1px solid #E0DFDB;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.07);}
.ct-hdr{padding:7px 8px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.ct-hdr.c1{background:#1D9E75;}.ct-hdr.c2{background:#185FA5;}
.ct-hdr.c3{background:#B25000;}.ct-hdr.c4{background:#7B3FA0;}
.ct-name{color:#fff;font-size:12px;font-weight:700;flex:1;}
.ct-cnt{color:rgba(255,255,255,.85);font-size:9px;}
.ct-full-badge{background:rgba(0,0,0,.28);color:#fff;font-size:10px;font-weight:900;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ct-hbtn{background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:5px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-appearance:none;}
.ct-hbtn:active{background:rgba(255,255,255,.42);}
.ct-confirm-btn{background:rgba(255,255,255,.9);color:#1A1A1A;border:1px solid rgba(255,255,255,.9);border-radius:5px;padding:2px 5px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;-webkit-appearance:none;}
.ct-confirm-btn:active{opacity:.7;}
.ct-body{padding:5px 6px 6px;}
.ct-slot{display:flex;align-items:center;gap:4px;padding:4px 5px;border-radius:6px;background:#F5F4F1;margin-bottom:2px;font-size:10px;font-weight:600;color:#1A1A1A;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ct-slot:active{background:#E8E5E0;}
.ct-slot-hint{font-size:7px;color:#B8B5AF;margin-left:auto;white-space:nowrap;}
.ct-empty{padding:3px 4px;border-radius:5px;border:1px dashed #D8D5CF;margin-bottom:2px;font-size:8px;color:#B8B5AF;text-align:center;}
.ct-status{margin-top:3px;padding:3px 5px;border-radius:5px;font-size:8px;text-align:center;}
.ct-status.full{background:#FFF0E0;color:#B25000;font-weight:700;}
.ct-status.wait{background:#F5F4F1;color:#888780;}
.ct-status.confirmed{background:#E1F5EE;color:#0F6E56;font-weight:700;}
.waiting-section{padding:0 11px 8px;}
.wseq-b{width:17px;height:17px;border-radius:50%;background:#FFF3E0;color:#B25000;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}

/* 하단 버튼 */
.bottom-btns{padding:7px 11px 5px;border-top:.5px solid #E0DFDB;flex-shrink:0;background:#fff;}
.btn-reassign{width:100%;padding:9px;background:#EEF4FF;color:#185FA5;border:.5px solid #B5CFF5;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:5px;-webkit-appearance:none;display:block;}
.btn-reassign:active{opacity:.8;}
.btn-reset{width:100%;padding:9px;background:#FFF3E0;color:#B25000;border:.5px solid #F5C98A;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;-webkit-appearance:none;display:block;}
.btn-reset:active{opacity:.8;}
.bhint{font-size:9px;color:#888780;text-align:center;margin-top:3px;}

/* 토스트 */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(8px);background:#2C2C2A;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;white-space:nowrap;z-index:600;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;max-width:90%;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 모달 */
#moverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:700;}
#moverlay.show{display:flex;}
.mbox{background:#fff;border-radius:16px;padding:22px 18px;max-width:300px;width:88%;box-shadow:0 12px 48px rgba(0,0,0,.22);}
.mmsg{font-size:13px;color:#1A1A1A;line-height:1.7;white-space:pre-line;margin-bottom:18px;}
.mbtns{display:flex;gap:8px;}
.mcancel{flex:1;padding:10px;background:#F5F5F3;border:.5px solid #E0DFDB;border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit;color:#1A1A1A;-webkit-appearance:none;}
.mok{flex:1;padding:10px;background:#1D9E75;border:none;border-radius:9px;font-size:12px;cursor:pointer;font-family:inherit;color:#fff;font-weight:700;-webkit-appearance:none;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <span style="font-size:19px">🎾</span>
      <span class="hdr-title">테니스 동호회</span>
      <span class="hdr-date" id="hdr-date"></span>
      <span class="hdr-clock" id="hdr-clock"></span>
    </div>
    <div class="stat-row">
      <div class="sc" onclick="navToday(null)"><div class="sn" id="st0">0</div><div class="sl">참석 총</div></div>
      <div class="sc" onclick="navToday('m')"><div class="sn m" id="st1">0</div><div class="sl">남</div></div>
      <div class="sc" onclick="navToday('f')"><div class="sn f" id="st2">0</div><div class="sl">여</div></div>
      <div class="sc" onclick="showLeft()"><div class="sn lv" id="st3">0</div><div class="sl">퇴소</div></div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-members" onclick="showPage('members')"><span>👥</span>회원명부</button>
    <button class="tab" id="tab-today" onclick="showPage('today')"><span>📋</span>오늘 참석자</button>
    <button class="tab" id="tab-courts" onclick="showPage('courts')"><span>🎾</span>코트 현황</button>
  </div>
  <div class="content" id="content"></div>
  <div id="bottom-btns"></div>
</div>
<div id="toast"></div>
<div id="moverlay">
  <div class="mbox">
    <div class="mmsg" id="mmsg"></div>
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal()">취소</button>
      <button class="mok" id="mok">확인</button>
    </div>
  </div>
</div>

<script>
/* ════ 회원 데이터 ════ */
const MEMBERS=[
  {id:1,name:'강태욱',gender:'m'},{id:2,name:'고윤정',gender:'f'},
  {id:3,name:'권성렬',gender:'m'},{id:4,name:'권윤지',gender:'f'},
  {id:5,name:'김광숙',gender:'f'},{id:6,name:'김금수',gender:'m'},
  {id:7,name:'김남동',gender:'m'},{id:8,name:'김범수',gender:'m'},
  {id:9,name:'김성태',gender:'m'},{id:10,name:'김순옥',gender:'f'},
  {id:11,name:'김응덕',gender:'m'},{id:12,name:'김재연',gender:'f'},
  {id:13,name:'김정한',gender:'m'},{id:14,name:'김지윤',gender:'f'},
  {id:15,name:'김진일',gender:'f'},{id:16,name:'김철환',gender:'m'},
  {id:17,name:'김태경',gender:'m'},{id:18,name:'김태용',gender:'m'},
  {id:19,name:'김현범',gender:'m'},{id:20,name:'김현주',gender:'m'},
  {id:21,name:'김화영',gender:'f'},{id:22,name:'김희준',gender:'m'},
  {id:23,name:'남궁리',gender:'f'},{id:24,name:'박건식',gender:'m'},
  {id:25,name:'박규남',gender:'m'},{id:26,name:'박상환',gender:'m'},
  {id:27,name:'박성빈',gender:'m'},{id:28,name:'박세나',gender:'f'},
  {id:29,name:'박은정',gender:'f'},{id:30,name:'박진용',gender:'m'},
  {id:31,name:'박창훈',gender:'m'},{id:32,name:'백동현',gender:'m'},
  {id:33,name:'빈관기',gender:'m'},{id:34,name:'서현재',gender:'m'},
  {id:35,name:'성혜린',gender:'f'},{id:36,name:'송한헌',gender:'m'},
  {id:37,name:'신지원',gender:'f'},{id:38,name:'안영준',gender:'m'},
  {id:39,name:'안용진',gender:'m'},{id:40,name:'유재호',gender:'m'},
  {id:41,name:'윤기보',gender:'m'},{id:42,name:'이경희',gender:'f'},
  {id:43,name:'이광호',gender:'m'},{id:44,name:'이나연',gender:'f'},
  {id:45,name:'이범석',gender:'m'},{id:46,name:'이상현',gender:'m'},
  {id:47,name:'이서현',gender:'f'},{id:48,name:'이성로',gender:'m'},
  {id:49,name:'이정민',gender:'m'},{id:50,name:'이주화',gender:'m'},
  {id:51,name:'임윤미',gender:'f'},{id:52,name:'전용구',gender:'m'},
  {id:53,name:'전하리',gender:'m'},{id:54,name:'전하일',gender:'m'},
  {id:55,name:'조범진',gender:'m'},{id:56,name:'조현웅',gender:'m'},
  {id:57,name:'주영길',gender:'m'},{id:58,name:'진혜원',gender:'f'},
  {id:59,name:'천성인',gender:'m'},{id:60,name:'최경문',gender:'m'},
  {id:61,name:'최두희',gender:'m'},{id:62,name:'최명자',gender:'f'},
  {id:63,name:'최성희',gender:'f'},{id:64,name:'최주경',gender:'m'},
  {id:65,name:'한경수',gender:'m'},{id:66,name:'홍유철',gender:'m'},
  {id:67,name:'황병학',gender:'m'},{id:68,name:'황성인',gender:'m'},
  {id:69,name:'게스트1',gender:'m'},{id:70,name:'게스트2',gender:'m'},
  {id:71,name:'게스트3',gender:'m'},{id:72,name:'게스트4',gender:'m'},
];

const TBANDS=[
  {label:'17:30~18:00',s:17*60+30,e:18*60},
  {label:'18:00~19:00',s:18*60,e:19*60},
  {label:'19:00~20:00',s:19*60,e:20*60},
  {label:'20:00~21:00',s:20*60,e:21*60},
];
const CMAX=4;
const CNAMES={1:'1코트',2:'2코트',3:'3코트',4:'4코트'};
const CCOLORS=['','#1D9E75','#185FA5','#B25000','#7B3FA0'];
const CBGS=['','#E1F5EE','#E6F1FB','#FFF0E0','#F3E8FD'];
const SK='tennis_v5',HK='tennis_hist';

/* ── 상태
   attendee: { id,name,gender,seq,games,time,court,courtFreeAt,courtFreeTs }
   courtFreeTs: 초 단위 타임스탬프 (정렬용)
*/
let S={attendees:[],leftMembers:[],seqCounter:0};
let courtConfirmed={1:false,2:false,3:false,4:false};
let page='members',fGender=null,leftOnly=false;
let autoFired=false,toastT=null,modalFn=null;

/* ════ 유틸 ════ */
function pad(n){return String(n).padStart(2,'0');}
function dateStr(d=new Date()){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function timeStr(d=new Date()){return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function nowTs(){return Math.floor(Date.now()/1000);}  // 초 단위 타임스탬프
function tmins(s){if(!s)return 9999;const[h,m]=s.split(':').map(Number);return h*60+m;}
function getBand(t){const m=tmins(t);return TBANDS.find(b=>m>=b.s&&m<b.e)||null;}
function todayLbl(){const d=new Date(),ds=['일','월','화','수','목','금','토'];return`${d.getMonth()+1}/${d.getDate()}(${ds[d.getDay()]})`;}

/* ════ 스토리지 ════ */
function load(){
  try{const r=localStorage.getItem(SK);if(!r)return;const o=JSON.parse(r);
    if(o.date===dateStr()){S=o.state;courtConfirmed=o.courtConfirmed||{1:false,2:false,3:false,4:false};}
  }catch(e){}
}
function save(){
  try{localStorage.setItem(SK,JSON.stringify({date:dateStr(),state:S,courtConfirmed}));}catch(e){}
}
function archive(s,dt){
  try{const h=JSON.parse(localStorage.getItem(HK)||'[]');const f=h.filter(r=>r.date!==dt);
    f.push({date:dt,...JSON.parse(JSON.stringify(s))});localStorage.setItem(HK,JSON.stringify(f));}catch(e){}
}

/* ════ 토스트 ════ */
function toast(msg,dur=2400){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),dur);
}

/* ════ 모달 ════ */
function openModal(msg,fn){document.getElementById('mmsg').textContent=msg;modalFn=fn;document.getElementById('moverlay').classList.add('show');}
function closeModal(){document.getElementById('moverlay').classList.remove('show');modalFn=null;}
document.getElementById('mok').onclick=()=>{if(modalFn)modalFn();closeModal();};
document.getElementById('moverlay').onclick=e=>{if(e.target.id==='moverlay')closeModal();};

/* ════ 자동/수동 초기화 ════ */
function autoReset(now){
  archive(S,dateStr(now));S={attendees:[],leftMembers:[],seqCounter:0};
  courtConfirmed={1:false,2:false,3:false,4:false};
  save();page='members';fGender=null;render();toast('🌙 자정 자동 초기화 완료',5000);
}
function manualReset(){
  openModal('오늘 데이터를 초기화하시겠습니까?\n(이력은 자동 보관됩니다)',()=>{
    archive(S,dateStr());S={attendees:[],leftMembers:[],seqCounter:0};
    courtConfirmed={1:false,2:false,3:false,4:false};
    save();page='members';fGender=null;render();toast('🔄 초기화 완료');
  });
}

/* ════ 시계 ════ */
function tick(){
  const n=new Date();document.getElementById('hdr-clock').textContent=timeStr(n);
  if(n.getHours()===23&&n.getMinutes()===59){if(!autoFired){autoFired=true;autoReset(n);}}else autoFired=false;
}

/* ════ 출석 ════ */
function markAttend(id){
  const m=MEMBERS.find(x=>x.id===id);if(!m)return;
  if(S.attendees.find(x=>x.id===id)){toast(`${m.name} 이미 출석`);navToday(null);return;}
  const t=timeStr();const ts=nowTs();S.seqCounter++;
  S.attendees.push({id:m.id,name:m.name,gender:m.gender,
    seq:S.seqCounter,games:0,time:t,court:null,courtFreeAt:t,courtFreeTs:ts});
  save();toast(`${m.name} 출석 ✓  ${t}`);navToday(null);
}

/* ════ 퇴소 ════ */
function leave(id){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  openModal(`${a.name} 회원을 퇴소 처리하시겠습니까?\n(게임: ${a.games}게임)`,()=>{
    S.leftMembers.push({...a,leftAt:timeStr()});
    S.attendees=S.attendees.filter(x=>x.id!==id);
    if(a.court)courtConfirmed[a.court]=false;
    save();render();toast(`${a.name} 퇴소 처리됨`);
  });
}

/* ════ 코트 배정 ════ */
function toggleCourt(id,n){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  if(a.court===n){a.court=null;a.courtFreeAt=timeStr();a.courtFreeTs=nowTs();save();render();return;}
  const cnt=S.attendees.filter(x=>x.court===n).length;
  if(cnt>=CMAX){toast(`${CNAMES[n]}은 이미 꽉 찼습니다 ⚠️`);return;}
  if(a.court)courtConfirmed[a.court]=false;
  a.court=n;save();render();
}
function removeFromCourt(id){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  if(a.court)courtConfirmed[a.court]=false;
  a.court=null;a.courtFreeAt=timeStr();a.courtFreeTs=nowTs();
  save();render();toast(`${a.name} → 미배정`);
}
function clearCourt(n){
  const players=S.attendees.filter(x=>x.court===n);
  if(!players.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  openModal(`${CNAMES[n]} 배정 해제?\n(게임수 유지)`,()=>{
    const t=timeStr();const ts=nowTs();
    S.attendees.forEach(a=>{if(a.court===n){a.court=null;a.courtFreeAt=t;a.courtFreeTs=ts;}});
    courtConfirmed[n]=false;save();render();toast(`${CNAMES[n]} 해제 완료`);
  });
}
function confirmCourt(n){
  const players=S.attendees.filter(x=>x.court===n);
  if(!players.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  if(courtConfirmed[n]){toast(`${CNAMES[n]}은 이미 확정`);return;}
  openModal(`${CNAMES[n]} 게임 확정?\n${players.length}명 게임수 +1`,()=>{
    players.forEach(a=>{a.games+=1;});courtConfirmed[n]=true;
    save();render();toast(`✅${CNAMES[n]} 확정 — ${players.length}명 +1`);
  });
}
function reassign(){
  openModal('전체 코트 편성 초기화?\n모든 배정 해제됩니다.',()=>{
    const t=timeStr();const ts=nowTs();
    S.attendees.forEach(a=>{if(a.court!==null){a.court=null;a.courtFreeAt=t;a.courtFreeTs=ts;}});
    courtConfirmed={1:false,2:false,3:false,4:false};save();render();toast('🔄전체 재편성 완료');
  });
}
function assignTeamToCourt(courtNum,teamIds){
  const t=timeStr();const ts=nowTs();
  S.attendees.forEach(a=>{if(a.court===courtNum){a.court=null;a.courtFreeAt=t;a.courtFreeTs=ts;}});
  courtConfirmed[courtNum]=false;
  teamIds.forEach(id=>{const a=S.attendees.find(x=>x.id===id);if(a)a.court=courtNum;});
  save();render();toast(`✅${CNAMES[courtNum]}에 ${teamIds.length}명 배정`);
}

/* ════ 미배정 정렬 — 초 단위 타임스탬프 기준 ════ */
function getSortedWaiting(){
  return S.attendees.filter(x=>x.court===null)
    .sort((a,b)=>(a.courtFreeTs||0)-(b.courtFreeTs||0));
}

/* ════ 추천 1팀 — 성별 무관, 초 단위 순서 상위 4명 ════ */
function getRecommendedTeam(){
  const w=getSortedWaiting();
  return w.slice(0,4);
}

/* ════ 네비 ════ */
function showPage(p){
  page=p;if(p==='members'){fGender=null;leftOnly=false;}
  ['members','today','courts'].forEach(k=>{document.getElementById(`tab-${k}`).classList.toggle('active',p===k);});
  render();
}
function navToday(g){fGender=g;leftOnly=false;showPage('today');}
function clearFilter(){fGender=null;leftOnly=false;render();}
function showLeft(){leftOnly=true;showPage('today');}

/* ════ HTML 헬퍼 ════ */
function gt(g,sm){return`<span class="gt ${g}${sm?' sm':''}">${g==='m'?'남':'여'}</span>`;}
function chip(c,t){return`<span class="chip ${c}">${t}</span>`;}

/* ════ 통계 ════ */
function renderStats(){
  document.getElementById('st0').textContent=S.attendees.length;
  document.getElementById('st1').textContent=S.attendees.filter(x=>x.gender==='m').length;
  document.getElementById('st2').textContent=S.attendees.filter(x=>x.gender==='f').length;
  document.getElementById('st3').textContent=S.leftMembers.length;
}

/* ════ 회원명부 — 남/여 2열 분할 ════ */
function renderMembers(){
  const aIds=new Set(S.attendees.map(x=>x.id));
  const lIds=new Set(S.leftMembers.map(x=>x.id));
  const males=MEMBERS.filter(x=>x.gender==='m');
  const females=MEMBERS.filter(x=>x.gender==='f');
  const mAtt=males.filter(x=>aIds.has(x.id)&&!lIds.has(x.id)).length;
  const fAtt=females.filter(x=>aIds.has(x.id)&&!lIds.has(x.id)).length;

  function memberCard(m){
    const a=aIds.has(m.id),l=lIds.has(m.id);
    const chips=(a&&!l?chip('g','✓'):'')+(l?chip('r','퇴'):'');
    const btn=l?`<span style="font-size:8px;color:#888780">퇴소</span>`
      :a?`<button class="btn-att done" disabled style="font-size:9px;padding:3px 5px">완료</button>`
      :`<button class="btn-att" onclick="markAttend(${m.id})" style="font-size:10px;padding:4px 7px">출석</button>`;
    return`<div class="scard">
      <span class="sname">${m.name}</span>
      <div class="schips">${chips}${btn}</div>
    </div>`;
  }

  return`<div class="split-wrap">
    <div class="split-col lcol">
      <div class="split-hdr m">👨 남자 (${mAtt}/${males.length})</div>
      ${males.map(memberCard).join('')}
    </div>
    <div class="split-col">
      <div class="split-hdr f">👩 여자 (${fAtt}/${females.length})</div>
      ${females.map(memberCard).join('')}
    </div>
  </div>`;
}

/* ════ 참석자 행 ════ */
function attendRow(a){
  const counts={};[1,2,3,4].forEach(n=>{counts[n]=S.attendees.filter(x=>x.court===n).length;});
  const cBtns=[1,2,3,4].map(n=>{
    const on=a.court===n?' on':'';
    const isFull=counts[n]>=CMAX&&a.court!==n;
    return`<button class="cbtn c${n}${on}${isFull?' full-disabled':''}" onclick="toggleCourt(${a.id},${n})">${n}코트</button>`;
  }).join('');
  // 최신화 시간: 코트 배정 해제 시각 또는 출석 시각
  const freeTime=a.courtFreeAt||a.time;
  const freeLabel=a.court===null?(a.courtFreeAt&&a.courtFreeAt!==a.time?`미배정 ${freeTime}`:`출석 ${a.time}`):`출석 ${a.time}`;
  return`<div class="card" style="padding:7px 8px;gap:0;align-items:stretch;flex-direction:column">
    <div style="display:flex;align-items:center;gap:5px">
      <div class="seq-b">${a.seq}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:3px">
          <span class="aname">${a.name}</span>${gt(a.gender,true)}
        </div>
        <div class="atime">🕐 출석 ${a.time}</div>
      </div>
      <div style="display:flex;gap:3px;flex-shrink:0">${cBtns}</div>
      <span class="gcnt-only" style="flex-shrink:0">${a.games}게임</span>
      <button class="btn-lv" onclick="leave(${a.id})" style="flex-shrink:0">퇴소</button>
    </div>
  </div>`;
}

/* ════ 오늘 참석자 ════ */
function renderToday(){
  // 퇴소자만 보기 모드
  if(leftOnly){
    const ls=S.leftMembers;
    let h=`<div style="display:flex;align-items:center;padding:8px 11px 6px">
      <div class="stitle" style="border:none;padding-bottom:0;margin:0;flex:1">🚪 퇴소자 (${ls.length}명)</div>
      <button onclick="clearFilter()" style="font-size:10px;color:#1D9E75;background:none;border:none;cursor:pointer;font-family:inherit">전체 보기 ×</button>
    </div>`;
    if(!ls.length) return h+`<div class="empty"><div class="empty-icon">🚪</div>퇴소한 회원이 없습니다.</div>`;
    h+=`<div style="padding:0 11px 10px">`;
    ls.forEach(a=>{
      h+=`<div class="card">
        <div class="seq-b" style="background:#FAECE7;color:#993C1D">${a.seq}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:3px">
            <span class="aname">${a.name}</span>${gt(a.gender,true)}
          </div>
          <div class="atime">🕐 출석 ${a.time} · 퇴소 ${a.leftAt}</div>
        </div>
        <span class="gcnt-only">${a.games}게임</span>
      </div>`;
    });
    h+=`</div>`;
    return h;
  }

  const list=fGender?S.attendees.filter(x=>x.gender===fGender):S.attendees;
  const lbl=fGender==='m'?'남성 참석자':fGender==='f'?'여성 참석자':'전체 참석자';
  let h=`<div style="display:flex;align-items:center;padding:8px 11px 4px">
    <div class="stitle" style="border:none;padding-bottom:0;margin:0;flex:1">📋 ${lbl} (${list.length}명)</div>
    ${fGender?`<button onclick="clearFilter()" style="font-size:10px;color:#1D9E75;background:none;border:none;cursor:pointer;font-family:inherit">전체 보기 ×</button>`:''}
  </div>`;
  if(!list.length){
    return h+`<div class="empty"><div class="empty-icon">🎾</div>아직 출석한 회원이 없습니다.<div style="font-size:11px;margin-top:4px">회원명부에서 출석 버튼을 눌러주세요</div></div>`;
  }
  h+=`<div style="padding:0 11px 6px">`;
  const grp={};TBANDS.forEach(b=>{grp[b.label]=[];});grp['기타']=[];
  list.forEach(a=>{const b=getBand(a.time);grp[b?b.label:'기타'].push(a);});
  TBANDS.forEach(b=>{
    if(!grp[b.label].length)return;
    h+=`<div class="tg"><div class="tg-hdr">⏰ ${b.label} · ${grp[b.label].length}명</div>${grp[b.label].map(attendRow).join('')}</div>`;
  });
  if(grp['기타'].length){
    h+=`<div class="tg"><div class="tg-hdr" style="background:#F0EDE8;color:#888780">⏰ 기타 · ${grp['기타'].length}명</div>${grp['기타'].map(attendRow).join('')}</div>`;
  }
  h+=`</div>`;
  return h;
}

/* ════ 코트 현황 ════ */
function renderCourts(){
  let h='<div class="court-grid">';
  [1,2,3,4].forEach(n=>{
    const players=S.attendees.filter(x=>x.court===n);
    const cnt=players.length,full=cnt>=CMAX,confirmed=courtConfirmed[n];
    let slots='';
    players.forEach(a=>{
      slots+=`<div class="ct-slot" onclick="removeFromCourt(${a.id})">
        <span style="flex:1;font-size:10px;font-weight:600">${a.name}</span>
        ${gt(a.gender,true)}<span class="ct-slot-hint">해제</span>
      </div>`;
    });
    for(let i=cnt;i<CMAX;i++) slots+=`<div class="ct-empty">— 빈자리 —</div>`;
    const statusHtml=confirmed
      ?`<div class="ct-status confirmed">✅ 게임 확정</div>`
      :full?`<div class="ct-status full">🔴꽉참(${cnt}/${CMAX})</div>`
      :cnt>0?`<div class="ct-status wait">${cnt}/${CMAX}명</div>`
      :`<div class="ct-status wait">배정없음</div>`;
    const fullBadge=full&&!confirmed?`<div class="ct-full-badge">✕</div>`:'';
    const confirmBtn=!confirmed&&cnt>0?`<button class="ct-confirm-btn" onclick="confirmCourt(${n})">확정</button>`:'';
    const clearBtn=`<button class="ct-hbtn" onclick="clearCourt(${n})">해제</button>`;
    h+=`<div class="ct-card">
      <div class="ct-hdr c${n}"><span class="ct-name">${CNAMES[n]}</span><span class="ct-cnt">${cnt}/${CMAX}</span>${fullBadge}${confirmBtn}${clearBtn}</div>
      <div class="ct-body">${slots}${statusHtml}</div>
    </div>`;
  });
  h+='</div>';

  /* ── 미배정 — 남/여 2열 분할 ── */
  const waiting=getSortedWaiting();
  if(waiting.length){
    const mW=waiting.filter(x=>x.gender==='m');
    const fW=waiting.filter(x=>x.gender==='f');

    function waitCard(a,idx){
      const cBtns=[1,2,3,4].map(n=>{
        const isFull=S.attendees.filter(x=>x.court===n).length>=CMAX;
        return`<button class="cbtn c${n}${isFull?' full-disabled':''}" onclick="${isFull?'':` toggleCourt(${a.id},${n})`}">${n}코트</button>`;
      }).join('');
      return`<div class="card" style="padding:5px 6px;gap:3px;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:3px;width:100%">
          <div class="wseq-b">${idx+1}</div>
          <span style="font-size:12px;font-weight:700;color:#1A1A1A;flex:1">${a.name}</span>
          <span style="font-size:8px;color:#888780">${(a.courtFreeAt||a.time)}</span>
        </div>
        <div class="court-btns-top" style="margin-top:1px">${cBtns}</div>
      </div>`;
    }

    h+=`<div style="padding:0 11px 6px">
      <div class="stitle">⏳ 미배정 대기 (${waiting.length}명)
        <span style="font-size:8px;color:#B25000;margin-left:3px">·초단위 순서</span>
      </div>
      <div class="split-wrap" style="gap:0">
        <div class="split-col lcol" style="padding:0 4px 8px 0">
          <div class="split-hdr m" style="font-size:10px">👨 남 (${mW.length})</div>
          ${mW.map((a,i)=>waitCard(a,waiting.indexOf(a)+1)).join('')}
        </div>
        <div class="split-col" style="padding:0 0 8px 4px">
          <div class="split-hdr f" style="font-size:10px">👩 여 (${fW.length})</div>
          ${fW.map((a,i)=>waitCard(a,waiting.indexOf(a)+1)).join('')}
        </div>
      </div>
    </div>`;

    /* ── 추천 1팀 — 성별 무관 초단위 순서 상위 4명 ── */
    const team=getRecommendedTeam();
    if(team.length>0){
      const teamIds=team.map(a=>a.id);
      const tJson=JSON.stringify(teamIds);
      const mCnt=team.filter(x=>x.gender==='m').length;
      const fCnt=team.filter(x=>x.gender==='f').length;
      const gS=mCnt===4?'남4':fCnt===4?'여4':`남${mCnt}여${fCnt}`;
      const mCards=team.map(a=>`
        <div style="display:flex;align-items:center;gap:3px;background:#fff;border:.5px solid #E0DFDB;border-radius:7px;padding:4px 6px;">
          <span style="font-size:12px;font-weight:700;color:#1A1A1A;flex:1">${a.name}</span>
          ${gt(a.gender,true)}
          <span style="font-size:8px;color:#888780">${a.courtFreeAt||a.time}</span>
        </div>`).join('');
      const aBtns=[1,2,3,4].map(n=>{
        const ex=S.attendees.filter(x=>x.court===n).length;
        return`<button onclick="assignTeamToCourt(${n},${tJson})"
          style="flex:1;padding:8px 2px;border-radius:8px;border:2px solid ${CCOLORS[n]};background:${CCOLORS[n]};color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;-webkit-appearance:none;">
          <span>${CNAMES[n]}</span><span style="font-size:7px;opacity:.85">${ex>0?`(${ex}명교체)`:'(빈코트)'}</span>
        </button>`;
      }).join('');
      h+=`<div style="padding:0 11px 10px">
        <div class="stitle">📌 다음 게임 추천 1팀
          <span style="font-size:8px;color:#B25000;margin-left:3px">·${gS} / 대기시간순</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px">${mCards}</div>
        <div style="font-size:9px;color:#888780;margin-bottom:5px;text-align:center">코트를 눌러 바로 배정 (기존 인원은 미배정으로)</div>
        <div style="display:flex;gap:5px">${aBtns}</div>
      </div>`;
    }
  }
  return h;
}

/* ════ 하단 버튼 ════ */
function renderBottom(){
  const el=document.getElementById('bottom-btns');
  let h='<div class="bottom-btns">';
  if(page==='courts'){
    h+=`<button class="btn-reassign" onclick="reassign()">🔄 전체 재편성 (모든 코트 배정 초기화)</button>
        <div class="bhint" style="margin-bottom:5px">모든 코트 배정 해제</div>`;
  }
  h+=`<button class="btn-reset" onclick="manualReset()">♻️ 수동 초기화 (데이터 보관 후 초기화)</button>
      <div class="bhint">매일 23:59 자동 초기화 · 이력 자동 보관</div></div>`;
  el.innerHTML=h;
}

/* ════ 메인 렌더 ════ */
function render(){
  renderStats();
  const el=document.getElementById('content');
  if(page==='members')     el.innerHTML=renderMembers();
  else if(page==='today')  el.innerHTML=renderToday();
  else if(page==='courts') el.innerHTML=renderCourts();
  renderBottom();
}

/* ════ 시작 ════ */
load();
document.getElementById('hdr-date').textContent=todayLbl();
setInterval(tick,1000);tick();render();
</script>
</body>
</html>
