const db = firebase.database();
const REF = db.ref('tennis/' + new Date().toISOString().slice(0,10)); // 날짜별 분리

let syncPushTimer = null;
let localSeq = 0;     // 내가 push한 seq
let lastSeenSeq = -1; // 마지막으로 처리한 seq

function setSyncDot(st){
  const d=document.getElementById('sync-dot');
  if(d){d.className='sync-dot'+(st?' '+st:'');}
}

/* Firebase 객체/배열 정규화
   Firebase는 JS 배열을 {"0":{...},"1":{...}} 객체로 저장함
   → 받아올 때 반드시 Array로 복원해야 filter/find/map 동작함 */
function toArr(v){
  if(!v) return [];
  if(Array.isArray(v)) return v;
  return Object.values(v);
}
function normalizeS(raw){
  if(!raw) return;
  const s = raw.state;
  if(s){
    s.attendees  = toArr(s.attendees).map(a=>({
      ...a,
      court:      a.court      ?? null,
      nextCourt1: a.nextCourt1 ?? null,
      nextCourt2: a.nextCourt2 ?? null,
      hasCourt:   a.hasCourt   ?? false,
    }));
    s.leftMembers = toArr(s.leftMembers);
    S = s;
  }
  if(raw.CC){
    const c = raw.CC;
    CC = {
      1:!!(c['1']||c[1]), 2:!!(c['2']||c[2]),
      3:!!(c['3']||c[3]), 4:!!(c['4']||c[4]),
      5:!!(c['5']||c[5]), 6:!!(c['6']||c[6]),
    };
  }
}

/* 서버로 push (debounce 1초) */
function syncPush(){
  if(syncPushTimer) clearTimeout(syncPushTimer);
  setSyncDot('busy');
  syncPushTimer = setTimeout(()=>{
    localSeq++;
    lastSeenSeq = localSeq; // 내가 보낸 seq 미리 기록
    REF.set({state:S, CC, seq:localSeq, updatedAt:Date.now()})
      .then(()=>setSyncDot('ok'))
      .catch(()=>setSyncDot('err'));
  }, 1000);
}

/* 서버에서 실시간 listen */
function syncListen(){
  REF.on('value', snap=>{
    const raw = snap.val();
    if(!raw){ setSyncDot('err'); return; }
    setSyncDot('ok');
    // 내가 push한 데이터가 돌아온 것 → 무시
    const incomingSeq = raw.seq ?? 0;
    if(incomingSeq === lastSeenSeq) return;
    lastSeenSeq = incomingSeq;
    // 데이터 정규화 후 반영
    normalizeS(raw);
    renderAll();
  });
}

function pad(n){return String(n).padStart(2,'0');}
function dateStr(d=new Date()){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function timeStr(d=new Date()){return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function nowTs(){return Math.floor(Date.now()/1000);}
function tmins(s){if(!s)return 9999;const[h,m]=s.split(':').map(Number);return h*60+m;}
function getBand(t){const m=tmins(t);return TBANDS.find(b=>m>=b.s&&m<b.e)||null;}
function todayLbl(){const d=new Date(),ds=['일','월','화','수','목','금','토'];return`${d.getMonth()+1}/${d.getDate()}(${ds[d.getDay()]})`;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

(function(){

  wrap.addEventListener('touchstart',e=>{start(e.touches[0].clientX);},{passive:true});

function toggleCourt(id,n){

  if(S.attendees.filter(x=>x.court===n).length>=CMAX){toast(`${CNAMES[n]}은 이미 꽉 찼습니다 ⚠️`);return;}
  if(!NEXT_COURTS.includes(n)){
    if(a.court&&!NEXT_COURTS.includes(a.court))CC[a.court]=false;
    a.court=n;a.hasCourt=true;
  } else {
    const nc=n===5?'nextCourt1':'nextCourt2';
    a[nc]=a[nc]===n?null:n;save();renderAll();return;
  }
  save();renderAll();
}
function toggleNextCourt(id,which){
  const a=S.attendees.find(x=>x.id===id);if(!a)return;
  const nc=which===1?'nextCourt1':'nextCourt2';
  const n=which===1?5:6;
  if(a[nc]){
    a[nc]=null;

    CC[n]=false;
    save();renderAll();return;

  if(S.attendees.filter(x=>x[nc]).length>=CMAX){toast(`${CNAMES[n]}은 이미 꽉 찼습니다 ⚠️`);return;}
  a[nc]=n;

  CC[n]=false;

}

}
function clearNextCourt(n){
  const nc=n===5?'nextCourt1':'nextCourt2';
  const pl=S.attendees.filter(x=>x[nc]);

  CC[n]=false;save();renderAll();toast(`${CNAMES[n]} 해제 완료`);
}
function confirmNextCourt(n){
  const nc=n===5?'nextCourt1':'nextCourt2';
  const pl=S.attendees.filter(x=>x[nc]);
  if(!pl.length){toast(`${CNAMES[n]}에 배정 인원 없음`);return;}
  if(CC[n]){toast(`${CNAMES[n]}은 이미 확정`);return;}
  if(pl.length<CMAX){openModal(`⚠️ ${CNAMES[n]}에 ${pl.length}명만 배정되어 있습니다.\n4명이 되어야 확정할 수 있습니다.\n(1명이 모자랍니다)`,null);return;}
  const availCourts=[];
  for(let cn=1;cn<=4;cn++){const cur=S.attendees.filter(x=>x.court===cn).length;if(cur<CMAX)availCourts.push({cn,cur,free:CMAX-cur});}
  if(!availCourts.length){toast('⚠️ 1~4코트가 모두 꽉 찼습니다. 코트를 해제한 후 확정해주세요.',3500);return;}
  const t=timeStr();const baseTs=nowTs();
  CC[n]=true;
  availCourts.sort((a,b)=>b.free-a.free);
  let pi=0;
  for(const{cn,free}of availCourts){
    let filled=0;
    while(pi<pl.length&&filled<free){
      const a=pl[pi];
      if(!a.court){a.court=cn;a.hasCourt=true;}else filled--;
      a[nc]=null;pi++;filled++;
    }
    if(pi>=pl.length)break;
  }
  while(pi<pl.length){const a=pl[pi];a[nc]=null;if(!a.court){a.courtFreeAt=t;a.courtFreeTs=baseTs+pi;}pi++;}
  save();renderAll();toast(`✅ ${CNAMES[n]} 확정 — ${pl.length}명 코트 배정`);
}

function assignNextTeam(which,teamIds){
  const t=timeStr();const baseTs=nowTs();
  const nc1cnt=S.attendees.filter(a=>a.nextCourt1).length;
  let targetWhich=which;
  if(which===1&&nc1cnt>=CMAX){
    if(S.attendees.filter(a=>a.nextCourt2).length>=CMAX){toast('⚠️ 다음차례1,2 모두 꽉 찼습니다.',3000);return;}
    targetWhich=2;toast('다음차례가 꽉 차 있어 다음차례2에 배정합니다.',2500);
  }

/* ── 대기/추천 ── */
function getSortedWaiting(){
  function getTs(a){if(a.courtFreeTs)return a.courtFreeTs;const t=a.courtFreeAt||a.time||'00:00';const[h,m]=t.split(':').map(Number);return h*3600+m*60;}
  S.attendees.forEach(a=>{if(a.hasCourt===undefined)a.hasCourt=!!(a.courtFreeAt&&a.courtFreeAt!==a.time);});
  return S.attendees.filter(x=>x.court===null).sort((a,b)=>getTs(a)-getTs(b));
}
function buildRecommendedTeams(){
  const waiting=getSortedWaiting();
  function buildPool(gender){
    const w=waiting.filter(x=>x.gender===gender);
    const c=S.attendees.filter(x=>x.gender===gender&&x.court&&!NEXT_COURTS.includes(x.court)).sort((a,b)=>(a.attendTs||0)-(b.attendTs||0));
    return{all:[...w,...c]};
  }
  function pick(n,pool){
    const all=pool.all;const M=all.length;
    if(!M)return[];if(M<=n)return shuffle(all).slice(0,n);
    const fc=Math.min(Math.max(0,M-2),n);
    return[...all.slice(0,fc),...shuffle(all.slice(fc)).slice(0,n-fc)];
  }
  const mp=buildPool('m'),fp=buildPool('f');
  const teams=[];
  if(mp.all.length>=1){const t=pick(4,mp);if(t.length)teams.push({label:'추천1팀 — 남자',color:'#185FA5',badge:'👨',team:t});}
  if(fp.all.length>=1){const t=pick(4,fp);if(t.length)teams.push({label:'추천2팀 — 여자',color:'#993556',badge:'👩',team:t});}
  if(mp.all.length>=1&&fp.all.length>=1){
    const tm=pick(2,mp),tf=pick(2,fp);const t=[...tm,...tf];
    if(t.length>=2)teams.push({label:'추천3팀 — 혼성(남2여2)',color:'#7B3FA0',badge:'👫',team:t});
  }
  return teams;
}

/* ── 코트 현황 ── */
function renderCourts(){

    const status=conf?`<div class="ct-status confirmed">✅ 게임 확정</div>`:full?`<div class="ct-status full">🔴 꽉참(${cnt}/${CMAX})</div>`:cnt>0?`<div class="ct-status wait">${cnt}/${CMAX}명</div>`:`<div class="ct-status wait">배정없음</div>`;

    h+=`<div class="ct-card"><div class="ct-hdr c${n}"><span class="ct-name">${CNAMES[n]}</span><span class="ct-cnt">${cnt}/${CMAX}</span>${fullBadge}${confirmBtn}<button class="ct-hbtn" onclick="clearCourt(${n})">해제</button></div><div class="ct-body">${slots}${status}</div></div>`;
  });
  h+=`</div>`;
  // 다음차례 코트
  h+=`<div style="padding:0 11px 2px"><div class="stitle" style="margin-top:6px">⏭ 다음차례 코트</div></div><div class="court-grid" style="padding-top:0">`;
  [5,6].forEach(n=>{
    const ncKey=n===5?'nextCourt1':'nextCourt2';
    const players=S.attendees.filter(x=>x[ncKey]);const cnt=players.length,full=cnt>=CMAX;
    // 인원이 없는데 확정 상태면 자동 초기화
    if(cnt===0&&CC[n]){CC[n]=false;save();}
    const conf=CC[n];
    let slots='';players.forEach(a=>{
      const inC=a.court&&!NEXT_COURTS.includes(a.court);
      const cb=inC?`<span style="font-size:7px;background:${CBGS[a.court]};color:${CCOLORS[a.court]};padding:1px 3px;border-radius:3px;margin-left:2px">${CNAMES[a.court]}</span>`:'';
      slots+=`<div class="ct-slot" onclick="toggleNextCourt(${a.id},${n===5?1:2})"><span style="font-size:13px;font-weight:700">${a.name}</span>${gt(a.gender,true)}<span style="font-size:7px;color:#B8B5AF">${cb}</span><span style="flex:1"></span><span class="ct-slot-hint">해제</span></div>`;
    });
    for(let i=cnt;i<CMAX;i++)slots+=`<div class="ct-empty">— 빈자리 —</div>`;
    const status=conf?`<div class="ct-status confirmed">✅ 게임 확정</div>`:full?`<div class="ct-status full">🔴 꽉참(${cnt}/${CMAX})</div>`:cnt>0?`<div class="ct-status wait">${cnt}/${CMAX}명</div>`:`<div class="ct-status wait">배정없음</div>`;
    const fullBadge=full&&!conf?`<div class="ct-full-badge">✕</div>`:'';
    const confirmBtn=!conf&&cnt>0?`<button class="ct-confirm-btn" onclick="confirmNextCourt(${n})">확정</button>`:'';
    h+=`<div class="ct-card"><div class="ct-hdr c${n}"><span class="ct-name">${CNAMES[n]}</span><span class="ct-cnt">${cnt}/${CMAX}</span>${fullBadge}${confirmBtn}<button class="ct-hbtn" onclick="clearNextCourt(${n})">해제</button></div><div class="ct-body">${slots}${status}</div></div>`;
  });
  h+=`</div>`;
  // 참석자 배정 현황
  const waiting=getSortedWaiting();
  // 확정되지 않은 코트에 배정된 인원 (CC[court]===false)
  const inCourtUnconfirmed=S.attendees
    .filter(x=>x.court&&!NEXT_COURTS.includes(x.court)&&!CC[x.court])
    .sort((a,b)=>(a.attendTs||0)-(b.attendTs||0));
  // 확정된 코트에 배정된 인원 (제외)
  const inCourtConfirmed=S.attendees
    .filter(x=>x.court&&!NEXT_COURTS.includes(x.court)&&CC[x.court]);
  const allSorted=[...waiting,...inCourtUnconfirmed];
  if(allSorted.length){
    function courtAllCard(a){
      const isWaiting=!a.court||NEXT_COURTS.includes(a.court)||(!NEXT_COURTS.includes(a.court)&&a.court&&!CC[a.court]);
      const cBtns=[1,2,3,4].map(n=>{
        const isFull=S.attendees.filter(x=>x.court===n).length>=CMAX&&a.court!==n;
        const isOn=a.court===n?' on':'';
        return`<button class="cbtn c${n}${isOn}${isFull?' full-disabled':''}" onclick="${isFull?'':` toggleCourt(${a.id},${n})`}" style="font-size:10px;font-weight:700;padding:3px 4px;min-width:20px;border-radius:5px">${n}</button>`;
      }).join('');
      const nc1on=a.nextCourt1?' on':'';const nc2on=a.nextCourt2?' on':'';
      const nc1full=S.attendees.filter(x=>x.nextCourt1).length>=CMAX&&!a.nextCourt1;
      const nc2full=S.attendees.filter(x=>x.nextCourt2).length>=CMAX&&!a.nextCourt2;
      const ncBtns=`<button class="cbtn c5${nc1on}${nc1full?' full-disabled':''}" onclick="${nc1full?'':` toggleNextCourt(${a.id},1)`}" style="font-size:10px;font-weight:700;padding:3px 4px;min-width:20px;border-radius:5px">다1</button><button class="cbtn c6${nc2on}${nc2full?' full-disabled':''}" onclick="${nc2full?'':` toggleNextCourt(${a.id},2)`}" style="font-size:10px;font-weight:700;padding:3px 4px;min-width:20px;border-radius:5px">다2</button>`;
      // 성별별 미배정/배정중 경계 구분선
      const mWaiting2=waiting.filter(x=>x.gender==='m');
      const fWaiting2=waiting.filter(x=>x.gender==='f');
      const mSortedAll=allSorted.filter(x=>x.gender==='m');
      const fSortedAll=allSorted.filter(x=>x.gender==='f');
      const gWaiting=a.gender==='m'?mWaiting2:fWaiting2;
      const gSorted=a.gender==='m'?mSortedAll:fSortedAll;
      // 미확정 코트 배정 인원 중 첫 번째에 구분선
      const gInCourt=gSorted.filter(x=>x.court&&!NEXT_COURTS.includes(x.court)&&!CC[x.court]);
      const divider=a.court&&!NEXT_COURTS.includes(a.court)&&!CC[a.court]&&gInCourt.indexOf(a)===0?`<div style="font-size:13px;color:#888780;padding:4px 0 2px;font-weight:700">─── 코트 배정 중 (미확정) ───</div>`:'';
      return`${divider}<div style="background:${isWaiting?'#fff':'#FFF8E1'};border:.5px solid #E0DFDB;border-radius:9px;margin-bottom:4px;padding:4px 5px;display:flex;align-items:center;gap:2px"><span style="font-size:11px;font-weight:700;color:${isWaiting?'#1A1A1A':'#666'};flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.name}</span><div style="display:flex;gap:1px;flex-shrink:0">${cBtns}${ncBtns}</div></div>`;
    }
    const mSorted=allSorted.filter(x=>x.gender==='m');const fSorted=allSorted.filter(x=>x.gender==='f');
    h+=`<div class="pg-inner" style="padding-top:0"><div class="stitle" style="font-size:13px;">👥 게임편성 대기현황 (${S.attendees.length}명)<span style="font-size:10px;color:#B25000;margin-left:4px">미배정(${waiting.length})·미확정코트(${inCourtUnconfirmed.length})·확정제외(${inCourtConfirmed.length})</span></div><div class="split-wrap"><div class="split-col lcol" style="padding:0 4px 10px 0"><div class="split-hdr m" style="font-size:10px">👨 남 (${mSorted.length})</div>${mSorted.map(courtAllCard).join('')}</div><div class="split-col" style="padding:0 0 10px 4px"><div class="split-hdr f" style="font-size:10px">👩 여 (${fSorted.length})</div>${fSorted.map(courtAllCard).join('')}</div></div></div>`;
  }
  // 추천팀
  const recTeams=buildRecommendedTeams();
  if(recTeams.length){
    function recCourtBtns(tIds){
      return[1,2,3,4].map(n=>{const ex=S.attendees.filter(x=>x.court===n).length;return`<button class="assign-btn" onclick="assignTeam(${n},${tIds})" style="background:${CCOLORS[n]}"><span class="ab-label">${CNAMES[n]}</span><span class="ab-sub">${ex===0?'빈코트':`${ex}/${CMAX}`}</span></button>`;}).join('');
    }
    h+=`<div class="pg-inner" style="padding-top:0"><div class="stitle">📌 다음 게임 추천</div>`;
    recTeams.forEach(({label,color,badge,team})=>{
      if(!team.length)return;
      const tIds=JSON.stringify(team.map(a=>a.id));
      const members=team.map(a=>{const inC=a.court&&!NEXT_COURTS.includes(a.court);const cb=inC?`<span style="font-size:7px;background:${CBGS[a.court]};color:${CCOLORS[a.court]};padding:1px 3px;border-radius:3px">${CNAMES[a.court]}</span>`:'';return`<div class="rec-member"><span class="rec-name" style="flex:0;white-space:nowrap">${a.name}</span>${gt(a.gender,true)}${cb}<span style="flex:1"></span><span class="rec-time">${a.courtFreeAt||a.time}</span></div>`;}).join('');
      const nextBtn=`<button onclick="assignNextTeam(1,${tIds})" style="flex:1;padding:4px 2px;border-radius:8px;border:2px solid ${CCOLORS[5]};background:${CCOLORS[5]};color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:0;-webkit-appearance:none;"><span style="font-size:12px;font-weight:700">다음차례</span><span style="font-size:12px;font-weight:700;opacity:.95">(자동배정)</span></button>`;
      h+=`<div class="rec-card"><div class="rec-title"><span style="font-size:14px">${badge}</span><span style="color:${color}">${label}</span></div><div class="rec-members">${members}</div><div class="assign-row">${recCourtBtns(tIds)}${nextBtn}</div></div>`;
    });
    h+=`</div>`;
  }
  return h;
}

/* confirmCourt 시 같은 코트 인원을 courtHistory에 기록 */
function recordCourtGame(n){
  const pl=S.attendees.filter(x=>x.court===n);
  if(!pl.length)return;
  const entry={
    date:dateStr(),time:timeStr(),court:n,courtName:CNAMES[n],
    members:pl.map(a=>({id:a.id,name:a.name,gender:a.gender}))
  };
  try{
    const h=JSON.parse(localStorage.getItem('tennis_court_hist')||'[]');
    h.push(entry);
    localStorage.setItem('tennis_court_hist',JSON.stringify(h));
  }catch(e){}
}

/* 오늘 데이터를 통계 히스토리에 저장 */
function saveStatHistory(){
  try{
    const today=dateStr();
    const allToday=[...S.attendees,...S.leftMembers];
    if(!allToday.length) return;

    // Firebase에서 기존 오늘 데이터 읽어서 병합 후 저장
    const statRef=firebase.database().ref('tennis_stats/'+today);
    statRef.once('value').then(snap=>{
      const existing=snap.val();
      function mergeMembers(existList, newList){
        const map={};
        (existList||[]).forEach(a=>{ map[a.id]=a; });
        newList.forEach(a=>{ map[a.id]=a; });
        return Object.values(map);
      }
      const mergedAtt=mergeMembers(
        existing?.attendees||[],
        S.attendees.map(a=>({id:a.id,name:a.name,gender:a.gender,games:a.games,time:a.time}))
      );
      const mergedLeft=mergeMembers(
        existing?.leftMembers||[],
        S.leftMembers.map(a=>({id:a.id,name:a.name,gender:a.gender,games:a.games,time:a.time,leftAt:a.leftAt}))
      );
      const allMerged=[...mergedAtt,...mergedLeft];
      const entry={
        date:today,
        attendees:mergedAtt,
        leftMembers:mergedLeft,
        totalAttend:allMerged.length,
        totalGames:allMerged.reduce((s,a)=>s+(a.games||0),0),
      };
      // Firebase에만 저장 (기기 공통)
      statRef.set(entry);
      // localStorage도 동기화
      try{
        const st=JSON.parse(localStorage.getItem(STKEY)||'[]');
        const idx=st.findIndex(x=>x.date===today);
        if(idx>=0) st[idx]=entry; else st.push(entry);
        localStorage.setItem(STKEY,JSON.stringify(st));
      }catch(e){}
    }).catch(e=>console.error('saveStatHistory error:',e));
  }catch(e){console.error('saveStatHistory error:',e);}
}

/* 통계 페이지 렌더링 */
let statPeriod='day';
let statView='attend';
let statCustomFrom='';
let statCustomTo='';
let statDetailDate='';

function renderStatPage(){
  let st=JSON.parse(localStorage.getItem(STKEY)||'[]');
  const ch=JSON.parse(localStorage.getItem('tennis_court_hist')||'[]');
  // Firebase 우선: 전체 통계 가져와서 localStorage 덮어쓰기 후 재렌더
  try{
    firebase.database().ref('tennis_stats').once('value',snap=>{
      const fbData=snap.val(); if(!fbData)return;
      const fbList=Object.values(fbData).filter(x=>x&&x.date);
      let changed=false;
      fbList.forEach(entry=>{
        const idx=st.findIndex(x=>x.date===entry.date);
        if(idx>=0){
          if(JSON.stringify(st[idx])!==JSON.stringify(entry)){st[idx]=entry;changed=true;}
        } else {st.push(entry);changed=true;}
      });
      if(changed){
        localStorage.setItem(STKEY,JSON.stringify(st));
        document.getElementById('pg3').innerHTML=renderStatPage();
      }
    });
  }catch(e){}

  const now=new Date();
  const todayStr=dateStr();
  const allDates=[...new Set(st.map(x=>x.date))].sort((a,b)=>b.localeCompare(a));

  let fromDate='',toDate='';
  if(statCustomFrom&&statCustomTo){fromDate=statCustomFrom;toDate=statCustomTo;}
  else{
    if(statPeriod==='day'){fromDate=toDate=todayStr;}
    else if(statPeriod==='week'){const d=new Date(now);d.setDate(d.getDate()-6);fromDate=dateStr(d);toDate=todayStr;}
    else if(statPeriod==='month'){fromDate=todayStr.slice(0,7)+'-01';toDate=todayStr;}
    else{fromDate='2000-01-01';toDate='2099-12-31';}
  }
  function inRange(ds){return ds>=fromDate&&ds<=toDate;}
  function isWeekend(ds){const d=new Date(ds+'T00:00:00');return d.getDay()===0||d.getDay()===6;}
  const filtered=st.filter(x=>inRange(x.date));
  const REGULAR=MEMBERS.filter(m=>!m.name.includes('게스트')).length;
  const ALL=st;

  const pBtns=['day','week','month','all'].map(p=>{
    const lbl={day:'오늘',week:'1주',month:'이번달',all:'전체'}[p];
    const on=statPeriod===p&&!statCustomFrom;
    return`<button onclick="statPeriod='${p}';statCustomFrom='';statCustomTo='';document.getElementById('pg3').innerHTML=renderStatPage();" style="padding:5px 10px;border-radius:7px;border:1.5px solid ${on?'#1D9E75':'#D8D5CF'};background:${on?'#1D9E75':'#fff'};color:${on?'#fff':'#666'};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">${lbl}</button>`;
  }).join('');

  const vBtns=[{k:'attend',l:'📅 참석률'},{k:'games',l:'🎾 게임수'},{k:'together',l:'👫 같이한 인원'}].map(v=>{
    const on=statView===v.k;
    return`<button onclick="statView='${v.k}';document.getElementById('pg3').innerHTML=renderStatPage();" style="padding:5px 10px;border-radius:7px;border:1.5px solid ${on?'#185FA5':'#D8D5CF'};background:${on?'#185FA5':'#fff'};color:${on?'#fff':'#666'};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">${v.l}</button>`;
  }).join('');

  const rangeBox=`<div style="background:#fff;border:.5px solid #E0DFDB;border-radius:10px;padding:10px;margin-bottom:10px">

    <div style="display:flex;align-items:center;gap:6px">
      <input type="date" id="stat-from" value="${fromDate}" style="flex:1;padding:6px 8px;border:.5px solid #D8D5CF;border-radius:7px;font-size:12px;font-family:inherit" onchange="statCustomFrom=this.value;statCustomTo=document.getElementById('stat-to').value||this.value;statPeriod='';document.getElementById('pg3').innerHTML=renderStatPage();">
      <span style="font-size:12px;color:#888780">~</span>
      <input type="date" id="stat-to" value="${toDate}" style="flex:1;padding:6px 8px;border:.5px solid #D8D5CF;border-radius:7px;font-size:12px;font-family:inherit" onchange="statCustomTo=this.value;statCustomFrom=document.getElementById('stat-from').value||this.value;statPeriod='';document.getElementById('pg3').innerHTML=renderStatPage();">
    </div>
  </div>`;

  // 전체 평균 참석률 박스 (누적일수/총게임 제거)

      const dow=DAYS_OF_WEEK[d.getDay()];

    const moreNote=inRangeDates.length>15?`<div style="font-size:10px;color:#888780;text-align:center;margin-top:4px">※ 최근 15일만 표시 (전체 ${inRangeDates.length}일)</div>`:'';
    detailBox=`<div style="background:#fff;border:.5px solid #E0DFDB;border-radius:10px;padding:10px;margin-bottom:10px">
      <div class="stitle" style="margin-bottom:8px">🔍 일자별 상세조회 <span style="font-size:9px;color:#888780;font-weight:400">· ${fromDate} ~ ${toDate}</span></div>

  } else {

      <div class="stitle" style="margin-bottom:4px">🔍 일자별 상세조회</div>
      <div style="font-size:12px;color:#888780;text-align:center;padding:10px">선택 기간에 데이터가 없습니다.</div>
    </div>`;
  }

  const divider=`<div style="margin:14px 0 10px;border-top:2px dashed #D8D5CF;position:relative">
    <span style="position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:#f8f7f4;padding:0 6px;font-size:9px;color:#888780;font-weight:700;white-space:nowrap">※ 아래는 전체 누적 기준</span>

  function threeBoxes(allVal,mVal,fVal,unit){

  // 구분 헤더 (전체 | 평일 | 주말)

            ${colHeader()}
            ${top5m.map(id=>memberRow(id,'#E1F5EE')).join('')}
          </div>
          <div>
            <div style="text-align:center;background:#FBEAF0;color:#993556;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👩 여자</div>
            ${colHeader()}
            ${top5f.map(id=>memberRow(id,'#E1F5EE')).join('')}
          </div>

      </div>`;
      // 하위5 남/여 2열
      body+=`<div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:#993C1D;margin-bottom:6px">📉 하위 5명</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <div>
            <div style="text-align:center;background:#E6F1FB;color:#185FA5;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👨 남자</div>
            ${colHeader()}
            ${bot5m.map(id=>memberRow(id,'#FAECE7')).join('')}
          </div>
          <div>
            <div style="text-align:center;background:#FBEAF0;color:#993556;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👩 여자</div>
            ${colHeader()}
            ${bot5f.map(id=>memberRow(id,'#FAECE7')).join('')}
          </div>

      </div>`;
      // 전체 명단
      body+=`<div style="font-size:10px;font-weight:700;color:#555;margin-bottom:5px">📋 전체 명단</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div>
          <div style="text-align:center;background:#E6F1FB;color:#185FA5;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👨 남 (${males.length})</div>
          ${colHeader()}
          ${males.map(id=>memberRow(id,'#EEF4FF')).join('')}
        </div>
        <div>
          <div style="text-align:center;background:#FBEAF0;color:#993556;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👩 여 (${females.length})</div>
          ${colHeader()}
          ${females.map(id=>memberRow(id,'#FDF0F5')).join('')}
        </div>
      </div>`;
    }
  }

  else if(statView==='games'){
    const map={};
    ALL.forEach(d=>{
      [...(d.attendees||[]),...(d.leftMembers||[])].filter(a=>!a.name.includes('게스트')).forEach(a=>{

    const gph=m=>m.minutes>0?(m.games/(m.minutes/60)).toFixed(1):'0.0';
    const males=list.filter(m=>m.gender==='m').sort((a,b)=>parseFloat(gph(b))-parseFloat(gph(a)));
    const females=list.filter(m=>m.gender==='f').sort((a,b)=>parseFloat(gph(b))-parseFloat(gph(a)));
    const calcAvg=arr=>arr.length?(arr.reduce((s,m)=>s+parseFloat(gph(m)),0)/arr.length).toFixed(1):'-';

    if(!list.length){body+=`<div class="empty" style="padding:20px">데이터가 없습니다.</div>`;}
    else{
      body+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div>
          <div style="text-align:center;background:#E6F1FB;color:#185FA5;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👨 남 (${males.length})</div>
          ${males.map(m=>gRow(m,'#EEF4FF')).join('')}
        </div>
        <div>
          <div style="text-align:center;background:#FBEAF0;color:#993556;font-size:10px;font-weight:700;padding:3px;border-radius:6px;margin-bottom:4px">👩 여 (${females.length})</div>
          ${females.map(m=>gRow(m,'#FDF0F5')).join('')}
        </div>
      </div>`;
    }
  }

  else if(statView==='together'){
    const pairMap={};
    ch.forEach(entry=>{
      const ng=entry.members.filter(m=>!m.name.includes('게스트'));
      if(ng.length<2)return;
      const ids=ng.map(m=>m.id),names={};ng.forEach(m=>{names[m.id]=m.name;});
      for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++){
        const key=[ids[i],ids[j]].sort().join('-');
        if(!pairMap[key])pairMap[key]={ids:[ids[i],ids[j]],names:[names[ids[i]],names[ids[j]]],cnt:0};
        pairMap[key].cnt++;
      }
    });
    const personMap={};
    Object.values(pairMap).forEach(pair=>{
      pair.ids.forEach((id,idx)=>{
        if(!personMap[id])personMap[id]={name:pair.names[idx],pairs:[]};
        personMap[id].pairs.push({name:pair.names[1-idx],cnt:pair.cnt});
      });
    });
    const persons=Object.values(personMap).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    body=`<div class="stitle">👫 개인별 같이 게임한 인원 <span style="font-size:9px;color:#B25000;font-weight:400">· 전체 누적 · 상위2/하위2</span></div>`;
    if(!persons.length){body+=`<div class="empty" style="padding:20px">코트 확정 기록이 없습니다.</div>`;}
    else body+=persons.map(p=>{
      const sorted=p.pairs.sort((a,b)=>b.cnt-a.cnt);
      const top=sorted.slice(0,2);
      const bot=[...sorted].reverse().filter(x=>!top.find(t=>t.name===x.name)).slice(0,2);
      const topHtml=top.map(x=>`<span style="background:#E1F5EE;color:#0F6E56;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700">${x.name} ${x.cnt}회</span>`).join(' ');
      const botHtml=bot.map(x=>`<span style="background:#FAECE7;color:#993C1D;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700">${x.name} ${x.cnt}회</span>`).join(' ');
      return`<div style="background:#fff;border:.5px solid #E0DFDB;border-radius:9px;padding:7px 10px;margin-bottom:5px">
        <div style="font-size:12px;font-weight:700;color:#1A1A1A;margin-bottom:4px">${p.name}</div>
        <div style="display:flex;flex-direction:column;gap:3px">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span style="font-size:9px;color:#888780;min-width:24px">최다</span>${topHtml}</div>
          ${bot.length?`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span style="font-size:9px;color:#888780;min-width:24px">최소</span>${botHtml}</div>`:''}
        </div>
      </div>`;
    }).join('');
  }

  return`<div class="pg-inner">
    <div class="stitle">📊 통계 <span style="font-size:9px;color:#888780;margin-left:4px">📥 저장 버튼으로 누적</span></div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${pBtns}</div>
    ${rangeBox}${avgBox}${detailBox}${divider}
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${vBtns}</div>
    <div>${body}</div>
  </div>`;
}


function clearStatHistory(){
  openModal('통계 데이터를 전체 삭제하시겠습니까?\n(복구 불가)',()=>{
    localStorage.removeItem(STKEY);
    localStorage.removeItem('tennis_court_hist');
    renderAll();toast('통계 데이터 삭제 완료');
  });
}

</script>
