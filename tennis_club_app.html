<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:600px;max-width:480px;margin:0 auto;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.header{background:#1D9E75;padding:14px 16px;display:flex;align-items:center;gap:8px}
.header h1{color:#fff;font-size:17px;font-weight:500}
.header-badge{background:rgba(255,255,255,0.25);color:#fff;font-size:12px;padding:3px 10px;border-radius:20px}
.content{flex:1;overflow-y:auto;padding:12px 14px}
.section-title{font-size:13px;color:var(--color-text-secondary);font-weight:500;margin:4px 0 10px;padding-bottom:6px;border-bottom:0.5px solid var(--color-border-tertiary)}
.member-row{display:flex;align-items:center;padding:11px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:7px;gap:10px}
.member-avatar{width:36px;height:36px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#0F6E56;flex-shrink:0}
.member-name{flex:1;font-size:15px;font-weight:500;color:var(--color-text-primary)}
.member-sub{font-size:12px;color:var(--color-text-secondary)}
.btn-attend{background:#1D9E75;color:#fff;border:none;padding:6px 14px;border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;font-weight:500;transition:opacity 0.15s}
.btn-attend:hover{opacity:0.85}
.btn-attend.done{background:#B4B2A9;color:#fff;cursor:default}
.attend-row{display:flex;align-items:center;padding:10px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:7px;gap:8px}
.seq-badge{width:26px;height:26px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#0F6E56;flex-shrink:0}
.attend-name{flex:1;font-size:15px;font-weight:500;color:var(--color-text-primary)}
.game-ctrl{display:flex;align-items:center;gap:4px}
.game-btn{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--color-text-primary);transition:background 0.1s}
.game-btn:hover{background:var(--color-background-tertiary)}
.game-count{min-width:24px;text-align:center;font-size:14px;font-weight:500;color:var(--color-text-primary)}
.btn-leave{background:var(--color-background-danger);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);padding:5px 10px;border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;transition:opacity 0.15s}
.btn-leave:hover{opacity:0.75}
.empty-state{text-align:center;padding:40px 20px;color:var(--color-text-secondary);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:8px;color:var(--color-border-secondary)}
.bottom-nav{display:flex;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.nav-btn{flex:1;padding:12px 8px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:var(--color-text-secondary);transition:color 0.15s;font-family:var(--font-sans)}
.nav-btn.active{color:#1D9E75}
.nav-btn i{font-size:20px}
.stats-bar{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;text-align:center}
.stat-num{font-size:20px;font-weight:500;color:#1D9E75}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.left-badge{font-size:11px;background:#E1F5EE;color:#0F6E56;padding:2px 7px;border-radius:10px;margin-left:6px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>

</head><body><div class="app">
  <div class="header">
    <i class="ti ti-tennis" style="color:#fff;font-size:20px" aria-hidden="true"></i>
    <h1>테니스 동호회</h1>
    <span class="header-badge" id="dateLabel">6/8 (월)</span>
  </div>

  <div class="content" id="mainContent"><div class="stats-bar">
    <div class="stat-card"><div class="stat-num">10</div><div class="stat-label">전체 회원</div></div>
    <div class="stat-card"><div class="stat-num">2</div><div class="stat-label">오늘 참석</div></div>
    <div class="stat-card"><div class="stat-num">1</div><div class="stat-label">퇴소</div></div>
  </div>
  <div class="section-title">전체 회원 (10명)</div><div class="member-row">
      <div class="member-avatar">김</div>
      <div style="flex:1">
        <div class="member-name">김민준<span class="left-badge">참석중</span></div>
        <div class="member-sub">중급</div>
      </div>
      <button class="btn-attend done" disabled="">출석완료</button>
    </div><div class="member-row">
      <div class="member-avatar">이</div>
      <div style="flex:1">
        <div class="member-name">이서연<span class="left-badge">참석중</span></div>
        <div class="member-sub">고급</div>
      </div>
      <button class="btn-attend done" disabled="">출석완료</button>
    </div><div class="member-row">
      <div class="member-avatar">박</div>
      <div style="flex:1">
        <div class="member-name">박지호</div>
        <div class="member-sub">초급</div>
      </div>
      <button class="btn-attend" onclick="markAttend(3);showPage(&#39;today&#39;)">출석</button>
    </div><div class="member-row">
      <div class="member-avatar">최</div>
      <div style="flex:1">
        <div class="member-name">최유나</div>
        <div class="member-sub">중급</div>
      </div>
      <button class="btn-attend" onclick="markAttend(4);showPage(&#39;today&#39;)">출석</button>
    </div><div class="member-row">
      <div class="member-avatar">정</div>
      <div style="flex:1">
        <div class="member-name">정현우</div>
        <div class="member-sub">고급</div>
      </div>
      <button class="btn-attend" onclick="markAttend(5);showPage(&#39;today&#39;)">출석</button>
    </div><div class="member-row">
      <div class="member-avatar">윤</div>
      <div style="flex:1">
        <div class="member-name">윤소희</div>
        <div class="member-sub">초급</div>
      </div>
      <button class="btn-attend" onclick="markAttend(6);showPage(&#39;today&#39;)">출석</button>
    </div><div class="member-row">
      <div class="member-avatar">강</div>
      <div style="flex:1">
        <div class="member-name">강도윤<span class="left-badge" style="background:#FAECE7;color:#993C1D">퇴소</span></div>
        <div class="member-sub">중급</div>
      </div>
      <span style="font-size:11px;color:var(--color-text-secondary)">퇴소</span>
    </div><div class="member-row">
      <div class="member-avatar">임</div>
      <div style="flex:1">
        <div class="member-name">임채원</div>
        <div class="member-sub">고급</div>
      </div>
      <button class="btn-attend" onclick="markAttend(8);showPage(&#39;today&#39;)">출석</button>
    </div><div class="member-row">
      <div class="member-avatar">한</div>
      <div style="flex:1">
        <div class="member-name">한수진</div>
        <div class="member-sub">초급</div>
      </div>
      <button class="btn-attend" onclick="markAttend(9);showPage(&#39;today&#39;)">출석</button>
    </div><div class="member-row">
      <div class="member-avatar">오</div>
      <div style="flex:1">
        <div class="member-name">오태양</div>
        <div class="member-sub">중급</div>
      </div>
      <button class="btn-attend" onclick="markAttend(10);showPage(&#39;today&#39;)">출석</button>
    </div></div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="navMembers" onclick="showPage(&#39;members&#39;)">
      <i class="ti ti-users" aria-hidden="true"></i>회원명부
    </button>
    <button class="nav-btn" id="navToday" onclick="showPage(&#39;today&#39;)">
      <i class="ti ti-clipboard-list" aria-hidden="true"></i>오늘 참석자
    </button>
  </div>
</div>
<div class="toast" id="toast">김민준 출석 완료 ✓</div>

<script>
const members = [
  {id:1,name:'김민준',level:'중급'},
  {id:2,name:'이서연',level:'고급'},
  {id:3,name:'박지호',level:'초급'},
  {id:4,name:'최유나',level:'중급'},
  {id:5,name:'정현우',level:'고급'},
  {id:6,name:'윤소희',level:'초급'},
  {id:7,name:'강도윤',level:'중급'},
  {id:8,name:'임채원',level:'고급'},
  {id:9,name:'한수진',level:'초급'},
  {id:10,name:'오태양',level:'중급'},
];

let attendees = [];
let leftMembers = [];
let seqCounter = 0;
let currentPage = 'members';

const today = new Date();
document.getElementById('dateLabel').textContent =
  `${today.getMonth()+1}/${today.getDate()} (${['일','월','화','수','목','금','토'][today.getDay()]})`;

function getInitial(name){return name[0];}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function markAttend(memberId){
  const m=members.find(x=>x.id===memberId);
  if(!m)return;
  if(attendees.find(x=>x.id===memberId))return;
  seqCounter++;
  attendees.push({id:m.id,name:m.name,level:m.level,seq:seqCounter,games:0});
  showToast(`${m.name} 출석 완료 ✓`);
  renderPage();
}

function changeGames(id,delta){
  const a=attendees.find(x=>x.id===id);
  if(!a)return;
  a.games=Math.max(0,a.games+delta);
  renderPage();
}

function leaveAttendee(id){
  const a=attendees.find(x=>x.id===id);
  if(!a)return;
  if(!confirm(`${a.name} 회원을 퇴소 처리하시겠습니까?`))return;
  leftMembers.push({...a,leftAt:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});
  attendees=attendees.filter(x=>x.id!==id);
  showToast(`${a.name} 퇴소 처리됨`);
  renderPage();
}

function showPage(page){
  currentPage=page;
  document.getElementById('navMembers').classList.toggle('active',page==='members');
  document.getElementById('navToday').classList.toggle('active',page==='today');
  renderPage();
}

function renderPage(){
  const c=document.getElementById('mainContent');
  if(currentPage==='members') renderMembers(c);
  else renderToday(c);
}

function renderMembers(c){
  const attendedIds=new Set(attendees.map(x=>x.id));
  const leftIds=new Set(leftMembers.map(x=>x.id));
  let html=`<div class="stats-bar">
    <div class="stat-card"><div class="stat-num">${members.length}</div><div class="stat-label">전체 회원</div></div>
    <div class="stat-card"><div class="stat-num">${attendees.length}</div><div class="stat-label">오늘 참석</div></div>
    <div class="stat-card"><div class="stat-num">${leftMembers.length}</div><div class="stat-label">퇴소</div></div>
  </div>
  <div class="section-title">전체 회원 (${members.length}명)</div>`;
  members.forEach(m=>{
    const attended=attendedIds.has(m.id);
    const left=leftIds.has(m.id);
    const tag=left?`<span style="font-size:11px;color:var(--color-text-secondary)">퇴소</span>`:
      attended?`<button class="btn-attend done" disabled>출석완료</button>`:
      `<button class="btn-attend" onclick="markAttend(${m.id});showPage('today')">출석</button>`;
    html+=`<div class="member-row">
      <div class="member-avatar">${getInitial(m.name)}</div>
      <div style="flex:1">
        <div class="member-name">${m.name}${attended&&!left?`<span class="left-badge">참석중</span>`:''}${left?`<span class="left-badge" style="background:#FAECE7;color:#993C1D">퇴소</span>`:''}</div>
        <div class="member-sub">${m.level}</div>
      </div>
      ${tag}
    </div>`;
  });
  c.innerHTML=html;
}

function renderToday(c){
  let html=`<div class="stats-bar">
    <div class="stat-card"><div class="stat-num">${attendees.length}</div><div class="stat-label">현재 참석</div></div>
    <div class="stat-card"><div class="stat-num">${attendees.reduce((s,a)=>s+a.games,0)}</div><div class="stat-label">총 게임수</div></div>
    <div class="stat-card"><div class="stat-num">${leftMembers.length}</div><div class="stat-label">퇴소</div></div>
  </div>
  <div class="section-title">현재 참석자 (${attendees.length}명)</div>`;
  if(attendees.length===0){
    html+=`<div class="empty-state"><div class="empty-icon"><i class="ti ti-users-minus"></i></div>아직 출석한 회원이 없습니다.<br><small style="margin-top:6px;display:block">회원명부에서 출석 버튼을 눌러주세요</small></div>`;
  } else {
    attendees.forEach(a=>{
      html+=`<div class="attend-row">
        <div class="seq-badge">${a.seq}</div>
        <div class="attend-name">${a.name}</div>
        <div class="game-ctrl">
          <button class="game-btn" onclick="changeGames(${a.id},-1)" aria-label="게임 감소">−</button>
          <span class="game-count">${a.games}</span>
          <button class="game-btn" onclick="changeGames(${a.id},1)" aria-label="게임 증가">+</button>
        </div>
        <button class="btn-leave" onclick="leaveAttendee(${a.id})">퇴소</button>
      </div>`;
    });
  }
  if(leftMembers.length>0){
    html+=`<div class="section-title" style="margin-top:14px">퇴소 회원 (${leftMembers.length}명)</div>`;
    leftMembers.forEach(a=>{
      html+=`<div class="attend-row" style="opacity:0.55">
        <div class="seq-badge" style="background:#F1EFE8;color:#5F5E5A">${a.seq}</div>
        <div class="attend-name" style="text-decoration:line-through;color:var(--color-text-secondary)">${a.name}</div>
        <span style="font-size:12px;color:var(--color-text-secondary);margin-left:auto">${a.games}게임 · ${a.leftAt}</span>
      </div>`;
    });
  }
  c.innerHTML=html;
}

renderPage();
</script>
</body></html>
